    /api/admin/alerts:
        get:
            operationId: listAlerts
            summary: List fired alerts
            description: |-
                Returns the set of fired alert instances, newest first, with a total
                count for pagination. Every Control Plane route under
                `/api/admin/alerts*` is a thin forwarder: the Control Plane records the
                acting admin for audit and applies IAM gating, then proxies the request
                to Nexus Hub's `/api/v1/admin/alerts` endpoint, which owns the durable
                alert state.

                The four categorical filters (`state`, `severity`, `sourceType`,
                `ruleId`) are repeatable query-string keys. Values within one dimension
                are OR'd (`?state=firing&state=acknowledged` matches rows in either
                state); the dimensions are AND'd together. An absent key does not filter
                on that dimension.
            x-nexus-iam-action: iam.ResourceAlert.Action(iam.VerbRead)
            x-nexus-tier: auto
            parameters:
                - name: state
                  in: query
                  description: Filter by alert lifecycle state. Repeatable; values are OR'd within the dimension.
                  required: false
                  schema:
                    type: array
                    items:
                        type: string
                        enum:
                            - firing
                            - acknowledged
                            - resolved
                - name: severity
                  in: query
                  description: |-
                    Filter by severity. Repeatable; values are OR'd. An unrecognized
                    value is rejected with HTTP 400 (validated via ParseLoose against the
                    AllSeverities set).
                  required: false
                  schema:
                    type: array
                    items:
                        type: string
                        enum:
                            - critical
                            - high
                            - medium
                            - low
                            - info
                - name: sourceType
                  in: query
                  description: Filter by the rule's source domain. Repeatable; values are OR'd.
                  required: false
                  schema:
                    type: array
                    items:
                        type: string
                        enum:
                            - quota
                            - proxy
                            - thing
                            - provider
                            - auth
                            - system
                - name: ruleId
                  in: query
                  description: Filter by originating alert-rule id. Repeatable; values are OR'd.
                  required: false
                  schema:
                    type: array
                    items:
                        type: string
                - name: since
                  in: query
                  description: 'Lower time bound on firedAt. RFC3339 / RFC3339Nano (e.g. 2024-01-01T00:00:00Z); invalid values return HTTP 400.'
                  required: false
                  schema:
                    type: string
                    format: date-time
                - name: until
                  in: query
                  description: Upper time bound on firedAt. RFC3339 / RFC3339Nano; invalid values return HTTP 400.
                  required: false
                  schema:
                    type: string
                    format: date-time
                - name: offset
                  in: query
                  description: Pagination offset. Must be a non-negative integer; otherwise HTTP 400.
                  required: false
                  schema:
                    type: integer
                    minimum: 0
                - name: limit
                  in: query
                  description: Page size. Must be a positive integer; otherwise HTTP 400.
                  required: false
                  schema:
                    type: integer
                    minimum: 1
            responses:
                '200':
                    description: Alert page with total count.
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    alerts:
                                        type: array
                                        items:
                                            $ref: '#/components/schemas/Alert'
                                    total:
                                        type: integer
                                        description: Total matching rows ignoring offset/limit.
                            example:
                                alerts:
                                    - id: alrt_01H...
                                      ruleId: provider.upstream_error
                                      sourceType: provider
                                      targetKey: provider:openai
                                      targetLabel: OpenAI
                                      severity: high
                                      state: firing
                                      message: Upstream error rate above threshold.
                                      firedAt: '2024-01-01T00:00:00Z'
                                      lastSeenAt: '2024-01-01T00:05:00Z'
                                      duplicateCount: 3
                                total: 1
