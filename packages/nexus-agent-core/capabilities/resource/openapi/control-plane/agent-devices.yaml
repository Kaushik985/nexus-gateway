# Hand-maintained OpenAPI spec, verified claim-by-claim against the control-plane
# handler code (the single source of truth) via the openapi-review skill. Keep
# structural fields (paths/verbs/types) in lockstep with the handlers.
openapi: 3.1.0
info:
    title: Nexus Control Plane Admin API — agent-devices
    version: dev
    description: 'Hand-maintained against control-plane source: field names, types, optionality, status codes and IAM tiers mirror the handler code; enum value sets and required-field rules enforced imperatively in handlers are verified by the openapi-review skill.'
paths:
    /api/admin/agent-devices:
        get:
            operationId: listAgentDevices
            summary: List enrolled agent devices
            description: Returns a paginated list of enrolled agent devices (Things of type `agent`), optionally filtered by a free-text query, lifecycle status, and operating system. The response carries the matching devices plus a total count for the applied filter.
            x-nexus-iam-action: iam.ResourceAgentDevice.Action(iam.VerbRead)
            x-nexus-tier: auto
            parameters:
                - name: q
                  in: query
                  description: Free-text filter matched (case-insensitive) against device hostname and certificate serial.
                  required: false
                  schema:
                    type: string
                - name: status
                  in: query
                  description: Exact-match filter on the device lifecycle status. Passed through to the query as-is; not constrained to a fixed value set by the handler.
                  required: false
                  schema:
                    type: string
                - name: os
                  in: query
                  description: Exact-match filter on the device operating system. Passed through to the query as-is; not constrained to a fixed value set by the handler.
                  required: false
                  schema:
                    type: string
            responses:
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
    /api/admin/agent-devices/{id}:
        get:
            operationId: getAgentDevice
            summary: Get a single agent device
            description: Returns the full detail record for one enrolled agent device by its identifier. Responds 404 when no agent device with that id exists.
            x-nexus-iam-action: iam.ResourceAgentDevice.Action(iam.VerbRead)
            x-nexus-tier: auto
            parameters:
                - name: id
                  in: path
                  description: Agent device (Thing) identifier.
                  required: true
                  schema:
                    type: string
            responses:
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "404":
                    description: Not Found
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/agentstore_ThingNode'
    /api/admin/agent-devices/{id}/assignments:
        get:
            operationId: listDeviceAssignments
            summary: List a device's assignment history
            description: Returns the paginated ownership-assignment history for one device — who owned it, when, and the source channel that produced each assignment — newest first. Responds 400 when the device id is empty.
            x-nexus-iam-action: iam.ResourceAgentDevice.Action(iam.VerbRead)
            x-nexus-tier: auto
            parameters:
                - name: id
                  in: path
                  description: Agent device (Thing) identifier.
                  required: true
                  schema:
                    type: string
            responses:
                "400":
                    description: Bad Request
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
    /api/admin/agent-devices/{id}/audit:
        get:
            operationId: listDeviceAudit
            summary: List a device's audit events
            description: Returns the paginated audit-event history scoped to one device, optionally bounded by a start and/or end timestamp. Timestamps that fail to parse are ignored (no time bound applied).
            x-nexus-iam-action: iam.ResourceAgentDevice.Action(iam.VerbRead)
            x-nexus-tier: auto
            parameters:
                - name: id
                  in: path
                  description: Agent device (Thing) identifier.
                  required: true
                  schema:
                    type: string
                - name: start
                  in: query
                  description: Lower time bound for audit events, parsed flexibly as an RFC 3339 timestamp. Ignored if it cannot be parsed.
                  required: false
                  schema:
                    type: string
                    format: date-time
                - name: end
                  in: query
                  description: Upper time bound for audit events, parsed flexibly as an RFC 3339 timestamp. Ignored if it cannot be parsed.
                  required: false
                  schema:
                    type: string
                    format: date-time
            responses:
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
    /api/admin/agent-devices/{id}/config:
        get:
            operationId: getDeviceConfig
            summary: Get a device's effective configuration
            description: Returns the read-only effective configuration computed for one device — its hostname, the AI provider domains derived from enabled providers, plus the device's reported sysinfo and metadata. Responds 404 when the device does not exist.
            x-nexus-iam-action: iam.ResourceAgentDevice.Action(iam.VerbRead)
            x-nexus-tier: auto
            parameters:
                - name: id
                  in: path
                  description: Agent device (Thing) identifier.
                  required: true
                  schema:
                    type: string
            responses:
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "404":
                    description: Not Found
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
    /api/admin/agent-devices/{id}/events:
        get:
            operationId: listDeviceEvents
            summary: List a device's AI traffic events
            description: Returns the paginated AI traffic events recorded for one device (events with `source = 'agent'` for this Thing), along with a total count.
            x-nexus-iam-action: iam.ResourceAgentDevice.Action(iam.VerbRead)
            x-nexus-tier: auto
            parameters:
                - name: id
                  in: path
                  description: Agent device (Thing) identifier.
                  required: true
                  schema:
                    type: string
            responses:
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
    /api/admin/agent-devices/{id}/force-refresh:
        post:
            operationId: forceRefreshAgentDevice
            summary: Force a device config re-push
            description: Asks Nexus Hub to immediately re-broadcast every desired configuration key to this device, without waiting for the next shadow tick. Returns 404 when the device does not exist, 503 when Hub is not configured, and 502 when the Hub call fails.
            x-nexus-iam-action: iam.ResourceAgentDevice.Action(iam.VerbForceResync)
            x-nexus-tier: confirm
            parameters:
                - name: id
                  in: path
                  description: Agent device (Thing) identifier.
                  required: true
                  schema:
                    type: string
            responses:
                "400":
                    description: Bad Request
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "404":
                    description: Not Found
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "503":
                    description: Service Unavailable
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "502":
                    description: Bad Gateway
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
    /api/admin/agent-devices/{id}/tags:
        put:
            operationId: putDeviceTags
            summary: Replace a device's tags
            description: |
                Replaces the full free-form tag set on one device. PUT is a full
                replace, not a delta: an empty array clears all tags. Each tag must
                be a non-empty string of at most 64 characters; the handler rejects
                empty strings and over-length tags with 400. Tags compose into
                smart-group predicates and surface as filter chips on the Devices list.
            x-nexus-iam-action: iam.ResourceAgentDevice.Action(iam.VerbUpdate)
            x-nexus-tier: confirm
            parameters:
                - name: id
                  in: path
                  description: Agent device (Thing) identifier.
                  required: true
                  schema:
                    type: string
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/agent_putDeviceTagsRequest'
                        example:
                            tags:
                                - finance
                                - byod
            responses:
                "400":
                    description: Bad Request
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "404":
                    description: Not Found
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
    /api/admin/agent-devices/{id}/timeline:
        get:
            operationId: getDeviceTimeline
            summary: Get a device's assignment timeline
            description: Returns the ownership-assignment timeline for one device as a single `data` array (no pagination), suitable for rendering a chronological history view.
            x-nexus-iam-action: iam.ResourceAgentDevice.Action(iam.VerbRead)
            x-nexus-tier: auto
            parameters:
                - name: id
                  in: path
                  description: Agent device (Thing) identifier.
                  required: true
                  schema:
                    type: string
            responses:
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
    /api/admin/agent-devices/{id}/unenroll:
        post:
            operationId: unenrollDevice
            summary: Unenroll a device
            description: Unenrolls a device by setting its status to `revoked`. The device record is retained (not deleted); the updated device is returned. Responds 404 when the device does not exist.
            x-nexus-iam-action: iam.ResourceAgentDevice.Action(iam.VerbDelete)
            x-nexus-tier: confirm
            parameters:
                - name: id
                  in: path
                  description: Agent device (Thing) identifier.
                  required: true
                  schema:
                    type: string
            responses:
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "404":
                    description: Not Found
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/agentstore_ThingNode'
    /api/admin/agent-devices/enroll-token:
        post:
            operationId: generateEnrollToken
            summary: Generate an agent enrollment token
            description: |
                Generates a single-use enrollment token (via Nexus Hub) that a new
                agent uses to enroll itself as a device. The optional `hostname`
                becomes the token label; when omitted or empty it defaults to
                `agent`. Returns 401 when the request is unauthenticated, 503 when
                Hub is not configured, and 502 when the Hub call fails.
            x-nexus-iam-action: iam.ResourceAgentDevice.Action(iam.VerbCreate)
            x-nexus-tier: confirm
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                hostname:
                                    type: string
                                    description: Optional label for the enrollment token, typically the hostname of the machine being enrolled. Defaults to `agent` when omitted or empty.
                        example:
                            hostname: laptop-finance-07
            responses:
                "401":
                    description: Unauthorized
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "503":
                    description: Service Unavailable
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "502":
                    description: Bad Gateway
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "201":
                    description: Created
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
    /api/admin/agent-devices/health:
        get:
            operationId: agentFleetHealth
            summary: Get fleet health summary
            description: Returns an aggregate health summary across the entire agent fleet — total device count broken down by active, stale, critical, and revoked, plus the stale and critical percentages.
            x-nexus-iam-action: iam.ResourceAgentDevice.Action(iam.VerbRead)
            x-nexus-tier: auto
            responses:
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/agentstore_AgentFleetHealth'
components:
    schemas:
        agent_putDeviceTagsRequest:
            type: object
            properties:
                tags:
                    type: array
                    description: Full replacement tag set for the device. Each tag must be a non-empty string of at most 64 characters; an empty array clears all tags.
                    items:
                        type: string
            example:
                tags:
                    - finance
                    - byod
        agentstore_AgentFleetHealth:
            type: object
            properties:
                total:
                    type: integer
                    description: Total number of agent devices in the fleet.
                active:
                    type: integer
                    description: Number of devices considered healthy / actively reporting.
                stale:
                    type: integer
                    description: Number of devices that have not reported recently.
                critical:
                    type: integer
                    description: Number of devices in a critical health state.
                revoked:
                    type: integer
                    description: Number of devices that have been unenrolled (revoked).
                stalePct:
                    type: integer
                    description: Stale devices as a whole-number percentage of the total.
                criticalPct:
                    type: integer
                    description: Critical devices as a whole-number percentage of the total.
            required:
                - total
                - active
                - stale
                - critical
                - revoked
                - stalePct
                - criticalPct
            example:
                total: 120
                active: 104
                stale: 11
                critical: 3
                revoked: 2
                stalePct: 9
                criticalPct: 2
        agentstore_ThingNode:
            type: object
            properties:
                id:
                    type: string
                    description: Device (Thing) identifier.
                hostname:
                    type: string
                os:
                    type: string
                    description: Operating system family reported by the device.
                osVersion:
                    type: string
                agentVersion:
                    type: string
                    description: Version of the Nexus agent running on the device.
                status:
                    type: string
                    description: 'Device lifecycle status. Source documents the value set as: enrolled, online, offline, drift, revoked.'
                lastHeartbeat:
                    type:
                        - string
                        - "null"
                    format: date-time
                    description: Timestamp of the device's last heartbeat; null if it has never reported.
                enrolledAt:
                    type: string
                    format: date-time
                enrolledBy:
                    type: string
                    description: Identifier of the principal that enrolled the device.
                certSerial:
                    type:
                        - string
                        - "null"
                    description: Serial of the device's current client certificate; null when unset.
                certExpiresAt:
                    type:
                        - string
                        - "null"
                    format: date-time
                    description: Expiry timestamp of the device's client certificate; null when unset.
                metadata:
                    description: Arbitrary JSON metadata for the device (e.g. Hub-written static system info).
                sysinfo:
                    description: Arbitrary JSON system information reported by the device.
                _count:
                    type:
                        - integer
                        - "null"
                    description: Count of AI traffic events recorded for this device.
                primaryIp:
                    type: string
                physicalId:
                    type: string
                    description: Stable physical machine identifier for the device.
                boundUserId:
                    type: string
                    description: Identifier of the user currently bound to the device; empty when unbound.
                boundUserDisplayName:
                    type: string
                    description: Display name of the currently bound user; empty when unbound.
                boundUserEmail:
                    type: string
                    description: Email of the currently bound user; empty when unbound.
                tags:
                    type: array
                    description: Free-form tags applied to the device.
                    items:
                        type: string
            example:
                id: thing_01HZX8AGENT0001
                hostname: laptop-finance-07
                os: darwin
                osVersion: "14.5"
                agentVersion: 1.4.2
                status: online
                lastHeartbeat: 2026-05-29T09:14:00Z
                enrolledAt: 2026-05-01T12:00:00Z
                enrolledBy: admin@example.com
                certSerial: 0A1B2C3D4E5F
                certExpiresAt: 2026-08-01T12:00:00Z
                primaryIp: 10.0.4.22
                physicalId: PHYS-9F3A2C
                boundUserId: usr_01HZX8USER0001
                boundUserDisplayName: Jordan Lee
                boundUserEmail: jordan.lee@example.com
                tags:
                    - finance
                    - byod
            required:
                - id
                - hostname
                - os
                - osVersion
                - agentVersion
                - status
                - enrolledAt
                - enrolledBy
                - metadata
