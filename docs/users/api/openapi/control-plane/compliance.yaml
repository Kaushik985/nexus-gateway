            summary: Get per-layer compliance (trinity) stats
            description: |-
                Returns per-layer compliance statistics for the ai-gateway, compliance-proxy,
                and agent enforcement layers over the requested window. When the time window is
                omitted it defaults to the last year (one year before now through now).
            x-nexus-iam-action: iam.ResourceComplianceReport.Action(iam.VerbRead)
            x-nexus-tier: auto
