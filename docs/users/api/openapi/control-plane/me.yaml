# Hand-maintained OpenAPI spec, verified claim-by-claim against the control-plane
# handler code (the single source of truth) via the openapi-review skill. Keep
# structural fields (paths/verbs/types) in lockstep with the handlers.
openapi: 3.1.0
info:
    title: Nexus Control Plane Admin API — me
    version: dev
    description: 'Hand-maintained against control-plane source: field names, types, optionality, status codes and IAM tiers mirror the handler code; enum value sets and required-field rules enforced imperatively in handlers are verified by the openapi-review skill.'
paths:
    /api/admin/me:
        get:
            operationId: getMe
            summary: Get the current principal's identity and roles
            description: |-
                Returns the identity, IAM role bindings, and (for admin users) profile
                attributes of the currently authenticated principal. Self-service: no IAM
                action is required — the endpoint always scopes to the caller. The response
                carries the principal key id and name, the resolved IAM group/role names,
                the auth principal type, and — when the principal is an admin user — the
                email and preferred timezone loaded from the user record.
            x-nexus-tier: auto
            responses:
                "401":
                    description: Unauthorized — no authenticated principal in the request context.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                error: Authentication required
                                type: authentication_error
        patch:
            operationId: updateMe
            summary: Update the current admin user's profile or password
            description: |-
                Updates the calling admin user's own profile. Editable fields are
                displayName and email; the password may also be changed by supplying both
                currentPassword and newPassword. Only principals whose auth type is an admin
                user may call this — other principal types receive 403. When newPassword is
                present, currentPassword is required and must match the stored password hash,
                otherwise 401 is returned. On success the updated user is returned without the
                password hash.
            x-nexus-iam-action: iam.ResourceSettings.Action(iam.VerbRead)
            x-nexus-tier: auto
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                displayName:
                                    type:
                                        - string
                                        - "null"
                                    description: New display name for the admin user. Omit or null to leave unchanged.
                                email:
                                    type:
                                        - string
                                        - "null"
                                    description: New email address for the admin user. Omit or null to leave unchanged.
                                currentPassword:
                                    type:
                                        - string
                                        - "null"
                                    description: |-
                                        The user's current password. Required only when newPassword is
                                        supplied; verified against the stored password hash before the
                                        change is applied.
                                newPassword:
                                    type:
                                        - string
                                        - "null"
                                    description: |-
                                        The new password. When provided, currentPassword must also be
                                        supplied and must match the stored hash.
                        example:
                            displayName: Jane Operator
                            email: jane.operator@example.com
            responses:
                "403":
                    description: Forbidden — the principal is not an admin user.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                error: Only admin users can update profile
                                type: authorization_error
                "400":
                    description: |-
                        Bad Request — the body could not be parsed, or newPassword was
                        supplied without currentPassword.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                error: currentPassword is required to change password
                                type: validation_error
                "500":
                    description: Internal Server Error — failed to load the user, hash the password, or persist the update.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                error: Failed to update profile
                                type: server_error
                "401":
                    description: Unauthorized — the supplied currentPassword does not match the stored password.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                error: Current password is incorrect
                                type: authorization_error
                "200":
                    description: OK — the updated user record without the password hash.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/userstore_NexusUserSafe'
                            example:
                                id: usr_01HXYZ
                                displayName: Jane Operator
                                email: jane.operator@example.com
                                status: active
                                canAccessControlPlane: true
                                source: local
                                lastLoginAt: "2026-05-01T12:00:00Z"
                                preferredTimezone: America/New_York
                                createdAt: "2026-01-15T08:30:00Z"
                                updatedAt: "2026-05-29T09:00:00Z"
    /api/admin/me/admin-audit-logs:
        get:
            operationId: listMyAdminAuditLogs
            summary: List the current user's admin audit logs
            description: |-
                Returns admin audit log entries scoped to the calling user — the actor
                filter is forced to the caller's principal key id, so a user only ever sees
                their own administrative actions. Self-service: no IAM action is required.
                Results are paginated; the response includes the page of entries plus the
                total count and the applied limit and offset.
            x-nexus-tier: auto
            parameters:
                - name: limit
                  in: query
                  description: Maximum number of entries to return. Defaults to 50; values above 1000 are clamped to 1000.
                  schema:
                    type: integer
                    default: 50
                    maximum: 1000
                - name: offset
                  in: query
                  description: Number of entries to skip for pagination. Defaults to 0.
                  schema:
                    type: integer
                    default: 0
                - name: action
                  in: query
                  description: Filter by audit action name.
                  schema:
                    type: string
                - name: entityType
                  in: query
                  description: Filter by the type of entity acted upon.
                  schema:
                    type: string
                - name: startTime
                  in: query
                  description: Lower time bound (RFC 3339). Entries before this time are excluded.
                  schema:
                    type: string
                    format: date-time
                - name: endTime
                  in: query
                  description: Upper time bound (RFC 3339). Entries after this time are excluded.
                  schema:
                    type: string
                    format: date-time
            responses:
                "500":
                    description: Internal Server Error — the audit log query failed.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                error: Internal server error
                                type: server_error
                "200":
                    description: OK — a paginated page of the caller's own admin audit log entries.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                data: []
                                total: 0
                                limit: 50
                                offset: 0
    /api/admin/me/agent-devices:
        get:
            operationId: listMyAgentDevices
            summary: List the current user's enrolled agent devices
            description: |-
                Returns the agent devices enrolled to the calling admin user, joined through
                device assignment so only the caller's own devices are returned. Self-service:
                no fleet-wide IAM action is required. Used by the Agent Setup page to show
                live per-device install status. An empty list means no devices are enrolled
                yet. Results are paginated; the response includes the page of devices and the
                total count.
            x-nexus-tier: auto
            parameters:
                - name: limit
                  in: query
                  description: Maximum number of devices to return. Defaults to 50; values above 1000 are clamped to 1000.
                  schema:
                    type: integer
                    default: 50
                    maximum: 1000
                - name: offset
                  in: query
                  description: Number of devices to skip for pagination. Defaults to 0.
                  schema:
                    type: integer
                    default: 0
            responses:
                "401":
                    description: Unauthorized — no authenticated principal, or the principal has no key id.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                error: Authentication required
                                type: authentication_error
                "500":
                    description: Internal Server Error — the device lookup failed.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                error: Internal server error
                                type: server_error
                                code: INTERNAL_ERROR
                "200":
                    description: OK — a paginated page of the caller's enrolled agent devices.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                data: []
                                total: 0
    /api/admin/me/permissions:
        get:
            operationId: getMePermissions
            summary: List the admin actions the current principal may perform
            description: |-
                Evaluates the calling principal's IAM policy against every known admin
                action and returns the subset the principal is allowed to perform, under an
                actions array. Self-service: no IAM action is required to call it. Bootstrap
                and dev principals receive the full action catalog. When no IAM engine is
                configured the actions array is empty. The principal's cached IAM decision is
                invalidated before evaluation so the result reflects the latest policy.
            x-nexus-tier: auto
            responses:
                "401":
                    description: Unauthorized — no authenticated principal in the request context.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                error: Authentication required
                                type: authentication_error
                "200":
                    description: OK — the list of admin action names the principal is allowed to perform.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                actions:
                                    - admin:virtual-key.read
                                    - admin:virtual-key.create
                                    - admin:provider.read
components:
    schemas:
        userstore_NexusUserSafe:
            description: An admin user record with the password hash omitted.
            type: object
            properties:
                id:
                    type: string
                    description: Unique identifier of the admin user.
                displayName:
                    type: string
                    description: Human-readable display name.
                email:
                    type:
                        - string
                        - "null"
                    description: Email address, or null if none is set.
                status:
                    type: string
                    description: Account status. Active users are matched by the value "active".
                canAccessControlPlane:
                    type: boolean
                    description: Whether the user is permitted to access the Control Plane.
                source:
                    type: string
                    description: 'How the user was provisioned (per the NexusUserSafe.Source code comment).'
                    enum:
                        - local
                        - oidc
                        - scim
                lastLoginAt:
                    type:
                        - string
                        - "null"
                    format: date-time
                    description: Timestamp of the user's last login, or null if never logged in.
                preferredTimezone:
                    type:
                        - string
                        - "null"
                    description: The user's preferred IANA timezone, or null if unset.
                createdAt:
                    type: string
                    format: date-time
                    description: Timestamp when the user record was created.
                updatedAt:
                    type: string
                    format: date-time
                    description: Timestamp when the user record was last updated.
                organizationId:
                    type:
                        - string
                        - "null"
                    description: Organization id, populated via LEFT JOIN by list queries; null when unassigned.
                organizationName:
                    type:
                        - string
                        - "null"
                    description: Organization name, populated via LEFT JOIN by list queries; null when unassigned.
            required:
                - id
                - displayName
                - status
                - canAccessControlPlane
                - source
                - createdAt
                - updatedAt
