paths:
    /api/admin/services/public-urls:
        get:
            operationId: getServicePublicURLs
            summary: Get externally-reachable service URLs
            description: >-
                Returns one externally-reachable public URL per server-side
                service type (Hub, Control Plane, AI Gateway, Compliance Proxy).
                Each service publishes its `publicURL` configuration field via
                static node info on every connect; this endpoint reads the most
                recently seen value for each service type. A field is present
                only when a node of that type has reported a non-empty public
                URL — a missing field means no such node has registered yet, or
                the registered node did not set its public URL. The UI uses
                these values so install, enrollment, and SSO copy render the
                real environment URLs instead of hardcoded hostnames.
