components:
    schemas:
        handler_thingStatsResponse:
            type: object
            description: Per-node metric rollup result for one node over a resolved time window.
            properties:
                thingId:
                    type: string
                    description: The node (Thing) identifier echoed from the request path.
                thingType:
                    type: string
                    description: Node type (e.g. agent, ai-gateway, compliance-proxy, control-plane, hub).
                thingName:
                    type: string
                    description: Operator-set display name for the node. Omitted when the node has no name.
                enabled:
                    type: boolean
                    description: True when rollup data is available. False for an agent node whose per-agent rollup is inferred disabled on the Hub.
                rollupDisabledMessage:
                    type: string
                    description: Human-readable explanation present only when `enabled` is false.
                startTime:
                    type: string
                    format: date-time
                    description: Resolved window start (UTC). Either the requested `start` or 24h before `end`.
                endTime:
                    type: string
                    format: date-time
                    description: Resolved window end (UTC). Either the requested `end` or now.
                granule:
                    type: string
                    description: Rollup bucket granularity, selected automatically from the window span.
                    enum:
                        - 5m
                        - 1h
                        - 1d
                        - 1mo
                rows:
                    type: array
                    description: Rollup rows matching the metric / dimension filters, ordered by the underlying rollup store.
                    items:
                        $ref: '#/components/schemas/handler_thingStatsRow'
                displayNames:
                    type: object
                    description: Resolves ID-typed dimension values (provider, model, organization, etc.) to human-readable names. Keyed by the bare dimension value; missing entries fall back to the raw value. Omitted when nothing is resolvable.
                    additionalProperties:
                        type: string
            required:
                - thingId
                - thingType
                - enabled
                - startTime
                - endTime
                - granule
                - rows
        handler_thingStatsRow:
            type: object
            description: A single rollup bucket value for one metric and optional dimension.
            properties:
                bucketStart:
                    type: string
                    format: date-time
                    description: Start timestamp of the rollup bucket.
                metricName:
                    type: string
                    description: Name of the rolled-up metric.
                dimensionKey:
                    type: string
                    description: Dimension in `<name>=<value>` form (e.g. "model=clu123"). Omitted for global rows.
                subDimension:
                    type: string
                    description: Secondary dimension qualifier (e.g. "source=agent"). Omitted when absent.
                value:
                    type: number
                    description: Aggregated metric value for this bucket.
                metadata:
                    description: Optional decoded metadata object attached to the rollup row. Omitted when absent.
            required:
                - bucketStart
                - metricName
                - value
