paths:
    /api/admin/jobs:
        get:
            operationId: jobsList
            summary: List scheduled jobs
            description: |-
                Returns the catalog of Hub-owned scheduled jobs with their runtime
                status. The Control Plane proxies this read to the Nexus Hub
                runtime API; the response body is the Hub job list passed through
                unchanged. Supports limit/offset pagination plus name/description
                search and an enabled filter.
            x-nexus-iam-action: iam.ResourceSettings.Action(iam.VerbRead)
            x-nexus-tier: auto
            parameters:
                - name: limit
                  in: query
                  description: Maximum number of jobs to return. Defaults to 20 on the Hub when omitted or non-positive.
                  required: false
                  schema:
                    type: integer
                    default: 20
                - name: offset
                  in: query
                  description: Number of jobs to skip for pagination. Defaults to 0 when omitted or negative.
                  required: false
                  schema:
                    type: integer
                    default: 0
                - name: search
                  in: query
                  description: Case-insensitive substring matched against each job's name and description.
                  required: false
                  schema:
                    type: string
                - name: enabled
                  in: query
                  description: 'Filter by enabled state. Only the literal strings "true" and "false" are honored by the Hub; any other value is ignored.'
                  required: false
                  schema:
                    type: string
                    enum:
                        - "true"
                        - "false"
            responses:
                "200":
                    description: Paginated list of scheduled jobs with runtime status.
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    jobs:
                                        type: array
                                        items:
                                            $ref: '#/components/schemas/JobStatus'
                                    total:
                                        type: integer
                                        description: Total number of jobs matching the filters before pagination.
                                    limit:
                                        type: integer
                                    offset:
                                        type: integer
                            example:
                                jobs:
                                    - id: retention-sweep
                                      name: Retention Sweep
                                      description: Purges traffic events past their retention window.
                                      interval: 86400000000000
                                      enabled: true
                                      lastRun: "2026-05-29T02:00:00Z"
                                      lastDuration: 4200000000
                                      lastStatus: success
                                      nextRun: "2026-05-30T02:00:00Z"
                                      runCount: 142
                                      errorCount: 0
                                total: 1
                                limit: 20
                                offset: 0
    /api/admin/jobs/{id}:
        get:
            operationId: jobsGet
            summary: Get a scheduled job
            description: |-
                Returns the runtime status of a single Hub-owned scheduled job by
                its job ID. The Control Plane proxies this read to the Nexus Hub
                runtime API and returns the Hub job status unchanged.
            x-nexus-iam-action: iam.ResourceSettings.Action(iam.VerbRead)
            x-nexus-tier: auto
            parameters:
                - name: id
                  in: path
                  description: The scheduled job identifier.
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    description: The requested job's runtime status.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/JobStatus'
                            example:
                                id: retention-sweep
                                name: Retention Sweep
                                description: Purges traffic events past their retention window.
                                interval: 86400000000000
                                enabled: true
                                lastRun: "2026-05-29T02:00:00Z"
                                lastDuration: 4200000000
                                lastStatus: success
                                nextRun: "2026-05-30T02:00:00Z"
                                runCount: 142
                                errorCount: 0
        put:
            operationId: jobsUpdate
            summary: Enable or disable a scheduled job
            description: |-
                Toggles whether a Hub-owned scheduled job is enabled. Only the
                `enabled` field is mutable from the admin API — job metadata
                (name, description, interval) is owned by the code registration
                path on the Hub. The Control Plane buffers the request body to
                snapshot the intended state into the audit log, then proxies the
                update to the Nexus Hub runtime API.
            x-nexus-iam-action: iam.ResourceSettings.Action(iam.VerbUpdate)
            x-nexus-tier: confirm
            parameters:
                - name: id
                  in: path
                  description: The scheduled job identifier.
                  required: true
                  schema:
                    type: string
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required:
                                - enabled
                            properties:
                                enabled:
                                    type: boolean
                                    description: New enabled state for the job. The Hub rejects the request with 400 when this field is absent.
                        example:
                            enabled: false
            responses:
                "200":
                    description: The job's enabled state was updated.
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    ok:
                                        type: boolean
                                    jobId:
                                        type: string
                                    enabled:
                                        type: boolean
                            example:
                                ok: true
                                jobId: retention-sweep
                                enabled: false
                "400":
                    description: The request body was unreadable, or the required `enabled` field was missing.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                error: enabled field is required
    /api/admin/jobs/{id}/runs:
        get:
            operationId: jobsListRuns
            summary: List runs for a scheduled job
            description: |-
                Returns the execution history (run rows) for a single Hub-owned
                scheduled job, most recent first, with limit/offset pagination.
                The Control Plane proxies this read to the Nexus Hub runtime API
                and returns the Hub run list unchanged.
            x-nexus-iam-action: iam.ResourceSettings.Action(iam.VerbRead)
            x-nexus-tier: auto
            parameters:
                - name: id
                  in: path
                  description: The scheduled job identifier.
                  required: true
                  schema:
                    type: string
                - name: limit
                  in: query
                  description: Maximum number of runs to return. Clamped by the Hub to the range 1–500; defaults to 100 when omitted.
                  required: false
                  schema:
                    type: integer
                    default: 100
                    minimum: 1
                    maximum: 500
                - name: offset
                  in: query
                  description: Number of runs to skip for pagination. Defaults to 0 when omitted or negative.
                  required: false
                  schema:
                    type: integer
                    default: 0
            responses:
                "200":
                    description: Paginated list of job run records.
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    runs:
                                        type: array
                                        items:
                                            $ref: '#/components/schemas/JobRun'
                                    total:
                                        type: integer
                                        description: Total number of runs recorded for the job before pagination.
                                    limit:
                                        type: integer
                                    offset:
                                        type: integer
                            example:
                                runs:
                                    - id: 8f3c1b22-0a4e-4d9b-9b2a-1c2d3e4f5a6b
                                      jobId: retention-sweep
                                      startedAt: "2026-05-29T02:00:00Z"
                                      finishedAt: "2026-05-29T02:00:04Z"
                                      durationMs: 4200
                                      status: success
                                total: 1
                                limit: 100
                                offset: 0
    /api/admin/jobs/{id}/trigger:
        post:
            operationId: jobsTrigger
            summary: Manually trigger a scheduled job
            description: |-
                Forces an out-of-schedule run of a Hub-owned scheduled job. The
                Control Plane proxies the trigger to the Nexus Hub runtime API and,
                on success, records an audit entry naming the actor who forced the
                run. No request body is required.
            x-nexus-iam-action: iam.ResourceSettings.Action(iam.VerbUpdate)
            x-nexus-tier: confirm
            parameters:
                - name: id
                  in: path
                  description: The scheduled job identifier.
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    description: The job run was triggered.
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    ok:
                                        type: boolean
                                    jobId:
                                        type: string
                                    triggeredAt:
                                        type: string
                                        format: date-time
                                        description: RFC 3339 timestamp at which the Hub accepted the trigger.
                            example:
                                ok: true
                                jobId: retention-sweep
                                triggeredAt: "2026-05-29T12:34:56Z"
components:
    schemas:
        JobStatus:
            type: object
            description: Runtime state of a Hub-owned scheduled job.
            properties:
                id:
                    type: string
                name:
                    type: string
                description:
                    type: string
                interval:
                    type: integer
                    description: Configured run interval as a Go duration in nanoseconds.
                enabled:
                    type: boolean
                lastRun:
                    type: string
                    format: date-time
                    nullable: true
                lastDuration:
                    type: integer
                    description: Duration of the last run as a Go duration in nanoseconds.
                lastStatus:
                    type: string
                    description: Outcome of the last observed run.
                    enum:
                        - success
                        - error
                        - running
                        - skipped
                lastError:
                    type: string
                    description: Error message from the last run; omitted when empty.
                nextRun:
                    type: string
                    format: date-time
                    nullable: true
                runCount:
                    type: integer
                    format: int64
                errorCount:
                    type: integer
                    format: int64
        JobRun:
            type: object
            description: A single execution record of a scheduled job (job_run row).
            properties:
                id:
                    type: string
                jobId:
                    type: string
                startedAt:
                    type: string
                    format: date-time
                finishedAt:
                    type: string
                    format: date-time
                    description: Completion time; omitted while the run is in progress.
                durationMs:
                    type: integer
                    description: Run duration in milliseconds; omitted while the run is in progress.
                status:
                    type: string
                    description: Outcome of the run.
                    enum:
                        - running
                        - success
                        - error
                        - skipped
                        - interrupted
                error:
                    type: string
                    description: Error message; populated only when status is "error", otherwise omitted.
                replicaId:
                    type: string
                    description: Pod or host identifier that executed the run; omitted when empty.
