                                additionalProperties: {}
        post:
            operationId: addProviderModel
            summary: Add a model to a provider
            description: |-
                Registers a new model under the provider. code defaults to
                providerModelId, which in turn defaults to name when either is
                omitted. Returns 404 when the provider does not exist and 409 when the
                model code or the per-provider (providerId, providerModelId) natural
