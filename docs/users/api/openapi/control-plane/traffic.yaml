    /api/admin/traffic/{id}:
        get:
            operationId: getTrafficEvent
            summary: Get a single traffic event
            description: |-
                Returns one traffic event by id. Bodies that were spilled to external
                storage are resolved in-line so request and response bodies appear in
                the same shape regardless of inline-vs-spill storage.
            x-nexus-iam-action: iam.ResourceTrafficLog.Action(iam.VerbRead)
            x-nexus-tier: auto
            parameters:
                - name: id
                  in: path
                  description: Traffic event id.
                  required: true
                  schema:
                    type: string
            responses:
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "404":
                    description: Not Found
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/trafficstore_TrafficEvent'
    /api/admin/traffic/{id}/normalized:
        get:
            operationId: getTrafficEventNormalized
            summary: Get the normalized sidecar for a traffic event
            description: |-
                Returns the normalized payload sidecar for a traffic event — the canonical
                normalized request/response plus normalize status, error reason, and redaction
                spans. Returns 404 when the traffic event does not exist or no normalize row
                was produced (for example, payload capture was off or the protocol could not
                be mapped). Gated by the same read action as the traffic event itself.
            x-nexus-iam-action: iam.ResourceTrafficLog.Action(iam.VerbRead)
            x-nexus-tier: auto
            parameters:
                - name: id
                  in: path
                  description: Traffic event id whose normalized sidecar is requested.
                  required: true
                  schema:
                    type: string
            responses:
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "404":
                    description: Not Found
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/trafficstore_TrafficEventNormalized'
    /api/admin/traffic/storage:
        get:
            operationId: trafficStorage
            summary: Get traffic storage configuration
            description: |-
                Returns the traffic storage configuration. The current backend is
                database-backed and queryable.
            x-nexus-iam-action: iam.ResourceTrafficLog.Action(iam.VerbRead)
