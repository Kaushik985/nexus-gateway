# Latency test — single-concurrency run to measure baseline round-trip latency.
# No retries so each request reflects true first-attempt latency.
# Compare p50/p95/p99 across gateways with identical model and prompt size.
#
# Fair benchmarking note:
#   - Run on the same machine with no competing workloads.
#   - Use the same model and max_tokens across all gateways.
#   - Caching must be OFF or ON consistently — document in caching.note.

gateway_name: "Nexus"
base_url: "http://localhost:8080"
endpoint: "/v1/chat/completions"

auth:
  api_key: "$NEXUS_API_KEY"

payload:
  model: "openai/gpt-4o-mini"
  max_tokens: 256
  temperature: 0.0
  stream: false

profile: latency
concurrency_levels: [1]
total_requests: 50
timeout_seconds: 30.0
warmup_requests: 5

retry:
  enabled: false        # Disabled intentionally: we want raw first-attempt latency
  max_attempts: 1
  backoff_seconds: 0.0

caching:
  enabled: false
  note: ""

static_prompt: "Explain what a transformer model is in two sentences."
output_dir: "results"
failure_threshold_pct: 25.0
