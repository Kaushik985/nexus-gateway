paths:
    /api/admin/analytics/by-provider:
        get:
            operationId: analyticsByProvider
            summary: Traffic aggregates grouped by provider
            description: |-
                Returns request/cost/token aggregates grouped by routed provider over the
                requested time window. Served from the metric rollup; if the rollup has no
                rows for the window an empty `data` array is returned.

                The time window is read from the query string as `startTime`/`endTime`
                (RFC3339, with `start`/`end` accepted as aliases). Both default to the
                rollup cascade's own range when omitted.
            x-nexus-iam-action: iam.ResourceAnalytics.Action(iam.VerbRead)
            x-nexus-tier: auto
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                data: []
    /api/admin/analytics/by-user:
        get:
            operationId: analyticsByUser
            summary: Cost aggregates grouped by user
            description: |-
                Returns cost-ranked aggregates grouped by the requesting user over the
                requested time window, along with the total group count for pagination.
                Group results are enriched with the user's display name.

                Window is read as `startTime`/`endTime` (RFC3339; `start`/`end` aliases).
                Pagination is controlled by `limit`, `offset`, and a free-text `q` search.
            x-nexus-iam-action: iam.ResourceAnalytics.Action(iam.VerbRead)
            x-nexus-tier: auto
            responses:
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                data: []
                                total: 0
    /api/admin/analytics/cache-roi:
        get:
            operationId: analyticsCacheROI
            summary: Cache return-on-investment summary
            description: |-
                Returns cache ROI metrics aggregated over the requested time window:
                gateway-cache savings, provider prompt-cache net savings, write/read costs,
                cache token counts, normalized-strip stats, plus per-adapter and per-day
                breakdowns. Totals are sourced from the metric rollup when available and
                from a direct `traffic_event` scan otherwise; the `dataSource` field
                reports which path served the response (`rollup` or `direct`).

                Window defaults to the trailing 30 days; override with `start`/`end`
                (RFC3339). `periodDays` is derived from the resolved window.
            x-nexus-iam-action: iam.ResourceAnalytics.Action(iam.VerbRead)
            x-nexus-tier: auto
            responses:
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/handler_CacheROISummary'
    /api/admin/analytics/cost:
        get:
            operationId: analyticsCost
            summary: Top-N cost breakdown by dimension
            description: |-
                Returns the top-N entries by estimated cost for the requested grouping
                dimension over the time window, plus the total group count. Group IDs are
                enriched with human-readable labels. Served from the metric rollup; an
                empty result is returned when the rollup has no rows.

                The top-N cap is set by `limit` (default 10, clamped to 100). Window is
                read as `startTime`/`endTime` (RFC3339; `start`/`end` aliases).
            x-nexus-iam-action: iam.ResourceAnalytics.Action(iam.VerbRead)
            x-nexus-tier: auto
            parameters:
                - name: groupBy
                  in: query
                  required: false
                  description: |-
                    Dimension to group cost by. Unrecognized or omitted values fall back to
                    `provider`. Enum values are the keys of `usageGroupByMap` in the
                    handler (analytics.go).
                  schema:
                    type: string
                    enum:
                        - provider
                        - model
                        - project
                        - organization
                        - user
                        - virtual_key
                        - host
                        - device
                    default: provider
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                data: []
                                total: 0
    /api/admin/analytics/cost-report:
        get:
            operationId: analyticsCostReport
            summary: Cost report grouped by organization
            description: |-
                Returns a cost report aggregated by organization over the time window,
                with organization IDs enriched to display names, plus the total group
                count. Served from the metric rollup; an empty result is returned when the
                rollup has no rows. Window is read as `startTime`/`endTime` (RFC3339;
