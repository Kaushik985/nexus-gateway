# nfpm config — single source for .deb + .rpm packages of the Nexus
# Agent on Linux. Run via `nfpm pkg --packager deb -f nfpm.yaml` (and
# again with --packager rpm). The wrapper at scripts/package.sh
# orchestrates both.
#
# nfpm reads $VERSION at runtime so the same file works for any tag.
name: "nexus-agent"
arch: "amd64"
platform: "linux"
version: "${VERSION:-1.0.0}"
section: "net"
priority: "optional"
maintainer: "Nexus Gateway <support@nexus-gateway.com>"
description: |
  Nexus Agent — desktop component of the Nexus Gateway. Intercepts
  outbound AI/network traffic for compliance enforcement and routes it
  through a Nexus Hub-managed policy plane. Ships with a system tray
  applet and a Wails-based Dashboard for end-user controls.
vendor: "Nexus Gateway"
homepage: "https://nexus-gateway.com"
license: "Proprietary"

# .deb specific
deb:
  fields:
    Bugs: "https://nexus-gateway.com/support"

# .rpm specific
rpm:
  group: "Applications/System"
  compression: "lzma"

contents:
  # ─── Binaries ─────────────────────────────────────────────────────
  - src: ./dist/linux/staging/nexus-agent
    dst: /usr/lib/nexus-agent/nexus-agent
    file_info:
      mode: 0755
  - src: ./dist/linux/staging/nexus-agent-tray
    dst: /usr/lib/nexus-agent/nexus-agent-tray
    file_info:
      mode: 0755
  - src: ./dist/linux/staging/nexus-dashboard
    dst: /usr/lib/nexus-agent/nexus-dashboard
    file_info:
      mode: 0755

  # CLI symlink so `nexus-agent enroll …` works without an explicit
  # path. We deliberately do NOT symlink nexus-agent-tray /
  # nexus-dashboard — they're launched by systemd / the tray, not by
  # the operator.
  - src: /usr/lib/nexus-agent/nexus-agent
    dst: /usr/bin/nexus-agent
    type: symlink

  # iptables cleanup belt — invoked by the systemd unit's
  # ExecStopPost= to scrub the NEXUS_AGENT chain after unclean
  # shutdowns (SIGKILL / OOM).
  - src: ./packages/agent/platform/linux/installer/scripts/iptables-cleanup.sh
    dst: /usr/lib/nexus-agent/iptables-cleanup.sh
    file_info:
      mode: 0755

  # ─── Config ───────────────────────────────────────────────────────
  - src: ./packages/agent/platform/linux/installer/conf/agent.yaml
    dst: /etc/nexus-agent/agent.yaml
    type: config|noreplace
    file_info:
      mode: 0640

  # ─── systemd units ────────────────────────────────────────────────
  - src: ./packages/agent/platform/linux/installer/systemd/nexus-agent.service
    dst: /usr/lib/systemd/system/nexus-agent.service
    file_info:
      mode: 0644
  - src: ./packages/agent/platform/linux/installer/systemd/nexus-agent-tray.service
    dst: /usr/lib/systemd/user/nexus-agent-tray.service
    file_info:
      mode: 0644

  # ─── Desktop autostart + application menu entry ───────────────────
  - src: ./packages/agent/platform/linux/installer/applications/nexus-agent-tray.desktop
    dst: /usr/share/applications/nexus-agent-tray.desktop
    file_info:
      mode: 0644
  # Autostart copy under /etc/xdg/autostart/ so the tray comes up on
  # login even on desktops that don't honour graphical-session.target.
  - src: ./packages/agent/platform/linux/installer/applications/nexus-agent-tray.desktop
    dst: /etc/xdg/autostart/nexus-agent-tray.desktop
    file_info:
      mode: 0644

# Hook scripts for systemd (un)register + state-dir creation.
scripts:
  postinstall: ./packages/agent/platform/linux/installer/scripts/postinstall.sh
  preremove:   ./packages/agent/platform/linux/installer/scripts/preremove.sh
  postremove:  ./packages/agent/platform/linux/installer/scripts/postremove.sh

# Empty state directories nfpm should create. systemd's StateDirectory /
# LogsDirectory will also create these, but listing them here lets the
# package install cleanly before the daemon ever runs.
empty_folders:
  - /var/lib/nexus-agent
  - /var/log/nexus-agent
