        post:
            operationId: testAlertChannel
            summary: Send a synthetic test alert through a channel
            description: |-
                Dispatches a synthetic alert through the channel's configured sender to
                verify delivery, records the dispatch attempt, then immediately resolves
                the synthetic alert so it never lingers in the inbox. Returns HTTP 200
                with `success: true` on delivery, or HTTP 500 with `success: false` and
                the sender error/status on failure. The Control Plane records an
                admin_audit entry on success. Forwarded to Hub. Unknown id returns
                HTTP 404.
            x-nexus-iam-action: iam.ResourceAlert.Action(iam.VerbUpdate)
            x-nexus-tier: confirm
