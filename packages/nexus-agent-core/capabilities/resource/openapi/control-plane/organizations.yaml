    /api/admin/organizations:
        get:
            operationId: listOrganizations
            summary: List organizations
            description: |-
                Returns every organization in the tenant, each enriched with child,
                project, and user counts computed in a single query. The payload is
                wrapped in a `data` array.
            x-nexus-iam-action: iam.ResourceOrganization.Action(iam.VerbRead)
            x-nexus-tier: auto
            responses:
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    data:
                                        type: array
                                        items:
                                            $ref: '#/components/schemas/orgstore_Organization'
                            example:
                                data:
                                    - id: org_01HXYZ
                                      name: Acme Corp
                                      code: acme
                                      parentId: null
                                      path: /org_01HXYZ/
                                      enabled: true
                                      timezone: America/New_York
                                      source: local
                                      createdAt: "2026-01-15T09:30:00Z"
                                      updatedAt: "2026-01-15T09:30:00Z"
                                      childCount: 2
                                      projectCount: 5
                                      userCount: 40
        post:
            operationId: createOrganization
            summary: Create an organization
            description: |-
                Creates a new organization. `name` and `code` are mandatory and must
                be non-empty; the handler rejects the request with 400 otherwise.
                On success the ai-gateway policy cache is invalidated so the new org
                becomes routable without a gateway restart.
            x-nexus-iam-action: iam.ResourceOrganization.Action(iam.VerbCreate)
            x-nexus-tier: confirm
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                name:
                                    type: string
                                    description: Display name of the organization. Required, must be non-empty.
                                code:
                                    type: string
                                    description: Short unique code for the organization. Required, must be non-empty.
                                parentId:
                                    type:
                                        - string
                                        - "null"
                                    description: ID of the parent organization, or null for a root org.
                                description:
                                    type:
                                        - string
                                        - "null"
                                contactName:
                                    type:
                                        - string
                                        - "null"
                                contactEmail:
                                    type:
                                        - string
                                        - "null"
                                contactPhone:
                                    type:
                                        - string
                                        - "null"
                                timezone:
                                    type: string
                                    description: IANA timezone name used for business-rule semantics (quota resets, business hours).
                            required:
                                - name
                                - code
                        example:
                            name: Acme Corp
                            code: acme
                            timezone: America/New_York
                            contactEmail: ops@acme.example
