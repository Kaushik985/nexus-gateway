# Hand-maintained OpenAPI spec, verified claim-by-claim against the control-plane
# handler code (the single source of truth) via the openapi-review skill. Keep
# structural fields (paths/verbs/types) in lockstep with the handlers.
openapi: 3.1.0
info:
    title: Nexus Control Plane Admin API — iam
    version: dev
    description: 'Hand-maintained against control-plane source: field names, types, optionality, status codes and IAM tiers mirror the handler code; enum value sets and required-field rules enforced imperatively in handlers are verified by the openapi-review skill.'
paths:
    /api/admin/iam/action-catalog:
        get:
            operationId: getActionCatalog
            summary: List the IAM action catalog
            description: |-
                Returns the canonical IAM resource-by-verb table compiled into the
                server. Each entry lists a resource type, its owning service, the
                wildcard NRN form, and the set of verbs (each with the fully
                qualified action name and SIEM event type) that can be granted on
                that resource. This is static reference data used to populate the
                policy editor and is not access-gated.
            x-nexus-tier: auto
            responses:
                "200":
                    description: The IAM resource/verb catalog.
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    resources:
                                        type: array
                                        description: One entry per IAM resource type.
                                        items:
                                            type: object
                                            properties:
                                                type:
                                                    type: string
                                                    description: Resource type name (e.g. IamPolicy).
                                                service:
                                                    type: string
                                                    description: Owning service of the resource.
                                                nrn:
                                                    type: string
                                                    description: Wildcard Nexus Resource Name for the resource.
                                                actions:
                                                    type: array
                                                    description: Verbs grantable on this resource.
                                                    items:
                                                        type: object
                                                        properties:
                                                            verb:
                                                                type: string
                                                                description: Verb identifier.
                                                            name:
                                                                type: string
                                                                description: Fully qualified action name (resource.verb).
                                                            siem:
                                                                type: string
                                                                description: SIEM event type emitted for this action.
                            example:
                                resources:
                                    - type: IamPolicy
                                      service: control-plane
                                      nrn: nrn:control-plane:iam-policy:*:*
                                      actions:
                                        - verb: read
                                          name: iam-policy.read
                                          siem: iam.policy.read
    /api/admin/iam/groups:
        get:
            operationId: listIAMGroups
            summary: List IAM groups
            description: Returns all IAM groups (roles) along with the total count. Groups bundle policies and members for role-based access management.
            x-nexus-iam-action: iam.ResourceIamGroup.Action(iam.VerbRead)
            x-nexus-tier: auto
            responses:
                "500":
                    description: Listing the groups failed.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: The list of IAM groups.
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    data:
                                        type: array
                                        description: The IAM groups.
                                        items:
                                            $ref: '#/components/schemas/iamstore_GroupRow'
                                    total:
                                        type: integer
                                        description: Number of groups returned.
                            example:
                                data:
                                    - id: 4f9b2c10-1a2b-4c3d-8e4f-5a6b7c8d9e0f
                                      name: platform-admins
                                      description: Operators who manage platform configuration.
                                      createdBy: usr_01HZX
                                      createdAt: 2026-01-15T09:30:00Z
                                      updatedAt: 2026-01-15T09:30:00Z
                                total: 1
        post:
            operationId: createIAMGroup
            summary: Create an IAM group
            description: Creates a new IAM group (role). The group is initially empty; members and policies are attached through the dedicated sub-resource endpoints.
            x-nexus-iam-action: iam.ResourceIamGroup.Action(iam.VerbCreate)
            x-nexus-tier: confirm
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                name:
                                    type: string
                                    description: Group display name. Must be non-empty.
                                description:
                                    type:
                                        - string
                                        - "null"
                                    description: Optional human-readable description.
                            required:
                                - name
                        example:
                            name: platform-admins
                            description: Operators who manage platform configuration.
            responses:
                "400":
                    description: The request body was invalid or `name` was empty.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "500":
                    description: Creating the group failed.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "201":
                    description: The created group.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/iamstore_GroupRow'
                            example:
                                id: 4f9b2c10-1a2b-4c3d-8e4f-5a6b7c8d9e0f
                                name: platform-admins
                                description: Operators who manage platform configuration.
                                createdBy: usr_01HZX
                                createdAt: 2026-01-15T09:30:00Z
                                updatedAt: 2026-01-15T09:30:00Z
    /api/admin/iam/groups/{id}:
        get:
            operationId: getIAMGroup
            summary: Get an IAM group
            description: Returns a single IAM group together with its members and attached policies. Each policy attachment embeds a nested policy object carrying the policy id and name.
            x-nexus-iam-action: iam.ResourceIamGroup.Action(iam.VerbRead)
            x-nexus-tier: auto
            parameters:
                - name: id
                  in: path
                  required: true
                  description: Group identifier.
                  schema:
                    type: string
            responses:
                "404":
                    description: No group exists with the given id.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: The group with members and policy attachments.
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    id:
                                        type: string
                                    name:
                                        type: string
                                    description:
                                        type:
                                            - string
                                            - "null"
                                    createdBy:
                                        type:
                                            - string
                                            - "null"
                                    createdAt:
                                        type: string
                                        format: date-time
                                    updatedAt:
                                        type: string
                                        format: date-time
                                    members:
                                        type: array
                                        description: Group members.
                                        items: {}
                                    policyAttachments:
                                        type: array
                                        description: Policies attached to the group, each with a nested policy object.
                                        items:
                                            type: object
                                            properties:
                                                id:
                                                    type: string
                                                policyId:
                                                    type: string
                                                policy:
                                                    type: object
                                                    properties:
                                                        id:
                                                            type: string
                                                        name:
                                                            type: string
                                                createdAt: {}
                            example:
                                id: 4f9b2c10-1a2b-4c3d-8e4f-5a6b7c8d9e0f
                                name: platform-admins
                                description: Operators who manage platform configuration.
                                createdBy: usr_01HZX
                                createdAt: 2026-01-15T09:30:00Z
                                updatedAt: 2026-01-15T09:30:00Z
                                members: []
                                policyAttachments:
                                    - id: att_01HZX
                                      policyId: pol_01HZX
                                      policy:
                                        id: pol_01HZX
                                        name: full-admin
                                      createdAt: 2026-01-15T09:31:00Z
        put:
            operationId: updateIAMGroup
            summary: Update an IAM group
            description: Updates a group's name and/or description. Both fields are optional; omitted fields are left unchanged.
            x-nexus-iam-action: iam.ResourceIamGroup.Action(iam.VerbUpdate)
            x-nexus-tier: confirm
            parameters:
                - name: id
                  in: path
                  required: true
                  description: Group identifier.
                  schema:
                    type: string
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                name:
                                    type:
                                        - string
                                        - "null"
                                    description: New group name. Omit to leave unchanged.
                                description:
                                    type:
                                        - string
                                        - "null"
                                    description: New description. Omit to leave unchanged.
                        example:
                            description: Operators who manage platform and routing configuration.
            responses:
                "400":
                    description: The request body could not be parsed.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "500":
                    description: Updating the group failed.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: The updated group.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/iamstore_GroupRow'
                            example:
                                id: 4f9b2c10-1a2b-4c3d-8e4f-5a6b7c8d9e0f
                                name: platform-admins
                                description: Operators who manage platform and routing configuration.
                                createdBy: usr_01HZX
                                createdAt: 2026-01-15T09:30:00Z
                                updatedAt: 2026-01-16T11:00:00Z
        delete:
            operationId: deleteIAMGroup
            summary: Delete an IAM group
            description: Deletes an IAM group. Members and policy attachments of the group are removed as part of the deletion.
            x-nexus-iam-action: iam.ResourceIamGroup.Action(iam.VerbDelete)
            x-nexus-tier: confirm
            parameters:
                - name: id
                  in: path
                  required: true
                  description: Group identifier.
                  schema:
                    type: string
            responses:
                "404":
                    description: No group exists with the given id.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "204":
                    description: The group was deleted.
    /api/admin/iam/groups/{id}/members:
        get:
            operationId: listIAMGroupMembers
            summary: List group members
            description: Returns the paginated members of a group together with the total member count.
            x-nexus-iam-action: iam.ResourceIamGroup.Action(iam.VerbRead)
            x-nexus-tier: auto
            parameters:
                - name: id
                  in: path
                  required: true
                  description: Group identifier.
                  schema:
                    type: string
            responses:
                "500":
                    description: Listing the members failed.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: The group members.
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    data:
                                        type: array
                                        description: The group members.
                                        items: {}
                                    total:
                                        type: integer
                                        description: Total number of members in the group.
                            example:
                                data:
                                    - id: mem_01HZX
                                      principalType: nexus_user
                                      principalId: usr_01HZX
                                total: 1
        post:
            operationId: addIAMGroupMember
            summary: Add a member to a group
            description: |-
                Adds a principal to a group. `principalId` is required. When
                `principalType` is omitted it defaults to `nexus_user`. Adding a
                `nexus_user` member can grant new policies, so live sessions for
                that user are revoked to force a fresh permission set on the next
                token mint.
            x-nexus-iam-action: iam.ResourceIamGroup.Action(iam.VerbUpdate)
            x-nexus-tier: confirm
            parameters:
                - name: id
                  in: path
                  required: true
                  description: Group identifier.
                  schema:
                    type: string
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                principalType:
                                    type: string
                                    description: Principal kind. Defaults to `nexus_user` when omitted.
                                principalId:
                                    type: string
                                    description: Identifier of the principal to add. Must be non-empty.
                            required:
                                - principalId
                        example:
                            principalType: nexus_user
                            principalId: usr_01HZX
            responses:
                "400":
                    description: The request body was invalid or `principalId` was empty.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "500":
                    description: Adding the member failed.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "201":
                    description: The created membership identifier.
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    id:
                                        type: string
                                        description: Membership identifier.
                            example:
                                id: mem_01HZX
    /api/admin/iam/groups/{id}/members/{membershipId}:
        delete:
            operationId: removeIAMGroupMember
            summary: Remove a member from a group
            description: Removes a membership from a group by membership id. If the removed principal is a `nexus_user`, its live sessions are revoked so the data plane drops the group's policies on the next token mint.
            x-nexus-iam-action: iam.ResourceIamGroup.Action(iam.VerbUpdate)
            x-nexus-tier: confirm
            parameters:
                - name: id
                  in: path
                  required: true
                  description: Group identifier.
                  schema:
                    type: string
                - name: membershipId
                  in: path
                  required: true
                  description: Membership identifier returned when the member was added.
                  schema:
                    type: string
            responses:
                "404":
                    description: No membership exists with the given id.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "204":
                    description: The membership was removed.
    /api/admin/iam/groups/{id}/policies:
        post:
            operationId: attachIAMGroupPolicy
            summary: Attach a policy to a group
            description: Attaches an IAM policy to a group. Every `nexus_user` member of the group has its live sessions revoked so the expanded permission set takes effect on the next token mint.
            x-nexus-iam-action: iam.ResourceIamGroup.Action(iam.VerbUpdate)
            x-nexus-tier: confirm
            parameters:
                - name: id
                  in: path
                  required: true
                  description: Group identifier.
                  schema:
                    type: string
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                policyId:
                                    type: string
                                    description: Identifier of the policy to attach. Must be non-empty.
                            required:
                                - policyId
                        example:
                            policyId: pol_01HZX
            responses:
                "400":
                    description: The request body was invalid or `policyId` was empty.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "500":
                    description: Attaching the policy failed.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "201":
                    description: The created policy-attachment identifier.
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    id:
                                        type: string
                                        description: Attachment identifier.
                            example:
                                id: att_01HZX
    /api/admin/iam/groups/{id}/policies/{attachmentId}:
        delete:
            operationId: detachIAMGroupPolicy
            summary: Detach a policy from a group
            description: Removes a policy attachment from a group by attachment id. Every `nexus_user` member of the group has its live sessions revoked so the reduced permission set takes effect on the next token mint.
            x-nexus-iam-action: iam.ResourceIamGroup.Action(iam.VerbUpdate)
            x-nexus-tier: confirm
            parameters:
                - name: id
                  in: path
                  required: true
                  description: Group identifier.
                  schema:
                    type: string
                - name: attachmentId
                  in: path
                  required: true
                  description: Policy-attachment identifier.
                  schema:
                    type: string
            responses:
                "404":
                    description: No policy attachment exists with the given id.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "204":
                    description: The policy attachment was removed.
    /api/admin/iam/policies:
        get:
            operationId: listIAMPolicies
            summary: List IAM policies
            description: Returns IAM policies and the total count, with optional filtering by enabled state, free-text query, and policy type.
            x-nexus-iam-action: iam.ResourceIamPolicy.Action(iam.VerbRead)
            x-nexus-tier: auto
            parameters:
                - name: enabled
                  in: query
                  required: false
                  description: Filter by enabled state. Only the literal strings `true` and `false` are honoured; any other value applies no enabled filter.
                  schema:
                    type: string
                    enum:
                        - "true"
                        - "false"
                - name: q
                  in: query
                  required: false
                  description: Free-text search applied to the policy name.
                  schema:
                    type: string
                - name: type
                  in: query
                  required: false
                  description: Filter by policy type.
                  schema:
                    type: string
            responses:
                "500":
                    description: Listing the policies failed.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: The list of IAM policies.
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    data:
                                        type: array
                                        description: The IAM policies.
                                        items:
                                            $ref: '#/components/schemas/iamstore_PolicyRow'
                                    total:
                                        type: integer
                                        description: Total number of policies matching the filters.
                            example:
                                data:
                                    - id: pol_01HZX
                                      name: full-admin
                                      description: Full administrative access.
                                      type: custom
                                      document:
                                        version: "2025-01-01"
                                        statements: []
                                      enabled: true
                                      createdBy: usr_01HZX
                                      createdAt: 2026-01-15T09:30:00Z
                                      updatedAt: 2026-01-15T09:30:00Z
                                total: 1
        post:
            operationId: createIAMPolicy
            summary: Create an IAM policy
            description: Creates a custom IAM policy. Both `name` and `document` are required; the policy is created with type `custom` and enabled.
            x-nexus-iam-action: iam.ResourceIamPolicy.Action(iam.VerbCreate)
            x-nexus-tier: confirm
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                name:
                                    type: string
                                    description: Policy display name. Must be non-empty.
                                description:
                                    type:
                                        - string
                                        - "null"
                                    description: Optional human-readable description.
                                document:
                                    description: Policy document (statements). Required; must be non-empty.
                            required:
                                - name
                                - document
                        example:
                            name: full-admin
                            description: Full administrative access.
                            document:
                                version: "2025-01-01"
                                statements:
                                    - effect: Allow
                                      action: ["*"]
                                      resource: ["*"]
            responses:
                "400":
                    description: The request body was invalid, or `name` or `document` was missing.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "500":
                    description: Creating the policy failed.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "201":
                    description: The created policy.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/iamstore_PolicyRow'
                            example:
                                id: pol_01HZX
                                name: full-admin
                                description: Full administrative access.
                                type: custom
                                document:
                                    version: "2025-01-01"
                                    statements: []
                                enabled: true
                                createdBy: usr_01HZX
                                createdAt: 2026-01-15T09:30:00Z
                                updatedAt: 2026-01-15T09:30:00Z
    /api/admin/iam/policies/{id}:
        get:
            operationId: getIAMPolicy
            summary: Get an IAM policy
            description: Returns a single IAM policy by id, including its document, type, and enabled state.
            x-nexus-iam-action: iam.ResourceIamPolicy.Action(iam.VerbRead)
            x-nexus-tier: auto
            parameters:
                - name: id
                  in: path
                  required: true
                  description: Policy identifier.
                  schema:
                    type: string
            responses:
                "404":
                    description: No policy exists with the given id.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: The IAM policy.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/iamstore_PolicyRow'
                            example:
                                id: pol_01HZX
                                name: full-admin
                                description: Full administrative access.
                                type: custom
                                document:
                                    version: "2025-01-01"
                                    statements: []
                                enabled: true
                                createdBy: usr_01HZX
                                createdAt: 2026-01-15T09:30:00Z
                                updatedAt: 2026-01-15T09:30:00Z
        put:
            operationId: updateIAMPolicy
            summary: Update an IAM policy
            description: |-
                Updates a policy's name, description, enabled state, and/or
                document. All fields are optional; omitted fields are left
                unchanged. Updating a policy revokes the live sessions of every
                `nexus_user` who holds it directly or via a group so the changed
                permission set takes effect on the next token mint.
            x-nexus-iam-action: iam.ResourceIamPolicy.Action(iam.VerbUpdate)
            x-nexus-tier: confirm
            parameters:
                - name: id
                  in: path
                  required: true
                  description: Policy identifier.
                  schema:
                    type: string
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                name:
                                    type:
                                        - string
                                        - "null"
                                    description: New policy name. Omit to leave unchanged.
                                description:
                                    type:
                                        - string
                                        - "null"
                                    description: New description. Omit to leave unchanged.
                                enabled:
                                    type:
                                        - boolean
                                        - "null"
                                    description: New enabled state. Omit to leave unchanged.
                                document:
                                    description: New policy document. Applied only when present; omit to leave unchanged.
                        example:
                            enabled: false
            responses:
                "400":
                    description: The request body could not be parsed.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "500":
                    description: Updating the policy failed.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: The updated policy.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/iamstore_PolicyRow'
                            example:
                                id: pol_01HZX
                                name: full-admin
                                description: Full administrative access.
                                type: custom
                                document:
                                    version: "2025-01-01"
                                    statements: []
                                enabled: false
                                createdBy: usr_01HZX
                                createdAt: 2026-01-15T09:30:00Z
                                updatedAt: 2026-01-16T11:00:00Z
        delete:
            operationId: deleteIAMPolicy
            summary: Delete an IAM policy
            description: Deletes an IAM policy by id and invalidates the IAM evaluation cache.
            x-nexus-iam-action: iam.ResourceIamPolicy.Action(iam.VerbDelete)
            x-nexus-tier: confirm
            parameters:
                - name: id
                  in: path
                  required: true
                  description: Policy identifier.
                  schema:
                    type: string
            responses:
                "500":
                    description: Deleting the policy failed.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "204":
                    description: The policy was deleted.
    /api/admin/iam/policies/{id}/attachments:
        get:
            operationId: listPolicyAttachments
            summary: List a policy's attachments
            description: Returns every place the policy is attached — the groups (roles) that carry it, each with their members, plus the direct principal attachments.
            x-nexus-iam-action: iam.ResourceIamPolicy.Action(iam.VerbRead)
            x-nexus-tier: auto
            parameters:
                - name: id
                  in: path
                  required: true
                  description: Policy identifier.
                  schema:
                    type: string
            responses:
                "500":
                    description: Listing the attachments failed.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: The policy's group and direct attachments.
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    roles:
                                        type: array
                                        description: Groups that carry this policy.
                                        items:
                                            type: object
                                            properties:
                                                id:
                                                    type: string
                                                name:
                                                    type: string
                                                memberCount:
                                                    type: integer
                                                members:
                                                    type: array
                                                    items:
                                                        type: object
                                                        properties:
                                                            principalType:
                                                                type: string
                                                            principalId:
                                                                type: string
                                    directAttachments:
                                        type: array
                                        description: Direct principal attachments of this policy.
                                        items: {}
                            example:
                                roles:
                                    - id: grp_01HZX
                                      name: platform-admins
                                      memberCount: 1
                                      members:
                                        - principalType: nexus_user
                                          principalId: usr_01HZX
                                directAttachments: []
    /api/admin/iam/principals/{type}/{id}/policies:
        get:
            operationId: listPrincipalPolicies
            summary: List a principal's policy attachments
            description: Returns the IAM policies attached directly to a principal, identified by principal type and id.
            x-nexus-iam-action: iam.ResourceIamPolicy.Action(iam.VerbRead)
            x-nexus-tier: auto
            parameters:
                - name: type
                  in: path
                  required: true
                  description: Principal kind (e.g. nexus_user).
                  schema:
                    type: string
                - name: id
                  in: path
                  required: true
                  description: Principal identifier.
                  schema:
                    type: string
            responses:
                "500":
                    description: Listing the principal's policies failed.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: The principal's direct policy attachments.
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    data:
                                        type: array
                                        description: Direct policy attachments for the principal.
                                        items: {}
                            example:
                                data:
                                    - id: att_01HZX
                                      policyId: pol_01HZX
                                      expiresAt: null
        post:
            operationId: attachPrincipalPolicy
            summary: Attach a policy to a principal
            description: |-
                Attaches an IAM policy directly to a principal. `policyId` is
                required. `expiresAt`, when supplied, must be an RFC3339 timestamp
                in the future; omitting it grants a permanent attachment. For a
                `nexus_user` principal, live sessions are revoked so the new
                permissions apply on the next token mint.
            x-nexus-iam-action: iam.ResourceIamPolicy.Action(iam.VerbUpdate)
            x-nexus-tier: confirm
            parameters:
                - name: type
                  in: path
                  required: true
                  description: Principal kind (e.g. nexus_user).
                  schema:
                    type: string
                - name: id
                  in: path
                  required: true
                  description: Principal identifier.
                  schema:
                    type: string
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                policyId:
                                    type: string
                                    description: Identifier of the policy to attach. Must be non-empty.
                                expiresAt:
                                    type:
                                        - string
                                        - "null"
                                    format: date-time
                                    description: Optional RFC3339 expiry. Must be in the future; omit or null for a permanent attachment.
                            required:
                                - policyId
                        example:
                            policyId: pol_01HZX
                            expiresAt: 2026-12-31T23:59:59Z
            responses:
                "400":
                    description: The body was invalid, `policyId` was empty, or `expiresAt` was not a future RFC3339 timestamp.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "500":
                    description: Attaching the policy failed.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "201":
                    description: The created attachment identifier.
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    id:
                                        type: string
                                        description: Attachment identifier.
                            example:
                                id: att_01HZX
    /api/admin/iam/principals/{type}/{id}/policies/{attachmentId}:
        delete:
            operationId: detachPrincipalPolicy
            summary: Detach a policy from a principal
            description: Removes a direct policy attachment from a principal by attachment id. If the principal is a `nexus_user`, its live sessions are revoked so the reduced permission set applies on the next token mint.
            x-nexus-iam-action: iam.ResourceIamPolicy.Action(iam.VerbUpdate)
            x-nexus-tier: confirm
            parameters:
                - name: type
                  in: path
                  required: true
                  description: Principal kind (e.g. nexus_user).
                  schema:
                    type: string
                - name: id
                  in: path
                  required: true
                  description: Principal identifier.
                  schema:
                    type: string
                - name: attachmentId
                  in: path
                  required: true
                  description: Policy-attachment identifier.
                  schema:
                    type: string
            responses:
                "404":
                    description: No attachment exists with the given id.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "204":
                    description: The attachment was removed.
    /api/admin/iam/simulate:
        post:
            operationId: simulateIAM
            summary: Simulate an IAM decision
            description: |-
                Evaluates whether a principal would be allowed to perform an action
                on a resource, returning the decision, the matched statements, and a
                human-readable reason. `principal` (with both `type` and `id`),
                `action`, and `resource` are required. `context` is optional;
                supplied keys whose values are strings are passed to condition
                evaluation, non-string values are ignored.
            x-nexus-iam-action: iam.ResourceIamPolicy.Action(iam.VerbRead)
            x-nexus-tier: auto
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                principal:
                                    type: object
                                    description: The principal to evaluate.
                                    properties:
                                        type:
                                            type: string
                                            description: Principal kind (e.g. nexus_user). Must be non-empty.
                                        id:
                                            type: string
                                            description: Principal identifier. Must be non-empty.
                                    required:
                                        - type
                                        - id
                                action:
                                    type: string
                                    description: Action name to test. Must be non-empty.
                                resource:
                                    type: string
                                    description: Resource (NRN) the action targets. Must be non-empty.
                                context:
                                    type: object
                                    description: Optional condition context. Only string-valued keys are applied.
                                    additionalProperties: {}
                            required:
                                - principal
                                - action
                                - resource
                        example:
                            principal:
                                type: nexus_user
                                id: usr_01HZX
                            action: iam-policy.read
                            resource: nrn:control-plane:iam-policy:*:*
                            context:
                                sourceIp: 10.0.0.1
            responses:
                "400":
                    description: A required field (principal type/id, action, or resource) was missing or empty.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "503":
                    description: The IAM evaluation engine is not available.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "500":
                    description: Evaluating the request failed.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: The evaluation result.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/iam_EvaluationResult'
                            example:
                                decision: Allow
                                matchedStatements:
                                    - policyId: pol_01HZX
                                      policyName: full-admin
                                      effect: Allow
                                      source: group
                                      groupName: platform-admins
                                reason: Allowed by statement in policy full-admin.
components:
    schemas:
        iam_EvaluationResult:
            type: object
            properties:
                decision:
                    type: string
                    description: Overall decision. Values produced by the engine.
                    enum:
                        - Allow
                        - Deny
                matchedStatements:
                    type: array
                    description: Statements that contributed to the decision.
                    items:
                        $ref: '#/components/schemas/iam_MatchedStatement'
                reason:
                    type: string
                    description: Human-readable explanation of the decision.
            required:
                - decision
                - matchedStatements
                - reason
        iam_MatchedStatement:
            type: object
            properties:
                policyId:
                    type: string
                    description: Identifier of the policy the statement belongs to.
                policyName:
                    type: string
                    description: Name of the policy the statement belongs to.
                sid:
                    type: string
                    description: Optional statement id.
                effect:
                    type: string
                    description: Effect of the matched statement.
                    enum:
                        - Allow
                        - Deny
                source:
                    type: string
                    description: How the policy reached the principal.
                    enum:
                        - direct
                        - group
                groupName:
                    type: string
                    description: Name of the group when the source is `group`.
            required:
                - policyId
                - policyName
                - effect
                - source
        iamstore_GroupRow:
            type: object
            properties:
                id:
                    type: string
                    description: Group identifier.
                name:
                    type: string
                    description: Group display name.
                description:
                    type:
                        - string
                        - "null"
                    description: Optional human-readable description.
                createdBy:
                    type:
                        - string
                        - "null"
                    description: Identifier of the admin who created the group.
                createdAt:
                    type: string
                    format: date-time
                    description: Creation timestamp.
                updatedAt:
                    type: string
                    format: date-time
                    description: Last-update timestamp.
            required:
                - id
                - name
                - createdAt
                - updatedAt
        iamstore_PolicyRow:
            type: object
            properties:
                id:
                    type: string
                    description: Policy identifier.
                name:
                    type: string
                    description: Policy display name.
                description:
                    type:
                        - string
                        - "null"
                    description: Optional human-readable description.
                type:
                    type: string
                    description: Policy type. Policies created through this API are of type `custom`.
                document:
                    description: Policy document (statements).
                enabled:
                    type: boolean
                    description: Whether the policy is active.
                createdBy:
                    type:
                        - string
                        - "null"
                    description: Identifier of the admin who created the policy.
                createdAt:
                    type: string
                    format: date-time
                    description: Creation timestamp.
                updatedAt:
                    type: string
                    format: date-time
                    description: Last-update timestamp.
            required:
                - id
                - name
                - type
                - document
                - enabled
                - createdAt
                - updatedAt
