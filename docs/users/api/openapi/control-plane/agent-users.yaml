                  required: true
                  description: NexusUser identifier whose audit events are returned.
                  schema:
                    type: string
                - name: start
                  in: query
                  required: false
                  description: |-
                    Inclusive lower bound of the audit window, as an RFC 3339
                    timestamp. Ignored if unparseable.
                  schema:
                    type: string
                    format: date-time
                - name: end
                  in: query
                  required: false
                  description: |-
                    Inclusive upper bound of the audit window, as an RFC 3339
                    timestamp. Ignored if unparseable.
                  schema:
                    type: string
                    format: date-time
            responses:
