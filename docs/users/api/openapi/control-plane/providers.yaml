    /api/admin/providers/{id}/embedding-probe:
        post:
            operationId: providerEmbeddingProbe
            summary: Probe a provider's embedding model
            description: |-
                Issues a synthetic embedding call against the provider's first enabled
                embedding model and returns the probe outcome (discovered vector
                dimension, latency, prompt tokens, and a sample of the embedding). The
                probe is forwarded to the AI Gateway. Returns 404 when the provider
                does not exist and 400 when the provider has no enabled embedding
                model. A reachable-gateway probe failure is reported as HTTP 200 with
                an ok=false body rather than an error status.
            x-nexus-iam-action: iam.ResourceProvider.Action(iam.VerbRead)
            x-nexus-tier: auto
            parameters:
                - name: id
                  in: path
                  description: Provider id.
                  required: true
                  schema:
                    type: string
            responses:
                "404":
                    description: Not Found
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "400":
                    description: No enabled embedding model found for this provider.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: |-
                        Probe outcome. Carries ok=true with the discovered embedding
                        dimension on success, or ok=false with an error message when the
                        gateway is reachable but the probe failed.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                ok: true
                                providerId: 0192f3a1-2b4c-7d8e-9f01-2a3b4c5d6e7f
                                modelId: 0192f3a1-2b4c-7d8e-9f01-2a3b4c5d6abc
                                modelName: text-embedding-3-small
                                dimension: 1536
                                latencyMs: 142
                                promptTokens: 3
