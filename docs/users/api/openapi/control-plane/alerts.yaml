                - name: id
                  in: path
                  required: true
                  description: Channel id.
                  schema:
                    type: string
            responses:
                '200':
                    description: Test alert delivered successfully.
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    success:
