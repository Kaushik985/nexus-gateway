<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Document base for relative asset URLs. vite emits relative ./assets/…
         paths; this tag makes them resolve from the deployment root at ANY
         route depth (e.g. /auth/callback) instead of against the current URL.
         For sub-path deployments nginx rewrites href to the mount prefix
         (e.g. /nexus/); App.tsx reads the same href for the router basename. -->
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AlphaBitCore</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <script>
      // Prevent flash of wrong theme on load
      (function() {
        var mode = localStorage.getItem('nexus-theme-mode') || 'system';
        var resolved = mode;
        if (mode === 'system') {
          resolved = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        document.documentElement.setAttribute('data-theme', resolved);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
