# Nexus Gateway — nginx reverse proxy for the AMI / appliance form factor.
# Serves the Vite-built React UI on :443 and proxies /api/* to the Control
# Plane on localhost:3001. Architecture:
# docs/developers/architecture/cross-cutting/deployment/ami-appliance-architecture.md
#
# Operator note: the self-signed cert at /etc/nexus/tls.{crt,key} is generated
# by first-boot-ca.sh on first launch. For production, replace those two files
# with a cert signed for your hostname and `systemctl reload nginx`.

server {
    listen      80 default_server;
    server_name _;
    return      301 https://$host$request_uri;
}

server {
    listen              443 ssl default_server;
    server_name         _;

    ssl_certificate     /etc/nexus/tls.crt;
    ssl_certificate_key /etc/nexus/tls.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root                /opt/nexus/ui;
    index               index.html;

    client_max_body_size 32m;

    # Vite SPA fallback — every unmatched path serves index.html so the
    # client-side router takes over.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Admin API + auth-server endpoints (both live in the control-plane
    # binary on :3001).
    location /api/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /.well-known/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_set_header   Host              $host;
    }

    # OAuth/OIDC auth-server endpoints (authorization endpoint, token
    # endpoint, userinfo, revoke, logout — all live in the control-plane
    # binary). Without this location block /oauth/authorize falls through
    # to the SPA `try_files` handler, the SPA can't process the PKCE
    # parameters, bounces to /login, /login bounces to /oauth/authorize,
    # infinite loop. Hit on 2026-05-29 first-user-test of build #10.
    location /oauth/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Auth-server pre-bearer endpoints (`/authserver/idps`, `/authserver/
    # password`, `/authserver/idp/<id>/start`). The SPA's LoginPage calls
    # these to list IDPs and post password credentials. Without the proxy
    # they return the SPA index.html (200 with HTML body), which the SPA's
    # JSON parser misreads as "loadProvidersFailed" — surfaced to the
    # operator as "Unable to load sign-in methods". Hit on 2026-05-29.
    location /authserver/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Health endpoint exposed for ELB / customer monitoring without
    # authentication.
    location = /healthz {
        proxy_pass         http://127.0.0.1:3001/api/healthz;
        proxy_set_header   Host              $host;
    }
}
