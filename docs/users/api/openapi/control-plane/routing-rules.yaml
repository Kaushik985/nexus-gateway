                            additionalProperties: {}
            responses:
                "400":
                    description: Bad Request — request body is not valid JSON.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "500":
                    description: Internal Server Error — failed to encode the forwarded payload.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "502":
                    description: Bad Gateway — the AI Gateway is unreachable or the upstream request could not be built.
