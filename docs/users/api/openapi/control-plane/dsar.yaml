            x-nexus-tier: auto
            parameters:
                - name: status
                  in: query
                  required: false
                  description: |-
                    Optional status filter. When omitted, requests of all
                    statuses are returned. Recognized status values are PENDING,
                    IN_PROGRESS, COMPLETED, and REJECTED.
                  schema:
                    type: string
                    enum:
                        - PENDING
                        - IN_PROGRESS
                        - COMPLETED
                        - REJECTED
            responses:
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
