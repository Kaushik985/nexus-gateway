# Hand-maintained OpenAPI spec, verified claim-by-claim against the control-plane
# handler code (the single source of truth) via the openapi-review skill. Keep
# structural fields (paths/verbs/types) in lockstep with the handlers.
openapi: 3.1.0
info:
    title: Nexus Control Plane Admin API — credentials
    version: dev
    description: |-
        Admin API for provider credentials (encrypted API keys) used by the AI Gateway when forwarding traffic upstream. Covers credential CRUD, the per-credential reliability circuit (live Redis-backed view plus persisted state), upstream probe, per-credential reliability-threshold overrides, and encryption-key rotation (re-encrypting stored keys to the current key in the CREDENTIAL_KEY_MAP). Plaintext API keys are write-only: they are accepted on create/update, encrypted at rest, and never returned in any response.
paths:
    /api/admin/credentials:
        get:
            operationId: listCredentials
            summary: List provider credentials
            description: |-
                Returns a paginated list of provider credentials with their persisted reliability/circuit/health state. Plaintext keys are never included. Supports free-text search, filtering by provider, and filtering by enabled state.
            x-nexus-iam-action: iam.ResourceCredential.Action(iam.VerbRead)
            x-nexus-tier: auto
            parameters:
                - name: q
                  in: query
                  description: Free-text search filter (matched server-side against credential fields).
                  required: false
                  schema:
                    type: string
                - name: providerId
                  in: query
                  description: Restrict results to credentials belonging to this provider.
                  required: false
                  schema:
                    type: string
                - name: enabled
                  in: query
                  description: 'Filter by enabled state. Only the literal strings "true" and "false" are honored; any other value (including absence) applies no enabled filter.'
                  required: false
                  schema:
                    type: string
                    enum:
                        - "true"
                        - "false"
            responses:
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: A page of credentials plus the total count matching the filters.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                data:
                                    - id: cred_01HXYZ
                                      name: openai-prod-primary
                                      providerId: prov_openai
                                      enabled: true
                                      status: active
                                      circuitState: closed
                                      healthStatus: healthy
                                      selectionWeight: 100
                                total: 1
        post:
            operationId: createCredential
            summary: Create a provider credential
            description: |-
                Encrypts the supplied plaintext API key with the active encryption key and stores a new credential for the given provider. Requires the credential vault (encryption key) to be configured, otherwise returns 503.
            x-nexus-iam-action: iam.ResourceCredential.Action(iam.VerbCreate)
            x-nexus-tier: confirm
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                name:
                                    type: string
                                    description: Human-readable credential name. Must be non-empty.
                                providerId:
                                    type: string
                                    description: ID of the provider this credential authenticates to. Must be non-empty.
                                apiKey:
                                    type: string
                                    description: Plaintext upstream API key. Write-only — encrypted at rest and never returned in any response. Must be non-empty.
                                    writeOnly: true
                                enabled:
                                    type:
                                        - boolean
                                        - "null"
                                    description: Whether the credential is eligible for selection. Defaults to true when omitted or null.
                                rotationState:
                                    type: string
                                    description: 'Initial rotation lifecycle state. Optional; defaults to "none" when omitted. On create, any string value is accepted verbatim (no enum validation is applied at create time; see updateCredential for the validated set).'
                                expiresAt:
                                    type:
                                        - string
                                        - "null"
                                    format: date-time
                                    description: Optional expiry timestamp for the credential.
                                selectionWeight:
                                    type:
                                        - integer
                                        - "null"
                                    description: Relative selection weight within the provider's credential pool. Only positive values are honored; otherwise defaults to 100.
                            required:
                                - name
                                - providerId
                                - apiKey
                        example:
                            name: openai-prod-primary
                            providerId: prov_openai
                            apiKey: sk-...
                            enabled: true
                            selectionWeight: 100
            responses:
                "503":
                    description: Credential vault unavailable — encryption key not configured.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "400":
                    description: Validation error — name, providerId, and apiKey are required, or the request body is malformed.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "500":
                    description: Internal Server Error (encryption failure or persistence error).
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "201":
                    description: The created credential. The plaintext key is not echoed back.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/credstore_Credential'
    /api/admin/credentials/{id}:
        get:
            operationId: getCredential
            summary: Get a credential with live circuit state
            description: |-
                Returns a single credential merged with its live Redis-backed circuit view (liveCircuit). The persisted circuit/health fields reflect the last flushed state; liveCircuit, when present, carries the up-to-the-moment Redis snapshot.
            x-nexus-iam-action: iam.ResourceCredential.Action(iam.VerbRead)
            x-nexus-tier: auto
            parameters:
                - name: id
                  in: path
                  description: Credential ID.
                  required: true
                  schema:
                    type: string
            responses:
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "404":
                    description: Credential not found.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: The credential merged with its live circuit view.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/handler_credentialWithCircuit'
        put:
            operationId: updateCredential
            summary: Update a credential
            description: |-
                Updates a credential's metadata and optionally rotates its key. All fields are optional and applied only when present: an empty/omitted field is a no-op. Supplying apiKey re-encrypts the key and, absent an explicit rotationState, records the change as a completed rotation. expiresAt and retireAt are 3-state (absent = no-op, null = clear, value = set). rotationState and status are validated against fixed sets; values outside those sets are silently ignored.
            x-nexus-iam-action: iam.ResourceCredential.Action(iam.VerbUpdate)
            x-nexus-tier: confirm
            parameters:
                - name: id
                  in: path
                  description: Credential ID.
                  required: true
                  schema:
                    type: string
            requestBody:
                required: false
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                apiKey:
                                    type: string
                                    description: New plaintext API key. Write-only — when present, re-encrypts the stored key. Never returned.
                                    writeOnly: true
                                name:
                                    type: string
                                    description: New credential name. Applied only when non-empty.
                                enabled:
                                    type:
                                        - boolean
                                        - "null"
                                    description: New enabled state. Applied only when present.
                                rotationState:
                                    type: string
                                    description: 'Rotation lifecycle state. Applied only if it matches the validated set; other values are ignored. Setting "completed" or "rotated" also stamps lastRotatedAt.'
                                    enum:
                                        - none
                                        - pending_rotation
                                        - validating
                                        - rotated
                                        - completed
                                        - failed
                                selectionWeight:
                                    type:
                                        - integer
                                        - "null"
                                    description: New selection weight. Applied only when present.
                                status:
                                    type: string
                                    description: 'Lifecycle status. Applied only if it matches the validated set. Setting "retired" without an explicit retireAt defaults retireAt to now + 7 days.'
                                    enum:
                                        - active
                                        - retiring
                                        - retired
                                expiresAt:
                                    type:
                                        - string
                                        - "null"
                                    format: date-time
                                    description: Expiry timestamp. Absent = no-op, null = clear, value = set.
                                retireAt:
                                    type:
                                        - string
                                        - "null"
                                    format: date-time
                                    description: Retirement timestamp. Absent = no-op, null = clear, value = set.
                        example:
                            name: openai-prod-primary
                            enabled: false
                            rotationState: completed
            responses:
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "404":
                    description: Credential not found.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "400":
                    description: Malformed request body.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "503":
                    description: Credential vault unavailable when an apiKey update was requested.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: The updated credential. The plaintext key is not echoed back.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/credstore_Credential'
        delete:
            operationId: deleteCredential
            summary: Delete a credential
            description: Permanently deletes the credential and signals the AI Gateway to refresh its credential cache.
            x-nexus-iam-action: iam.ResourceCredential.Action(iam.VerbDelete)
            x-nexus-tier: confirm
            parameters:
                - name: id
                  in: path
                  description: Credential ID.
                  required: true
                  schema:
                    type: string
            responses:
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "404":
                    description: Credential not found.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: Deletion confirmation.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                deleted: true
                                id: cred_01HXYZ
    /api/admin/credentials/{id}/circuit-reset:
        post:
            operationId: circuitReset
            summary: Reset a credential's circuit breaker
            description: |-
                Clears the Redis-backed circuit breaker state for the credential, returning it to the eligible pool. Used when a credential opened its circuit after repeated auth failures (401/403).
            x-nexus-iam-action: iam.ResourceCredential.Action(iam.VerbUpdate)
            x-nexus-tier: confirm
            parameters:
                - name: id
                  in: path
                  description: Credential ID.
                  required: true
                  schema:
                    type: string
            responses:
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "404":
                    description: Credential not found.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: Circuit-reset confirmation.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                reset: true
                                id: cred_01HXYZ
    /api/admin/credentials/{id}/probe:
        post:
            operationId: probeCredential
            summary: Probe a credential against its upstream provider
            description: |-
                Proxies to the AI Gateway, which decrypts the key and runs a live probe against the upstream provider, returning the outcome (ok, latencyMs, detail, error, providerName, …). The probe outcome flag is audited; the raw key is never logged. The gateway's probe status code is returned verbatim.
            x-nexus-iam-action: iam.ResourceCredential.Action(iam.VerbProbe)
            x-nexus-tier: confirm
            parameters:
                - name: id
                  in: path
                  description: Credential ID.
                  required: true
                  schema:
                    type: string
            requestBody:
                required: false
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                timeoutSeconds:
                                    type: integer
                                    description: Optional per-request probe timeout, forwarded verbatim to the gateway (default 5 s gateway-side).
                        example:
                            timeoutSeconds: 5
            responses:
                "200":
                    description: Probe outcome, proxied verbatim from the AI Gateway. The status code mirrors the gateway's probe result.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                ok: true
                                latencyMs: 142
                                providerName: openai
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "404":
                    description: Credential not found.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "502":
                    description: AI Gateway unreachable or the probe request could not be built.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                ok: false
                                error: 'AI Gateway unreachable: connection refused'
                                credentialId: cred_01HXYZ
    /api/admin/credentials/{id}/reliability-overrides:
        put:
            operationId: updateCredentialReliabilityOverrides
            summary: Set or clear a credential's reliability-threshold overrides
            description: |-
                Sets per-credential reliability thresholds, overriding the gateway-wide defaults. The body is a partial threshold object; any omitted field falls back to the default. An empty body, "null", or "{}" clears any prior override. The merged thresholds must satisfy the cross-field invariants (e.g. healthy >= degraded), otherwise 400.
            x-nexus-iam-action: iam.ResourceCredential.Action(iam.VerbUpdate)
            x-nexus-tier: confirm
            parameters:
                - name: id
                  in: path
                  description: Credential ID.
                  required: true
                  schema:
                    type: string
            requestBody:
                required: false
                content:
                    application/json:
                        schema:
                            type: object
                            description: 'Partial reliability thresholds. Any field may be omitted; omitted fields use the gateway default. An empty body, null, or {} clears the override.'
                            properties:
                                authFailThreshold:
                                    type: integer
                                    description: Consecutive 401/403 responses that open the circuit with reason auth_fail.
                                rateLimitCooldownSeconds:
                                    type: integer
                                    description: How long a rate_limit-opened circuit stays open before transitioning to half_open.
                                healthyThresholdPct:
                                    type: integer
                                    description: Minimum success rate (0-100) to classify the credential as healthy.
                                degradedThresholdPct:
                                    type: integer
                                    description: Success rate (0-100) floor below which the credential is unavailable; between this and healthy = degraded.
                                healthMinSamples:
                                    type: integer
                                    description: Smallest sample count at which a status other than collecting is assigned.
                                healthWindowSeconds:
                                    type: integer
                                    description: Rolling window length for the current health classification.
                                healthSustainedDegradedSeconds:
                                    type: integer
                                    description: How long the credential must stay degraded/unavailable before the sustained-degraded alert fires.
                        example:
                            authFailThreshold: 5
                            healthyThresholdPct: 95
                            degradedThresholdPct: 80
            responses:
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "404":
                    description: Credential not found.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "400":
                    description: Invalid JSON or override values that violate the threshold invariants.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: The stored override (null when cleared).
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                id: cred_01HXYZ
                                reliabilityOverrides:
                                    authFailThreshold: 5
                                    healthyThresholdPct: 95
                                    degradedThresholdPct: 80
    /api/admin/credentials/key-rotation-status:
        get:
            operationId: getKeyRotationStatus
            summary: Get encryption-key rotation status
            description: |-
                Returns the current encryption-key rotation progress: the target (current) key ID and the count of credentials not yet on it. status is "not_configured" when no key map is set, "rotating" while a rotation worker runs, otherwise "idle".
            x-nexus-iam-action: iam.ResourceCredential.Action(iam.VerbRead)
            x-nexus-tier: auto
            responses:
                "200":
                    description: Current encryption-key rotation status.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                status: idle
                                targetKeyId: v2
                                pendingCount: 0
    /api/admin/credentials/rotate-key:
        post:
            operationId: rotateCredentialKey
            summary: Start encryption-key rotation
            description: |-
                Triggers background re-encryption of all credentials not yet on the current encryption key. Requires CREDENTIAL_KEY_MAP to be configured (otherwise 400) and rejects concurrent runs (409). Returns immediately with the target key and the count of pending credentials; the actual re-encryption proceeds asynchronously.
            x-nexus-iam-action: iam.ResourceCredential.Action(iam.VerbRotate)
            x-nexus-tier: confirm
            responses:
                "400":
                    description: CREDENTIAL_KEY_MAP not configured.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "409":
                    description: A rotation is already in progress.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "500":
                    description: Internal Server Error (failed to count pending credentials).
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: Rotation started.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                status: rotating
                                targetKeyId: v2
                                pendingCount: 12
    /api/admin/credentials/rotation-status:
        get:
            operationId: credentialRotationStatus
            summary: Get per-credential key-age rotation status
            description: |-
                Returns, for every credential, the days since its last rotation (falling back to creation time) and an overdue flag (true when more than 90 days). Distinct from key-rotation-status, which tracks encryption-key re-encryption progress.
            x-nexus-iam-action: iam.ResourceCredential.Action(iam.VerbRead)
            x-nexus-tier: auto
            responses:
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: Per-credential rotation age and overdue status.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                data:
                                    - id: cred_01HXYZ
                                      name: openai-prod-primary
                                      providerId: prov_openai
                                      rotationState: none
                                      lastRotatedAt: 2026-01-15T00:00:00Z
                                      daysSinceRotation: 14
                                      overdue: false
components:
