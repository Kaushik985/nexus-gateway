info:
    title: Nexus Control Plane Admin API — semantic-cache
    version: dev
    description: 'Generated from control-plane source by openapigen. Structural draft: field names, types, optionality, status codes and IAM tiers are code-derived; enum value sets and required-field rules enforced imperatively in handlers are filled in by the openapi-review skill.'
paths:
    /api/admin/semantic-cache/config:
        get:
            operationId: getConfig
            summary: Read the semantic-cache singleton config
            description: |-
                Returns the fleet-wide singleton semantic-cache configuration row
                (id "singleton"). The row carries the embedding provider/model
                selection, the computed embedding fingerprint, the versioned
                RediSearch index name, the fleet kill switch, the L2 tuning knobs
                (threshold, varyBy, embedStrategy, allowCrossModel) and the
                time-sensitive freshness rule overrides. Nexus is single-tenant by
                design — there is no per-org or per-tenant variation of this row.
            x-nexus-iam-action: iam.ResourceSemanticCache.Action(iam.VerbRead)
            x-nexus-tier: auto
            responses:
                "500":
                    description: Failed to read the config row from the store.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: The current semantic-cache singleton config row.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/configstore_SemanticCacheConfigRow'
                            example:
                                id: singleton
                                embeddingProviderId: prov_openai
                                embeddingModelId: model_text_embedding_3_small
                                embeddingDimension: 1536
                                embeddingFingerprint: 3f7a1c9e2b4d
                                redisIndexName: nexus:semantic-cache:v2
                                enabled: true
                                threshold: 0.96
                                varyBy: vk
                                embedStrategy: system_plus_last_user
                                allowCrossModel: false
                                updatedAt: "2026-01-15T09:30:00Z"
                                updatedBy: usr_admin_01
                                timeSensitiveOverrides:
                                    rules: []
                                embeddingProviderBaseUrl: https://api.openai.com/v1
                                embeddingProviderModelId: text-embedding-3-small
                                embeddingInputPricePerMillion: 0.02
        put:
            operationId: putConfig
            summary: Update the semantic-cache singleton config
            description: |-
                Validates and saves the fleet-wide singleton config, then pushes the
                full saved row to the Hub shadow so AI Gateway nodes observe the new
                embedding fingerprint and ensure the RediSearch index. Tuning fields
                (threshold, varyBy, embedStrategy, allowCrossModel) omitted from the
                body are preserved from the current row rather than reset to defaults.
                Validation rules: enabling the cache requires both embeddingProviderId
                and embeddingModelId; when a model is set, embeddingDimension must be a
                positive integer. Hub propagation failure is logged but not escalated —
                the reconcile job recovers it.
            x-nexus-iam-action: iam.ResourceSemanticCache.Action(iam.VerbUpdate)
            x-nexus-tier: confirm
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/handler_semanticCacheUpdateRequest'
                        example:
                            embeddingProviderId: prov_openai
                            embeddingModelId: model_text_embedding_3_small
                            embeddingDimension: 1536
                            enabled: true
                            threshold: 0.96
                            varyBy: vk
                            embedStrategy: system_plus_last_user
                            allowCrossModel: false
            responses:
                "400":
                    description: |-
                        Malformed JSON body; or enabled=true without
                        embeddingProviderId+embeddingModelId; or a model is set but
                        embeddingDimension is missing or not a positive integer.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "500":
                    description: Failed to load the current row or save the config.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: The saved semantic-cache singleton config row.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/configstore_SemanticCacheConfigRow'
    /api/admin/semantic-cache/prewarm:
        post:
            operationId: prewarmCache
            summary: Pre-warm the L2 semantic cache from a corpus batch
            description: |-
                Validates a batch of question/answer corpus entries and forwards them
                to the AI Gateway's internal embed-and-write endpoint, which embeds each
                prompt and writes the answer into the L2 semantic cache. A batch is
                capped at 500 entries per call; larger corpora are pipelined across
                multiple calls. With dryRun=true the AI Gateway embeds but skips the
                cache write and returns the planned writes — the Control Plane echoes
                the AI Gateway response verbatim for both 2xx and other status codes.
            x-nexus-iam-action: iam.ResourceSemanticCache.Action(iam.VerbUpdate)
            x-nexus-tier: confirm
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/handler_prewarmRequest'
                        example:
                            entries:
                                - prompt: What is your refund policy?
                                  response: Refunds are available within 30 days of purchase.
                                  model: gpt-4o
                                  vkScope: "v1:vk:nvk_support"
                                  ttlSeconds: 86400
                            dryRun: false
            responses:
                "400":
                    description: |-
                        Malformed JSON body; or entries is empty; or an entry has an
                        empty prompt or response; or an entry ttlSeconds is outside the
                        accepted range [60, 604800].
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "413":
                    description: The batch contains more than 500 entries.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "503":
                    description: |-
                        The semantic cache is disabled; or the AI Gateway URL is not
                        configured; or the AI Gateway itself reports the cache disabled.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "500":
                    description: Failed to marshal or build the forwarded gateway request.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "502":
                    description: The AI Gateway was unreachable.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                default:
                    description: The AI Gateway response is forwarded verbatim with its original status code.
                    content:
                        application/json:
                            schema:
                                description: arbitrary JSON value
components:
    schemas:
        configstore_SemanticCacheConfigRow:
            type: object
            description: Fleet-wide singleton semantic-cache configuration row (id "singleton").
            properties:
                id:
                    type: string
                    description: Singleton row identifier; always "singleton".
                embeddingProviderId:
                    type:
                        - string
                        - "null"
                    description: Provider that supplies the embedding model; null when no embedding model is selected.
                embeddingModelId:
                    type:
                        - string
                        - "null"
                    description: Embedding model used to vectorize prompts; null when none is selected.
                embeddingDimension:
                    type:
                        - integer
                        - "null"
                    description: Embedding vector dimension; null when no model is selected.
                embeddingFingerprint:
                    type: string
                    description: SHA fingerprint over (provider, model, dimension); recomputed by the store on save.
                redisIndexName:
                    type: string
                    description: Versioned RediSearch vector index name used in FT.CREATE / FT.SEARCH; bumped on (provider, model, dimension) changes for atomic blue/green index swap.
                enabled:
                    type: boolean
                    description: Fleet kill switch — when false, L2 semantic cache is disabled fleet-wide.
                threshold:
                    type: number
                    description: Fleet-wide cosine-similarity gate for an L2 hit. Range [0.0, 1.0]; default 0.96.
                varyBy:
                    type: string
                    description: L2 cache isolation scope.
                    enum:
                        - none
                        - user
                        - vk
                        - org
                embedStrategy:
                    type: string
                    description: Shapes the text fed to the embedding model.
                    enum:
                        - last_user
                        - system_plus_last_user
                        - recent_turns
                        - head_plus_tail
                        - full_truncated
                allowCrossModel:
                    type: boolean
                    description: When true, an L2 lookup may return an entry cached against a different upstream model.
                updatedAt:
                    type: string
                    format: date-time
                    description: Timestamp of the last save.
                updatedBy:
                    type:
                        - string
                        - "null"
                    description: User ID of the actor who last saved the row; null when never modified by an admin.
                timeSensitiveOverrides:
                    $ref: '#/components/schemas/configstore_TimeSensitiveOverridesBlob'
                embeddingProviderBaseUrl:
                    type: string
                    description: Joined embedding-provider base URL; included in the Hub snapshot so the gateway can call the embedding upstream.
                embeddingProviderModelId:
                    type: string
                    description: Joined upstream embedding model identifier as sent on the wire to the provider.
                embeddingInputPricePerMillion:
                    type: number
                    description: Joined embedding input price per million tokens; used to compute embedding cost.
            required:
                - id
                - embeddingFingerprint
                - redisIndexName
                - enabled
                - threshold
                - varyBy
                - embedStrategy
                - allowCrossModel
                - updatedAt
                - timeSensitiveOverrides
        configstore_TimeSensitiveOverrideRule:
            type: object
            description: One admin-edited time-sensitive freshness rule inside the overrides blob.
            properties:
                id:
                    type: string
                    description: Rule identifier; matches a seed rule ID when overriding a default.
                keywords:
                    type: array
                    description: Keywords that trigger this freshness rule.
                    items:
                        type: string
                requireQuestionMark:
                    type: boolean
                    description: When true, the rule only matches prompts containing a question mark.
                requireEntity:
                    type: boolean
                    description: When true, the rule only matches prompts that reference an entity.
                languages:
                    type: array
                    description: Languages this rule applies to.
                    items:
                        type: string
                enabled:
                    type: boolean
                    description: Whether this freshness rule is active.
            required:
                - id
                - keywords
                - requireQuestionMark
                - requireEntity
                - languages
                - enabled
        configstore_TimeSensitiveOverridesBlob:
            type: object
            description: JSONB blob of admin-edited freshness rules; the canonical rule list (empty means no overrides).
            properties:
                rules:
                    type: array
                    description: The freshness rule list.
                    items:
                        $ref: '#/components/schemas/configstore_TimeSensitiveOverrideRule'
            required:
                - rules
        handler_prewarmEntryInput:
            type: object
            description: One question/answer corpus entry to embed and write into the L2 cache.
            properties:
                prompt:
                    type: string
                    description: Question/prompt text to embed and index. Must be non-empty.
                response:
                    type: string
                    description: Pre-crafted answer stored as the cache payload. Must be non-empty.
                model:
                    type: string
                    description: Upstream model name stored in the entry tag (e.g. "gpt-4o"). May be empty.
                vkScope:
                    type: string
                    description: Virtual-key scope tag (e.g. "v1:vk:nvk_xxx"). May be empty — visible to all scopes unless filtered.
                ttlSeconds:
                    type: integer
                    description: Cache entry TTL in seconds. Must be in [60, 604800]; defaults to 86400 (1 day) when omitted.
            required:
                - prompt
                - response
        handler_prewarmRequest:
            type: object
            description: Batch of corpus entries to pre-warm into the L2 semantic cache.
            properties:
                entries:
                    type: array
                    description: Corpus batch; must be non-empty and contain at most 500 entries.
                    items:
                        $ref: '#/components/schemas/handler_prewarmEntryInput'
                dryRun:
                    type: boolean
                    description: When true, embed but skip the cache write and return the planned writes. Defaults to false when omitted.
            required:
                - entries
        handler_semanticCacheUpdateRequest:
            type: object
            properties:
                embeddingProviderId:
                    type:
                        - string
                        - "null"
                embeddingModelId:
                    type:
                        - string
                        - "null"
                embeddingDimension:
                    type:
                        - integer
                        - "null"
                enabled:
                    type: boolean
                threshold:
                    type:
                        - number
                        - "null"
                varyBy:
                    type:
                        - string
                        - "null"
                embedStrategy:
                    type:
                        - string
                        - "null"
                allowCrossModel:
                    type:
                        - boolean
                        - "null"
            required:
                - enabled
