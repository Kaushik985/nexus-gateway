components:
    schemas:
        handler_createProviderCredentialInput:
            type: object
            description: Inline credential created alongside the provider when apiKey is supplied.
            properties:
                name:
                    type: string
                    description: Credential name (globally unique). Required when apiKey is present.
                apiKey:
                    type: string
                    description: Plaintext API key; encrypted server-side before storage.
                rotationState:
                    type: string
                    description: Rotation state. Defaults to "none" when omitted.
            required:
                - name
                - apiKey
        handler_createProviderModelInput:
            type: object
            description: Inline model created alongside the provider.
            properties:
                code:
                    type: string
                    description: Customer-facing identifier. Defaults to providerModelId when omitted.
                providerModelId:
                    type: string
                    description: Upstream model id.
                name:
                    type: string
                    description: Display name.
                description:
                    type: string
                    description: Optional free-text description.
                type:
                    type: string
                    description: Model type (e.g. chat, embedding).
                features:
                    type: array
                    items:
                        type: string
                inputPricePerMillion:
                    type:
                        - number
                        - "null"
                outputPricePerMillion:
                    type:
                        - number
                        - "null"
                maxContextTokens:
                    type:
                        - integer
                        - "null"
                maxOutputTokens:
                    type:
                        - integer
                        - "null"
                aliases:
                    type: array
                    items:
                        type: string
            required:
                - providerModelId
                - name
                - type
        modelstore_Model:
            type: object
            properties:
                id:
                    type: string
                code:
                    type: string
                name:
                    type: string
                description:
                    type:
                        - string
                        - "null"
                providerId:
                    type: string
                providerModelId:
                    type: string
                type:
                    type: string
                features:
                    type: array
                    items:
                        type: string
                inputPricePerMillion:
                    type:
                        - number
                        - "null"
                outputPricePerMillion:
                    type:
                        - number
                        - "null"
                cachedInputReadPricePerMillion:
                    type:
                        - number
                        - "null"
                cachedInputWritePricePerMillion:
                    type:
                        - number
                        - "null"
                maxContextTokens:
                    type:
                        - integer
                        - "null"
                maxOutputTokens:
                    type:
                        - integer
                        - "null"
                status:
                    type: string
                deprecationDate:
                    type:
                        - string
                        - "null"
                    format: date-time
                replacedBy:
                    type:
                        - string
                        - "null"
                aliases:
                    type: array
                    items:
                        type: string
                inputModalities:
                    type: array
                    items:
                        type: string
                outputModalities:
                    type: array
                    items:
                        type: string
                lifecycle:
                    type: string
                capabilityJson:
                    description: arbitrary JSON value
                enabled:
                    type: boolean
                createdAt:
                    type: string
                    format: date-time
                updatedAt:
                    type: string
                    format: date-time
            required:
                - id
                - code
                - name
                - providerId
                - providerModelId
                - type
                - features
                - status
                - aliases
                - inputModalities
                - outputModalities
                - lifecycle
                - enabled
                - createdAt
                - updatedAt
        providerstore_Provider:
            type: object
            properties:
                id:
                    type: string
                name:
                    type: string
                displayName:
                    type:
                        - string
                        - "null"
                description:
                    type:
                        - string
                        - "null"
                adapterType:
                    type: string
                baseUrl:
                    type: string
                pathPrefix:
                    type: string
