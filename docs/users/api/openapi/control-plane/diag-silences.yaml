components:
    schemas:
        infra_createDiagSilenceRequest:
            type: object
            properties:
                messageHash:
                    type: string
                    description: |-
                        Hash identifying the diag-event group to silence. Trimmed;
                        must be non-empty.
                level:
                    type: string
                    description: |-
                        Severity of the group to silence. Lower-cased before
                        validation.
                    enum:
                        - debug
                        - info
                        - warn
                        - error
                        - fatal
                ttlSeconds:
                    type: integer
                    description: |-
                        Time-to-live in seconds. 0 means a permanent silence; a
                        positive value sets the expiry that many seconds from now.
                        Must be >= 0 and at most 2592000 (30 days).
                reason:
                    type: string
                    description: |-
                        Optional free-text justification. Trimmed; at most 500
                        characters. An empty reason is stored as null.
            required:
                - messageHash
                - level
        infra_diagSilence:
            type: object
            description: A persisted diag silence row.
            properties:
                id:
                    type: string
                    description: Silence id (UUID).
                messageHash:
                    type: string
                    description: Hash of the silenced diag-event group.
                level:
                    type: string
                    description: Severity of the silenced group.
                    enum:
                        - debug
                        - info
                        - warn
                        - error
                        - fatal
                silencedBy:
                    type: string
                    description: User id of the operator who created the silence.
                silencedAt:
                    type: string
                    format: date-time
                    description: When the silence was created.
                expiresAt:
                    type: string
                    format: date-time
                    description: |-
                        When the silence expires; omitted for a permanent silence.
                reason:
                    type: string
                    description: |-
                        Free-text justification; omitted when none was supplied.
