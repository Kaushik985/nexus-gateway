# Hand-maintained OpenAPI spec, verified claim-by-claim against the control-plane
# handler code (the single source of truth) via the openapi-review skill. Keep
# structural fields (paths/verbs/types) in lockstep with the handlers.
openapi: 3.1.0
info:
    title: Nexus Control Plane Admin API — projects
    version: dev
    description: 'Hand-maintained against control-plane source: field names, types, optionality, status codes and IAM tiers mirror the handler code; enum value sets and required-field rules enforced imperatively in handlers are verified by the openapi-review skill.'
paths:
    /api/admin/projects:
        get:
            operationId: listProjects
            summary: List projects
            description: |
                Returns a paginated list of projects, each enriched with its parent
                organization name and a count of attached virtual keys. Results are
                ordered by most recently updated, then by name. Optional query
                filters narrow the list by free-text search, status, and owning
                organization.
            x-nexus-iam-action: iam.ResourceProject.Action(iam.VerbRead)
            x-nexus-tier: auto
            parameters:
                - name: q
                  in: query
                  required: false
                  description: Free-text search matched (case-insensitive) against project name and code.
                  schema:
                    type: string
                - name: status
                  in: query
                  required: false
                  description: Exact-match filter on project status (e.g. "active").
                  schema:
                    type: string
                - name: organizationId
                  in: query
                  required: false
                  description: Restrict results to projects owned by this organization.
                  schema:
                    type: string
            responses:
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                                properties:
                                    data:
                                        type: array
                                        description: The page of projects, each enriched with organization and virtual-key count.
                                        items:
                                            type: object
                                            additionalProperties: {}
                                    total:
                                        type: integer
                                        description: Total number of projects matching the filters, ignoring pagination.
                            example:
                                data:
                                    - id: 7c9e6679-7425-40de-944b-e07fc1f90ae7
                                      name: Acme Production
                                      code: acme-prod
                                      organizationId: 1b9d6bcd-bbfd-4b2d-9b5d-ab8dfbbd4bed
                                      description: Production workloads for Acme
                                      contactName: Jane Doe
                                      contactEmail: jane@example.com
                                      status: active
                                      createdAt: 2026-01-15T09:30:00Z
                                      updatedAt: 2026-02-01T12:00:00Z
                                      organization:
                                        id: 1b9d6bcd-bbfd-4b2d-9b5d-ab8dfbbd4bed
                                        name: Acme Inc
                                      _count:
                                        virtualKeys: 4
                                total: 1
        post:
            operationId: createProject
            summary: Create a project
            description: |
                Creates a project under an organization. The handler requires a
                non-empty name, code, and organizationId; when status is omitted it
                defaults to "active". On success the ai-gateway "organizations"
                config snapshot is invalidated so the new project becomes routable
                without a gateway restart, and a create audit entry is recorded.
            x-nexus-iam-action: iam.ResourceProject.Action(iam.VerbCreate)
            x-nexus-tier: confirm
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            additionalProperties: {}
                            properties:
                                name:
                                    type: string
                                    description: Human-readable project name.
                                code:
                                    type: string
                                    description: Short unique project code.
                                organizationId:
                                    type: string
                                    description: ID of the owning organization.
                                description:
                                    type: string
                                    description: Optional free-text description.
                                contactName:
                                    type: string
                                    description: Optional contact person name.
                                contactEmail:
                                    type: string
                                    description: Optional contact email.
                                status:
                                    type: string
                                    description: Project status; defaults to "active" when omitted.
                            required:
                                - name
                                - code
                                - organizationId
                        example:
                            name: Acme Production
                            code: acme-prod
                            organizationId: 1b9d6bcd-bbfd-4b2d-9b5d-ab8dfbbd4bed
                            description: Production workloads for Acme
                            contactName: Jane Doe
                            contactEmail: jane@example.com
                            status: active
            responses:
                "400":
                    description: Bad Request
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "201":
                    description: Created
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/orgstore_Project'
                            example:
                                id: 7c9e6679-7425-40de-944b-e07fc1f90ae7
                                name: Acme Production
                                code: acme-prod
                                organizationId: 1b9d6bcd-bbfd-4b2d-9b5d-ab8dfbbd4bed
                                description: Production workloads for Acme
                                contactName: Jane Doe
                                contactEmail: jane@example.com
                                status: active
                                createdAt: 2026-01-15T09:30:00Z
                                updatedAt: 2026-01-15T09:30:00Z
    /api/admin/projects/{id}:
        get:
            operationId: getProject
            summary: Get a project
            description: |
                Returns a single project by ID, enriched with its organization name,
                a virtual-key count, and the full list of virtual keys attached to
                the project (detail view). Responds 404 when no project matches the ID.
            x-nexus-iam-action: iam.ResourceProject.Action(iam.VerbRead)
            x-nexus-tier: auto
            parameters:
                - name: id
                  in: path
                  required: true
                  description: Project ID.
                  schema:
                    type: string
            responses:
                "404":
                    description: Not Found
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                id: 7c9e6679-7425-40de-944b-e07fc1f90ae7
                                name: Acme Production
                                code: acme-prod
                                organizationId: 1b9d6bcd-bbfd-4b2d-9b5d-ab8dfbbd4bed
                                description: Production workloads for Acme
                                contactName: Jane Doe
                                contactEmail: jane@example.com
                                status: active
                                createdAt: 2026-01-15T09:30:00Z
                                updatedAt: 2026-02-01T12:00:00Z
                                organization:
                                    id: 1b9d6bcd-bbfd-4b2d-9b5d-ab8dfbbd4bed
                                    name: Acme Inc
                                _count:
                                    virtualKeys: 4
                                virtualKeys: []
        put:
            operationId: updateProject
            summary: Update a project
            description: |
                Updates an existing project. Every field is optional: the handler
                binds nullable pointers and the store applies each value with
                COALESCE, so an omitted (null) field leaves the stored value
                unchanged. On success the ai-gateway "organizations" config snapshot
                is invalidated and an update audit entry is recorded.
            x-nexus-iam-action: iam.ResourceProject.Action(iam.VerbUpdate)
            x-nexus-tier: confirm
            parameters:
                - name: id
                  in: path
                  required: true
                  description: Project ID.
                  schema:
                    type: string
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                name:
                                    type:
                                        - string
                                        - "null"
                                    description: New project name; null/omitted leaves it unchanged.
                                code:
                                    type:
                                        - string
                                        - "null"
                                    description: New project code; null/omitted leaves it unchanged.
                                organizationId:
                                    type:
                                        - string
                                        - "null"
                                    description: New owning organization ID; null/omitted leaves it unchanged.
                                description:
                                    type:
                                        - string
                                        - "null"
                                    description: New description; null/omitted leaves it unchanged.
                                contactName:
                                    type:
                                        - string
                                        - "null"
                                    description: New contact name; null/omitted leaves it unchanged.
                                contactEmail:
                                    type:
                                        - string
                                        - "null"
                                    description: New contact email; null/omitted leaves it unchanged.
                                status:
                                    type:
                                        - string
                                        - "null"
                                    description: New status; null/omitted leaves it unchanged.
                        example:
                            name: Acme Production (renamed)
                            status: active
            responses:
                "400":
                    description: Bad Request
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/orgstore_Project'
                            example:
                                id: 7c9e6679-7425-40de-944b-e07fc1f90ae7
                                name: Acme Production (renamed)
                                code: acme-prod
                                organizationId: 1b9d6bcd-bbfd-4b2d-9b5d-ab8dfbbd4bed
                                description: Production workloads for Acme
                                contactName: Jane Doe
                                contactEmail: jane@example.com
                                status: active
                                createdAt: 2026-01-15T09:30:00Z
                                updatedAt: 2026-02-02T08:15:00Z
        delete:
            operationId: deleteProject
            summary: Delete a project
            description: |
                Deletes a project by ID. The handler refuses with 409 Conflict when
                the project still has virtual keys attached; remove or reassign those
                keys first. On success the ai-gateway "organizations" config snapshot
                is invalidated, a delete audit entry is recorded, and the endpoint
                returns 204 No Content.
            x-nexus-iam-action: iam.ResourceProject.Action(iam.VerbDelete)
            x-nexus-tier: confirm
            parameters:
                - name: id
                  in: path
                  required: true
                  description: Project ID.
                  schema:
                    type: string
            responses:
                "409":
                    description: Conflict
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "204":
                    description: No Content
components:
    schemas:
        orgstore_Project:
            type: object
            properties:
                id:
                    type: string
                name:
                    type: string
                code:
                    type: string
                organizationId:
                    type: string
                description:
                    type:
                        - string
                        - "null"
                contactName:
                    type:
                        - string
                        - "null"
                contactEmail:
                    type:
                        - string
                        - "null"
                status:
                    type: string
                createdAt:
                    type: string
                    format: date-time
                updatedAt:
                    type: string
                    format: date-time
            required:
                - id
                - name
                - code
                - organizationId
                - status
                - createdAt
                - updatedAt
