# Hand-maintained OpenAPI spec, verified claim-by-claim against the control-plane
# handler code (the single source of truth) via the openapi-review skill. Keep
# structural fields (paths/verbs/types) in lockstep with the handlers.
openapi: 3.1.0
info:
    title: Nexus Control Plane Admin API — users
    version: dev
    description: 'Hand-maintained against control-plane source: field names, types, optionality, status codes and IAM tiers mirror the handler code; enum value sets and required-field rules enforced imperatively in handlers are verified by the openapi-review skill.'
paths:
    /api/admin/users:
        get:
            operationId: listUsers
            summary: List Nexus users
            description: |-
                Returns a paginated list of Nexus users, each enriched with the
                names of the IAM policies (roles) attached to the principal and,
                when set, the user's organization id and name. Never includes the
                password hash. Supports free-text search and filtering by
                organization, enabled state, and Control Plane access.
            x-nexus-iam-action: iam.ResourceUser.Action(iam.VerbRead)
            x-nexus-tier: auto
            parameters:
                - name: q
                  in: query
                  description: Free-text search; matched case-insensitively against displayName and email.
                  required: false
                  schema:
                    type: string
                - name: organizationId
                  in: query
                  description: Restrict results to users in this organization.
                  required: false
                  schema:
                    type: string
                - name: includeSubOrgs
                  in: query
                  description: When 'true', also include users in descendant organizations of organizationId.
                  required: false
                  schema:
                    type: string
                    enum:
                        - "true"
                        - "false"
                - name: enabled
                  in: query
                  description: Filter by account state; 'true' selects active users, 'false' selects non-active users.
                  required: false
                  schema:
                    type: string
                    enum:
                        - "true"
                        - "false"
                - name: canAccessControlPlane
                  in: query
                  description: Filter by whether the user may sign in to the Control Plane.
                  required: false
                  schema:
                    type: string
                    enum:
                        - "true"
                        - "false"
            responses:
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: A page of users with their attached role names and the total count.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                data:
                                    - id: usr_01HZX
                                      displayName: Ada Lovelace
                                      email: ada@example.com
                                      status: active
                                      canAccessControlPlane: true
                                      source: local
                                      roles:
                                        - admin
                                      lastLoginAt: "2026-01-15T09:30:00Z"
                                      createdAt: "2026-01-01T00:00:00Z"
                                      updatedAt: "2026-01-15T09:30:00Z"
                                      organizationId: org_01HZX
                                      organizationName: Engineering
                                total: 1
        post:
            operationId: createUser
            summary: Create a local Nexus user
            description: |-
                Creates a locally-provisioned (source "local") Nexus user with a
                bcrypt-hashed password. username and password are required;
                username is stored as the displayName. email is optional. When
                canAccessControlPlane is omitted it defaults to true. Returns the
                created user in its safe form (no password hash).
            x-nexus-iam-action: iam.ResourceUser.Action(iam.VerbCreate)
            x-nexus-tier: confirm
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                username:
                                    type: string
                                    description: Login/display name for the user. Required and non-empty.
                                email:
                                    type: string
                                    description: Optional contact email; stored only when non-empty.
                                password:
                                    type: string
                                    description: Write-only initial password. Bcrypt-hashed server-side; never returned in any response.
                                organizationId:
                                    type:
                                        - string
                                        - "null"
                                    description: Optional organization to which the user belongs.
                                canAccessControlPlane:
                                    type:
                                        - boolean
                                        - "null"
                                    description: Whether the user may sign in to the Control Plane. Defaults to true when omitted.
                            required:
                                - username
                                - password
                        example:
                            username: ada
                            email: ada@example.com
                            password: "<initial-password>"
                            organizationId: org_01HZX
                            canAccessControlPlane: true
            responses:
                "400":
                    description: Invalid request body, or username/password missing.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "201":
                    description: The created user in safe form.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/userstore_NexusUserSafe'
                            example:
                                id: usr_01HZX
                                displayName: ada
                                email: ada@example.com
                                status: active
                                canAccessControlPlane: true
                                source: local
                                lastLoginAt: null
                                preferredTimezone: null
                                createdAt: "2026-01-01T00:00:00Z"
                                updatedAt: "2026-01-01T00:00:00Z"
                                organizationId: org_01HZX
    /api/admin/users/{id}:
        get:
            operationId: getUser
            summary: Get a single Nexus user
            description: |-
                Returns one user in safe form (no password hash), enriched with
                attached IAM policy names (roles), the full policy-attachment
                records, and the user's organization id and name when set.
                Responds 404 when no user has the given id.
            x-nexus-iam-action: iam.ResourceUser.Action(iam.VerbRead)
            x-nexus-tier: auto
            parameters:
                - name: id
                  in: path
                  description: Identifier of the user to fetch.
                  required: true
                  schema:
                    type: string
            responses:
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "404":
                    description: No user exists with the given id.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: The requested user with roles and policy attachments.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                id: usr_01HZX
                                displayName: Ada Lovelace
                                email: ada@example.com
                                status: active
                                canAccessControlPlane: true
                                source: local
                                roles:
                                    - admin
                                policyAttachments: []
                                lastLoginAt: "2026-01-15T09:30:00Z"
                                createdAt: "2026-01-01T00:00:00Z"
                                updatedAt: "2026-01-15T09:30:00Z"
                                organizationId: org_01HZX
                                organizationName: Engineering
        put:
            operationId: updateUser
            summary: Update a Nexus user
            description: |-
                Updates the named user. All fields are optional; only the fields
                present are written. A non-empty password is bcrypt-hashed and
                replaces the stored hash (empty password is ignored). Setting
                enabled to false also revokes the user's live data-plane sessions.
                Returns the updated user in safe form (no password hash).
            x-nexus-iam-action: iam.ResourceUser.Action(iam.VerbUpdate)
            x-nexus-tier: confirm
            parameters:
                - name: id
                  in: path
                  description: Identifier of the user to update.
                  required: true
                  schema:
                    type: string
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                displayName:
                                    type:
                                        - string
                                        - "null"
                                    description: New display name.
                                email:
                                    type:
                                        - string
                                        - "null"
                                    description: New contact email.
                                enabled:
                                    type:
                                        - boolean
                                        - "null"
                                    description: Account state. Setting false suspends the user and revokes live sessions.
                                password:
                                    type:
                                        - string
                                        - "null"
                                    description: Write-only new password. When non-empty it is bcrypt-hashed and replaces the stored hash; never returned in any response.
                                organizationId:
                                    type:
                                        - string
                                        - "null"
                                    description: Move the user to this organization.
                                canAccessControlPlane:
                                    type:
                                        - boolean
                                        - "null"
                                    description: Whether the user may sign in to the Control Plane.
                        example:
                            displayName: Ada Lovelace
                            email: ada@example.com
                            enabled: true
                            canAccessControlPlane: true
            responses:
                "400":
                    description: Invalid request body.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: The updated user in safe form.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/userstore_NexusUserSafe'
                            example:
                                id: usr_01HZX
                                displayName: Ada Lovelace
                                email: ada@example.com
                                status: active
                                canAccessControlPlane: true
                                source: local
                                lastLoginAt: "2026-01-15T09:30:00Z"
                                preferredTimezone: null
                                createdAt: "2026-01-01T00:00:00Z"
                                updatedAt: "2026-01-16T11:00:00Z"
        delete:
            operationId: deleteUser
            summary: Delete a Nexus user
            description: Permanently deletes the named user. Responds 204 with no body on success.
            x-nexus-iam-action: iam.ResourceUser.Action(iam.VerbDelete)
            x-nexus-tier: confirm
            parameters:
                - name: id
                  in: path
                  description: Identifier of the user to delete.
                  required: true
                  schema:
                    type: string
            responses:
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "204":
                    description: User deleted; no response body.
    /api/admin/users/{id}/audit:
        get:
            operationId: getUserAudit
            summary: List a user's cross-path audit events
            description: |-
                Returns a paginated list of unified audit events for the user
                across all paths (virtual-key ownership, device assignments,
                account changes), most recent first, with a total count.
            x-nexus-iam-action: iam.ResourceUser.Action(iam.VerbRead)
            x-nexus-tier: auto
            parameters:
                - name: id
                  in: path
                  description: Identifier of the user whose audit events are listed.
                  required: true
                  schema:
                    type: string
            responses:
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: A page of audit events with the total count.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                data: []
                                total: 0
    /api/admin/users/{id}/device-assignments:
        get:
            operationId: listUserDeviceAssignments
            summary: List a user's device assignments
            description: |-
                Returns all device assignments (active and historical) for the
                user, ordered most recent first, with a total count. The total
                reflects the number of returned assignments.
            x-nexus-iam-action: iam.ResourceUser.Action(iam.VerbRead)
            x-nexus-tier: auto
            parameters:
                - name: id
                  in: path
                  description: Identifier of the user whose device assignments are listed.
                  required: true
                  schema:
                    type: string
            responses:
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: A list of device assignments with the total count.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                data: []
                                total: 0
    /api/admin/users/{id}/identity:
        get:
            operationId: getUserIdentity
            summary: Get a user's cross-path identity summary
            description: |-
                Returns a cross-path identity summary for the user: the user in
                safe form, their owned virtual keys, their active device
                assignments, and per-source audit counts. Responds 404 when no
                user has the given id.
            x-nexus-iam-action: iam.ResourceUser.Action(iam.VerbRead)
            x-nexus-tier: auto
            parameters:
                - name: id
                  in: path
                  description: Identifier of the user to summarize.
                  required: true
                  schema:
                    type: string
            responses:
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "404":
                    description: No user exists with the given id.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: The user with their virtual keys, devices, and audit summary.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                user:
                                    id: usr_01HZX
                                    displayName: Ada Lovelace
                                    email: ada@example.com
                                    status: active
                                    canAccessControlPlane: true
                                    source: local
                                    lastLoginAt: "2026-01-15T09:30:00Z"
                                    preferredTimezone: null
                                    createdAt: "2026-01-01T00:00:00Z"
                                    updatedAt: "2026-01-15T09:30:00Z"
                                virtualKeys: []
                                devices: []
                                auditSummary: {}
    /api/admin/users/{id}/revoke-access:
        post:
            operationId: revokeUserAccess
            summary: Revoke all of a user's access
            description: |-
                Revokes the user's access across every path: disables all virtual
                keys they own, revokes all devices assigned to them, suspends the
                account, and kicks live data-plane sessions. Returns the counts of
                keys disabled and devices revoked. Responds 404 when no user has
                the given id.
            x-nexus-iam-action: iam.ResourceUser.Action(iam.VerbRevoke)
            x-nexus-tier: confirm
            parameters:
                - name: id
                  in: path
                  description: Identifier of the user whose access is revoked.
                  required: true
                  schema:
                    type: string
            responses:
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "404":
                    description: No user exists with the given id.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: Summary of the revocation, with counts of keys disabled and devices revoked.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                keysDisabled: 3
                                devicesRevoked: 2
                                userSuspended: true
                                userId: usr_01HZX
components:
    schemas:
        userstore_NexusUserSafe:
            type: object
            description: A Nexus user as exposed by the API, never including the password hash.
            properties:
                id:
                    type: string
                    description: Unique user identifier.
                displayName:
                    type: string
                    description: Human-readable name shown in the UI.
                email:
                    type:
                        - string
                        - "null"
                    description: Contact email; null when none is set.
                status:
                    type: string
                    description: Account state; "active" denotes an enabled user, any other value a suspended/disabled one.
                canAccessControlPlane:
                    type: boolean
                    description: Whether the user may sign in to the Control Plane.
                source:
                    type: string
                    description: How the user was provisioned.
                    enum:
                        - local
                        - oidc
                        - scim
                lastLoginAt:
                    type:
                        - string
                        - "null"
                    format: date-time
                    description: Timestamp of the last successful login; null if never logged in.
                preferredTimezone:
                    type:
                        - string
                        - "null"
                    description: User's preferred display timezone; null when unset.
                createdAt:
                    type: string
                    format: date-time
                    description: Creation timestamp.
                updatedAt:
                    type: string
                    format: date-time
                    description: Last-update timestamp.
                organizationId:
                    type:
                        - string
                        - "null"
                    description: Organization the user belongs to; populated on list/get, null when none.
                organizationName:
                    type:
                        - string
                        - "null"
                    description: Name of the user's organization; populated alongside organizationId.
            required:
                - id
                - displayName
                - status
                - canAccessControlPlane
                - source
                - createdAt
                - updatedAt
