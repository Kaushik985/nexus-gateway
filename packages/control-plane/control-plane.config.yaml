# Nexus Control Plane — production config template.
# Covers the COMMON fields of cmd/control-plane/config/config.go.Config;
# the full field set lives in cmd/control-plane/config/config.go.
# Env var overrides (applied after YAML): CONTROL_PLANE_PORT,
# CONTROL_PLANE_PUBLIC_URL, DATABASE_URL, REDIS_* (see
# packages/shared/storage/redisfactory for the full universal Redis env
# contract), LOG_LEVEL, COMPLIANCE_PROXY_URL,
# AI_GATEWAY_URL, NEXUS_HUB_URL, CREDENTIAL_ENCRYPTION_KEY,
# CREDENTIAL_KEY_MAP, CONTROL_PLANE_CRYPTO_PRODUCTION,
# ADMIN_KEY_HMAC_SECRET, INTERNAL_SERVICE_TOKEN, AGENT_CA_DIR, COMPLIANCE_PROXY_RUNTIME_URL,
# COMPLIANCE_PROXY_API_TOKEN, OTEL_ENDPOINT, OTEL_SERVICE_NAME,
# MQ_DRIVER, NATS_URL, AUTH_SERVER_ISSUER, AUTH_SERVER_KEYSTORE_DIR.

# REQUIRED. Externally-reachable base URL for this service; startup
# validation fails when empty. Env CONTROL_PLANE_PUBLIC_URL overrides.
# publicURL: "https://nexus.example.com"

server:
  port: 3001
  shutdownTimeout: "10s"

database:
  url: ""
  # Connection-pool sizing. The Control Plane is the admin API + BFF +
  # IAM + analytics — NOT on the data-plane per-token path. Its queries
  # hit Postgres directly (not cached like the gateway), but concurrency
  # is LOW: a handful of admins, where the heaviest consumer is an
  # analytics dashboard fanning out a few parallel aggregation queries.
  # 15 covers that burst without hoarding Postgres backends. Coordinate
  # across services: the SUM of all services' maxConns must stay below
  # Postgres `max_connections` (appliance default 200).
  maxConns: 15
  minConns: 3
  maxConnLifetime: "300s"

redis:
  # Universal Redis configuration. Empty addrs disables Redis — CP falls
  # back to in-memory sessions + IAM cache. See packages/shared/storage/
  # redisfactory + docs/developers/architecture/cross-cutting/foundation/configuration-architecture.md §9.
  mode: standalone
  addrs: []
  username: ""
  password: ""        # env REDIS_PASSWORD overrides
  db: 0
  sentinel:
    masterName: ""
    username: ""
    password: ""
  cluster:
    maxRedirects: 8
    routeRandomly: false
    readOnly: false
  tls:
    enabled: false
    insecureSkipVerify: false
    caFile: ""
    certFile: ""
    keyFile: ""
    serverName: ""
  poolSize: 200
  minIdleConns: 50
  maxRetries: 3
  dialTimeout: 5s
  readTimeout: 3s
  writeTimeout: 3s
  poolTimeout: 4s

log:
  level: "info"
  format: "json"

# Back-end-for-frontend: URLs the CP proxies admin calls to.
bff:
  complianceProxyUrl: "http://127.0.0.1:3040"
  aiGatewayUrl: "http://127.0.0.1:3050"
  complianceProxyRuntimeUrl: "http://127.0.0.1:3040"
  # complianceProxyApiToken is env-only (COMPLIANCE_PROXY_API_TOKEN); the
  # yaml field is ignored by the loader.

# Hub registration (thingclient). Symmetric with ai-gateway /
# compliance-proxy. Env override: NEXUS_HUB_URL.
registry:
  nexusHubUrl: "http://127.0.0.1:3060"

# auth.internalServiceToken is env-only (INTERNAL_SERVICE_TOKEN); the yaml
# field is ignored by the loader. Must match Hub's INTERNAL_SERVICE_TOKEN.

crypto:
  # The credential-encryption secrets are env-only; the yaml fields are
  # ignored by the loader:
  #   encryptionKey     → CREDENTIAL_ENCRYPTION_KEY
  #   credentialKeyMap  → CREDENTIAL_KEY_MAP
  production: true

agent:
  caDir: ".agent-ca"

otel:
  endpoint: ""
  serviceName: "nexus-control-plane"

mq:
  driver: "nats"
  nats:
    # url is the only per-service knob; NATS server-side limits (max_payload,
    # max_connections) live in the appliance (nexus-ami/scripts/install-nats.sh)
    # and docker-compose.yml.
    url: "nats://localhost:4222"
