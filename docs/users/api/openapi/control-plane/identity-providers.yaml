                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/handler_idpWriteRequest'
                        example:
                            type: oidc
                            name: Okta Production
                            enabled: false
                            config:
                                issuer: https://example.okta.com
                                clientId: 0oa1b2c3d4
                                clientSecret: '********'
                                redirectUri: https://nexus.example.com/authserver/callback
                            defaultRole: viewer
                            jitEnabled: true
            responses:
                "404":
                    description: Not Found — no identity provider matches the id
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "403":
                    description: Forbidden — the built-in local identity store is not editable
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "400":
                    description: Bad Request — invalid body or failed validation
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/handler_idpResponse'
        delete:
            operationId: deleteIdentityProvider
            summary: Delete an identity provider
            description: |-
                Deletes an identity provider. The built-in "local" store cannot be
                deleted (responds 403). When linked federated-identity users exist the
                request is refused with 409 unless force=true, which cascades the
                linked federated-identity rows, revokes scoped SCIM tokens, removes
                group mappings, and fires a best-effort session-revocation fan-out for
                the affected users after the delete commits.
            x-nexus-iam-action: idp.Action(iam.VerbDelete)
            x-nexus-tier: confirm
            parameters:
                - name: idpId
                  in: path
                  required: true
                  description: Identifier of the identity provider.
                  schema:
                    type: string
                - name: force
                  in: query
                  required: false
                  description: When "true", cascades linked federated identities and revocations instead of refusing with 409. Parsed as a boolean.
                  schema:
                    type: string
            responses:
                "404":
                    description: Not Found — no identity provider matches the id
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "403":
                    description: Forbidden — the built-in local identity store cannot be deleted
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "409":
                    description: Conflict — identity provider has linked users; pass force=true to cascade
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "204":
                    description: No Content — identity provider deleted
