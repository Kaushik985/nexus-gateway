    /api/admin/dsar:
        get:
            operationId: listDSAR
            summary: List DSAR requests
            description: |-
                Returns a paginated list of Data Subject Access Request (DSAR)
                records, optionally filtered by status. Results are ordered by
                creation time descending. The response wraps the page in
                `requests` together with the total unfiltered `total` count and
                the resolved `limit`/`offset`.
