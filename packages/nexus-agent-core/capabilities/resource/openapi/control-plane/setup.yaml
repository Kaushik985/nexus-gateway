# Hand-maintained OpenAPI spec, verified claim-by-claim against the control-plane
# handler code (the single source of truth) via the openapi-review skill. Keep
# structural fields (paths/verbs/types) in lockstep with the handlers.
openapi: 3.1.0
info:
    title: Nexus Control Plane Admin API — setup
    version: dev
    description: 'Hand-maintained against control-plane source: field names, types, optionality, status codes and IAM tiers mirror the handler code; enum value sets and required-field rules enforced imperatively in handlers are verified by the openapi-review skill.'
paths:
    /api/admin/setup/proxy/{thingId}/ca-cert:
        get:
            operationId: setupGetCACert
            summary: Download proxy CA certificate
            description: |-
                Relays a request to the live compliance-proxy instance identified by thingId and
                streams back its CA certificate as a PEM file. The Control Plane resolves the proxy's
                management base URL from Hub, then proxies GET {managementURL}/management/ca-cert.
                The successful response is a binary PEM body (Content-Type application/x-pem-file)
                with a Content-Disposition attachment of nexus-proxy-ca.crt, not a JSON object.
            x-nexus-tier: auto
            parameters:
                - name: thingId
                  in: path
                  required: true
                  description: ID of the compliance-proxy Thing whose CA certificate is requested.
                  schema:
                    type: string
            responses:
                "200":
                    description: PEM-encoded CA certificate (binary attachment).
                    content:
                        application/x-pem-file:
                            schema:
                                type: string
                                format: binary
                "404":
                    description: No proxy Thing with the given ID, or it has not reported a management URL.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                error: thing_not_found
                                message: No compliance proxy Thing with the given ID exists
                "500":
                    description: Internal Server Error — failed to build the relay request.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                error: relay_error
                                message: 'build relay request: ...'
                "502":
                    description: Bad Gateway — the proxy management endpoint was unreachable or returned a non-200 status.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                error: proxy_unreachable
                                message: Timeout connecting to proxy management endpoint
    /api/admin/setup/proxy/{thingId}/mdm-profile:
        get:
            operationId: setupGetMDMProfile
            summary: Download Apple MDM configuration profile
            description: |-
                Fetches the CA certificate from the live compliance-proxy instance (resolved via Hub)
                and renders an Apple .mobileconfig profile that installs the proxy CA as a trusted
                root in the System keychain. The successful response is a binary .mobileconfig body
                (Content-Type application/x-apple-aspen-config) with a Content-Disposition attachment
                of nexus-proxy-ca.mobileconfig, not a JSON object.
            x-nexus-tier: auto
            parameters:
                - name: thingId
                  in: path
                  required: true
                  description: ID of the compliance-proxy Thing whose CA certificate is embedded in the profile.
                  schema:
                    type: string
                - name: organization
                  in: query
                  required: false
                  description: Organization name shown in the profile display name and description. Defaults to "Nexus Gateway" when omitted or empty.
                  schema:
                    type: string
            responses:
                "200":
                    description: Apple .mobileconfig profile (binary attachment).
                    content:
                        application/x-apple-aspen-config:
                            schema:
                                type: string
                                format: binary
                "404":
                    description: No proxy Thing with the given ID, or it has not reported a management URL.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                error: thing_not_found
                                message: No compliance proxy Thing with the given ID exists
                "500":
                    description: Internal Server Error — failed to build the relay request or render the profile template.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                error: template_error
                                message: 'render MDM profile: ...'
                "502":
                    description: Bad Gateway — the proxy management endpoint was unreachable or the CA cert could not be read.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                error: proxy_unreachable
                                message: Failed to read CA cert from proxy
    /api/admin/setup/proxy/{thingId}/onboarding:
        patch:
            operationId: setupPatchOnboarding
            summary: Toggle proxy onboarding mode
            description: |-
                Pushes the onboarding.enabled flag to the compliance-proxy Thing's desired shadow
                state via Hub (config key "onboarding", thing type "compliance-proxy"). When enabled,
                the proxy runs in onboarding mode. The response echoes the thingId, the applied
                enabled value, and an RFC 3339 push timestamp.
            x-nexus-iam-action: iam.ResourceSettings.Action(iam.VerbWrite)
            x-nexus-tier: confirm
            parameters:
                - name: thingId
                  in: path
                  required: true
                  description: ID of the compliance-proxy Thing whose onboarding state is updated.
                  schema:
                    type: string
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                enabled:
                                    type: boolean
                                    description: Whether onboarding mode is enabled on the proxy.
                            required:
                                - enabled
                        example:
                            enabled: true
            responses:
                "200":
                    description: Onboarding state successfully pushed to Hub.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                thingId: cp-001
                                enabled: true
                                pushedAt: "2026-05-29T12:00:00Z"
                "400":
                    description: 'Bad Request — request body could not be bound to {"enabled": bool}.'
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                error: invalid_params
                                message: 'request body must be {"enabled": bool}'
                "502":
                    description: Bad Gateway — Hub could not be reached to push the onboarding state.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                error: hub_error
                                message: Could not push onboarding state to Hub
    /api/admin/setup/proxy/{thingId}/pac-file:
        get:
            operationId: setupGetPACFile
            summary: Download proxy auto-config (PAC) file
            description: |-
                Generates a JavaScript PAC file that routes all enabled interception domains through
                the proxy host:port and sends everything else DIRECT. When no interception domains are
                enabled, a DIRECT-only PAC is returned so clients do not fail. The successful response
                is a binary PAC body (Content-Type application/x-ns-proxy-autoconfig) with a
                Content-Disposition attachment of nexus-proxy.pac, not a JSON object.
            x-nexus-tier: auto
            parameters:
                - name: thingId
                  in: path
                  required: true
                  description: ID of the compliance-proxy Thing (path scope; the PAC content is derived from enabled interception domains, not from this Thing).
                  schema:
                    type: string
                - name: proxyHost
                  in: query
                  required: true
                  description: Proxy host emitted into the generated PROXY directive. Required; a missing or empty value yields HTTP 400.
                  schema:
                    type: string
                - name: proxyPort
                  in: query
                  required: true
                  description: Proxy port emitted into the generated PROXY directive. Required; a missing or empty value yields HTTP 400.
                  schema:
                    type: string
                - name: failOpen
                  in: query
                  required: false
                  description: When the literal string "true", monitored domains fall back to DIRECT if the proxy is unreachable (PROXY host:port; DIRECT). Any other value keeps the strict PROXY directive.
                  schema:
                    type: string
                    enum:
                        - "true"
            responses:
                "200":
                    description: Generated PAC file (binary attachment).
                    content:
                        application/x-ns-proxy-autoconfig:
                            schema:
                                type: string
                                format: binary
                "400":
                    description: Bad Request — proxyHost and/or proxyPort query parameters were missing or empty.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                error: invalid_params
                                message: proxyHost and proxyPort are required
                "500":
                    description: Internal Server Error — failed to load interception domains or render the PAC template.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                error: db_error
                                message: Could not load interception domains
