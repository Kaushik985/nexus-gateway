# LiteLLM proxy — benchmark target config.
# api_key is the LiteLLM master key (sk-local-dev locally), read from env.
gateway_name: litellm
version: main-latest
base_url: http://localhost:4000
api_key_env: LITELLM_API_KEY
model: gpt-4o-mini
provider: openai
cache_mode: disabled        # enabled | disabled
request_timeout: 60
max_tokens: 512
stream: true
