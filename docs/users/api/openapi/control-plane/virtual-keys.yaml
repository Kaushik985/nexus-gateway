                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                                properties:
                                    deleted:
                                        type: boolean
                                    name:
                                        type: string
                            example:
                                deleted: true
                                name: production-app
    /api/admin/virtual-keys/{id}/approve:
        post:
            operationId: approveVirtualKey
            summary: Approve a pending virtual key
            description: |-
                Approves a virtual key that is in "pending" status, transitioning it to
                "active" and recording the approver. Returns 404 when the key does not
                exist or is not pending.
            x-nexus-iam-action: iam.ResourceVirtualKey.Action(iam.VerbApprove)
            x-nexus-tier: confirm
            parameters:
                - name: id
                  in: path
                  description: Virtual key id.
                  required: true
                  schema:
                    type: string
            responses:
                "404":
                    description: Virtual key not found or not in pending status.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                                properties:
                                    message:
                                        type: string
                            example:
                                message: Virtual key approved
    /api/admin/virtual-keys/{id}/regenerate:
        post:
            operationId: regenerateVirtualKey
            summary: Regenerate a virtual key secret
            description: |-
                Rotates the secret of an existing virtual key. The previous hash is
                invalidated on the data plane and a fresh secret is returned exactly once
                in the `key` field — it cannot be retrieved again. Non-super-admin callers
                may only regenerate keys they own.
            x-nexus-iam-action: iam.ResourceVirtualKey.Action(iam.VerbUpdate)
            x-nexus-tier: confirm
            parameters:
                - name: id
                  in: path
                  description: Virtual key id.
                  required: true
                  schema:
                    type: string
            responses:
                "404":
                    description: Not Found
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "403":
                    description: Forbidden
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: |-
                        OK. The `key` field carries the freshly generated secret and is
                        returned only on this response.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                                properties:
                                    id:
                                        type: string
                                    key:
                                        type: string
                                        description: The new raw virtual key secret, shown only once.
                                    keyPrefix:
                                        type: string
                                    message:
                                        type: string
                            example:
                                id: 6f1c2e8a-7b3d-4f9a-9c11-2a4b6c8d0e21
                                key: nvk_b2c3d4e5f60718293a4b5c6d7e8f90a1b2c3d4e5f60718293a4b5c6d7e8f901a
                                keyPrefix: nvk_b2c3d4e5
                                message: Key regenerated. Save this key — it will not be shown again.
    /api/admin/virtual-keys/{id}/reject:
        post:
            operationId: rejectVirtualKey
            summary: Reject a pending virtual key
            description: |-
                Rejects a virtual key that is in "pending" status, transitioning it to
                "rejected" and recording the rejecter and the supplied reason. The reason
                is stored as-is and is not validated as non-empty. Returns 404 when the key
                does not exist or is not pending.
            x-nexus-iam-action: iam.ResourceVirtualKey.Action(iam.VerbReject)
            x-nexus-tier: confirm
            parameters:
                - name: id
                  in: path
                  description: Virtual key id.
                  required: true
                  schema:
                    type: string
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                reason:
                                    type: string
                                    description: Free-text rejection reason recorded on the key.
                        example:
                            reason: Project scope not approved by security review.
            responses:
                "400":
                    description: Bad Request
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "404":
                    description: Virtual key not found or not in pending status.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                                properties:
                                    message:
                                        type: string
                            example:
                                message: Virtual key rejected
    /api/admin/virtual-keys/{id}/renew:
        post:
            operationId: renewVirtualKey
            summary: Renew an active virtual key
            description: |-
                Extends the expiry of an active application virtual key. `expiresAt` is
                required, must be in the future, and must not exceed three months from now.
                The data plane cache is invalidated so the new expiry takes effect on the
                next request. Returns 404 when the key is not found, not active, or not an
                active application key.
            x-nexus-iam-action: iam.ResourceVirtualKey.Action(iam.VerbRenew)
            x-nexus-tier: confirm
            parameters:
                - name: id
                  in: path
                  description: Virtual key id.
                  required: true
                  schema:
                    type: string
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                expiresAt:
                                    type: string
                                    format: date-time
                                    description: New expiry. Must be in the future and within three months from now.
                            required:
                                - expiresAt
                        example:
                            expiresAt: 2026-04-15T00:00:00Z
            responses:
                "400":
                    description: Bad Request
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "404":
                    description: Virtual key not found, not active, or not an active application key.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                                properties:
                                    message:
                                        type: string
                                    expiresAt:
                                        type: string
                                        format: date-time
                            example:
                                message: Virtual key renewed
                                expiresAt: 2026-04-15T00:00:00Z
    /api/admin/virtual-keys/{id}/revoke:
        post:
            operationId: revokeVirtualKey
            summary: Revoke an active virtual key
            description: |-
                Revokes an active virtual key, transitioning it to "revoked" and
                invalidating it on the data plane. Returns 404 when the key does not exist
