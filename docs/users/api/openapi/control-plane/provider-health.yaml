            x-nexus-tier: auto
            responses:
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                error:
                                    message: Internal server error
                                    type: server_error
                                    code: ""
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                                properties:
                                    data:
                                        type: array
                                        description: Provider health records, ordered by provider name ascending.
                                        items:
                                            type: object
                                            properties:
                                                providerId:
                                                    type: string
                                                    description: Identifier of the provider this health record belongs to.
                                                provider:
                                                    type: string
                                                    description: Human-readable provider name.
                                                status:
                                                    type: string
                                                    description: 'Health status derived from the rolling error rate by the provider-health rollup job.'
                                                    enum:
                                                        - healthy
                                                        - degraded
                                                        - unavailable
                                                errorRate:
                                                    type: number
                                                    description: Rolling error rate over the aggregation window, as a fraction between 0 and 1.
                                                avgLatencyMs:
                                                    type: integer
                                                    description: Average upstream latency in milliseconds over the aggregation window.
                                                sampleCount:
