                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                                properties:
                                    message:
                                        type: string
                            example:
                                message: Virtual key revoked
components:
    schemas:
        vkstore_VirtualKey:
            type: object
            description: |-
                A virtual key record. The raw secret is never present on read responses;
                only its hash and short prefix are stored. The raw secret is returned once,
                on create and regenerate, in a separate `key` field.
            properties:
                id:
                    type: string
                name:
                    type: string
                keyHash:
                    type:
                        - string
                        - "null"
                    description: Hash of the raw secret. The secret itself is never returned on reads.
                keyPrefix:
                    type:
                        - string
                        - "null"
                    description: Short non-secret prefix of the key (the leading characters of the raw secret) for display.
                projectId:
                    type:
                        - string
                        - "null"
                sourceApp:
                    type:
                        - string
                        - "null"
                enabled:
                    type: boolean
                expiresAt:
                    type:
                        - string
                        - "null"
                    format: date-time
                rateLimitRpm:
                    type:
                        - integer
                        - "null"
                compareEndpointRateLimitRpm:
                    type:
                        - integer
                        - "null"
                allowedModels:
                    description: arbitrary JSON value
                ownerId:
                    type:
                        - string
                        - "null"
                createdBy:
                    type:
                        - string
                        - "null"
                createdAt:
                    type: string
                    format: date-time
                updatedAt:
                    type: string
                    format: date-time
                vkType:
                    type:
                        - string
                        - "null"
                    description: Virtual key type.
                    enum:
                        - personal
                        - application
                        - null
                vkStatus:
                    type:
                        - string
                        - "null"
                    description: Lifecycle status of the virtual key.
                    enum:
                        - active
                        - pending
                        - rejected
                        - revoked
                        - expired
                        - null
                approvedBy:
                    type:
                        - string
                        - "null"
                approvedAt:
                    type:
                        - string
                        - "null"
                    format: date-time
                rejectedBy:
                    type:
                        - string
                        - "null"
                rejectedAt:
                    type:
                        - string
                        - "null"
                    format: date-time
                rejectReason:
                    type:
                        - string
                        - "null"
            required:
                - id
                - name
                - enabled
                - allowedModels
                - createdAt
                - updatedAt
