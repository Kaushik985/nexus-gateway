                                      updatedAt: 2026-01-02T00:00:00Z
                                total: 1
        post:
            operationId: createIdentityProvider
            summary: Create an identity provider
            description: |-
                Registers a new external identity provider. The type must be "oidc"
                or "saml" — the built-in "local" store cannot be created through this
                surface. On create, OIDC requires issuer, clientId, redirectUri and a
                non-masked clientSecret in config; SAML requires entityId, ssoUrl and a
                non-masked certificatePem. enabled and jitEnabled default to true when
                omitted. The created provider is returned with secrets masked.
