components:
    schemas:
        handler_payload:
            type: object
            description: |-
                The read/write shape for a single passthrough tier. On write, validation is
                conditional on `enabled`: when `enabled=false` the bypass flags, `expiresAt`
                and `reason` are ignored; when `enabled=true` the handler requires at least one
                bypass flag set, a future `expiresAt` within the maximum window, and a `reason`
                of at least the minimum length, and rejects `bypassNormalize=true` unless
                `bypassCache=true`.
            properties:
                enabled:
                    type: boolean
                    description: Whether passthrough is active for this tier. When false the remaining fields carry no effect.
                bypassHooks:
                    type: boolean
                    description: Skip the request/response hook stages for matching traffic. At least one bypass flag must be true when enabled.
                bypassCache:
                    type: boolean
                    description: Skip the response cache for matching traffic. Required to be true when bypassNormalize is true (the cache key derives from the normalized payload).
                bypassNormalize:
                    type: boolean
                    description: Skip canonical normalization for matching traffic. Requires bypassCache to also be true.
                expiresAt:
                    type:
                        - string
                        - "null"
                    format: date-time
                    description: Auto-expiry timestamp. Required when enabled=true; must be in the future and within the maximum passthrough window.
                reason:
                    type: string
                    description: Operator justification for enabling passthrough. Required (minimum length enforced) when enabled=true.
            required:
                - enabled
            example:
                enabled: true
                bypassHooks: true
                bypassCache: false
                bypassNormalize: false
                expiresAt: "2026-05-29T18:00:00Z"
                reason: Incident INC-1234 â€” provider hook stage is rejecting valid traffic
        handler_snapshotResponse:
            type: object
            description: The full passthrough config tree across all three tiers, as returned by the snapshot endpoint.
            properties:
                global:
                    $ref: '#/components/schemas/handler_tierBlob'
                adapters:
                    type: object
                    description: Adapter-tier configs keyed by adapter type.
                    additionalProperties:
                        $ref: '#/components/schemas/handler_tierBlob'
                providers:
                    type: object
                    description: Provider-tier configs keyed by provider ID.
                    additionalProperties:
                        $ref: '#/components/schemas/handler_tierBlob'
                providerNames:
                    type: object
                    description: Human-readable provider names keyed by provider ID, for the IDs present in providers; absent IDs fall back to the raw ID in the UI.
                    additionalProperties:
                        type: string
            required:
                - global
                - adapters
                - providers
            example:
                global:
                    enabled: false
                    bypassHooks: false
                    bypassCache: false
                    bypassNormalize: false
                adapters:
                    openai-chat:
                        enabled: true
                        bypassHooks: true
                        bypassCache: false
                        bypassNormalize: false
                        expiresAt: "2026-05-29T18:00:00Z"
                        enabledBy: 1f0c9a2e-7b3d-4c11-9e2a-5d6f8b0a1c34
                        reason: Incident INC-1234 â€” provider hook stage is rejecting valid traffic
                providers: {}
                providerNames: {}
        handler_tierBlob:
            type: object
            description: A single resolved passthrough tier entry, including the actor who enabled it.
            properties:
                enabled:
                    type: boolean
                    description: Whether passthrough is active for this tier.
                bypassHooks:
                    type: boolean
                    description: Whether the hook stages are skipped for matching traffic.
                bypassCache:
                    type: boolean
                    description: Whether the response cache is skipped for matching traffic.
                bypassNormalize:
                    type: boolean
                    description: Whether canonical normalization is skipped for matching traffic.
                expiresAt:
                    type:
                        - string
                        - "null"
                    format: date-time
                    description: Auto-expiry timestamp for this tier, when set.
                enabledBy:
                    type: string
                    description: Identifier of the admin actor who last enabled this tier.
                reason:
                    type: string
                    description: Operator justification recorded when this tier was enabled.
            required:
                - enabled
                - bypassHooks
                - bypassCache
                - bypassNormalize
