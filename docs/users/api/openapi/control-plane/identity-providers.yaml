                            schema:
                                $ref: '#/components/schemas/handler_idpResponse'
        put:
            operationId: updateIdentityProvider
            summary: Update an identity provider
            description: |-
                Updates an existing identity provider. The built-in "local" store
                cannot be edited (responds 403). Secret config fields submitted as the
                fixed mask placeholder are preserved from the stored config, so the
                caller can round-trip a masked GET into a PUT without holding the
                cleartext. On create-grade validation, the non-masked secret rule is
                relaxed for updates. Disabling a previously-enabled provider triggers a
                best-effort session-revocation fan-out for every linked user.
            x-nexus-iam-action: idp.Action(iam.VerbUpdate)
            x-nexus-tier: confirm
