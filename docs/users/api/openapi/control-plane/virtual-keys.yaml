    /api/admin/virtual-keys:
        get:
            operationId: listVirtualKeys
            summary: List virtual keys
            description: |-
                Returns a paginated list of virtual keys. Supports free-text search and
                filtering by project, organization, owner, type, status and enabled flag.
                Non-super-admin callers are implicitly scoped to virtual keys they own
                (the ownerId filter is forced to the caller's key id).
            x-nexus-iam-action: iam.ResourceVirtualKey.Action(iam.VerbRead)
            x-nexus-tier: auto
            parameters:
                - name: q
                  in: query
                  description: Free-text search term applied to the virtual key listing.
                  required: false
                  schema:
                    type: string
                - name: projectId
                  in: query
                  description: Filter to virtual keys bound to this project.
                  required: false
                  schema:
                    type: string
                - name: organizationId
                  in: query
                  description: Filter to virtual keys belonging to this organization.
                  required: false
                  schema:
                    type: string
                - name: ownerId
                  in: query
                  description: Filter to virtual keys owned by this principal. Ignored for non-super-admins, who are always scoped to their own keys.
                  required: false
                  schema:
                    type: string
                - name: vkType
                  in: query
                  description: Filter by virtual key type.
                  required: false
                  schema:
                    type: string
                    enum:
                        - personal
                        - application
                - name: vkStatus
                  in: query
                  description: Filter by lifecycle status.
                  required: false
                  schema:
                    type: string
                    enum:
                        - active
                        - pending
                        - rejected
                        - revoked
                        - expired
                - name: enabled
                  in: query
                  description: 'Filter by enabled flag. Only the literal strings "true" and "false" are honored; any other value is ignored.'
                  required: false
                  schema:
                    type: string
                    enum:
                        - "true"
                        - "false"
