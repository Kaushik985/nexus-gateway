paths:
    /api/admin/quota-analytics/overview:
        get:
            operationId: quotaAnalyticsOverview
            summary: Cost usage overview per entity
            description: |-
                Returns estimated cost usage per entity for a given scope and period, aggregated
                from the metrics rollup store. Each item reports the entity's current cost, its
                configured cost limit (if a quota override exists for the target), the resulting
                usage percentage, and an alert level. Items are sorted by current cost descending.

                The scope is mapped to a rollup dimension before querying: `user` and
                `organization` map to themselves, `vk`/`virtual_key` map to the virtual-key
                dimension, and `project` maps to the organization dimension. Entity names are
                resolved to a human-readable display name (user display name or email,
                organization name, or virtual-key name), falling back to the raw ID.

                The alert level is derived from the usage percentage: `critical` at 90% or above,
                `warning` at 70% or above, otherwise `normal`.
            x-nexus-iam-action: iam.ResourceQuotaAnalytics.Action(iam.VerbRead)
            x-nexus-tier: auto
            parameters:
                - name: scope
                  in: query
                  required: false
                  description: |-
                    Entity scope to aggregate cost by. Defaults to `user` when omitted. Any other
                    value is rejected with HTTP 400. Enum derived from the handler's
                    scope-to-dimension validation map.
                  schema:
                    type: string
                    default: user
                    enum:
                        - user
                        - vk
                        - virtual_key
                        - project
                        - organization
                - name: periodKey
                  in: query
                  required: false
                  description: |-
                    Period to aggregate over, as `YYYY-MM` (calendar month) or `YYYY-MM-DD`
                    (calendar day). Defaults to the current UTC month when omitted. An
                    unrecognised format is rejected with HTTP 400.
                  schema:
                    type: string
                    example: 2026-04
            responses:
                "400":
                    description: Bad Request — unsupported scope or invalid periodKey format.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                error: 'unsupported scope "bad"'
                                code: validation_error
                "500":
                    description: Internal Server Error — metrics rollup query failed.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                error: Internal server error
                                code: server_error
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                data:
                                    - entityId: user-1
                                      entityName: Ada Lovelace
                                      entityType: user
                                      currentCostUsd: 42.5
                                      costLimitUsd: 100
                                      usagePercent: 42.5
                                      alertLevel: normal
                                total: 1
                                scope: user
                                periodKey: 2026-04
    /api/admin/quota-analytics/top:
        get:
            operationId: quotaAnalyticsTop
            summary: Top-N cost consumers
            description: |-
                Returns the top consumers by estimated cost for a given scope and period,
                aggregated from the metrics rollup store and sorted by total cost descending.
                Each item reports the entity ID, resolved human-readable name, entity type, and
                total cost. The result set is truncated to `limit` entries.

                The scope is mapped to a rollup dimension before querying (see the overview
                endpoint for the mapping). Entity names are resolved to a display name, falling
                back to the raw ID.
            x-nexus-iam-action: iam.ResourceQuotaAnalytics.Action(iam.VerbRead)
            x-nexus-tier: auto
            parameters:
                - name: scope
                  in: query
                  required: false
                  description: |-
                    Entity scope to aggregate cost by. Defaults to `user` when omitted. Any other
                    value is rejected with HTTP 400. Enum derived from the handler's
                    scope-to-dimension validation map.
                  schema:
                    type: string
                    default: user
                    enum:
                        - user
                        - vk
                        - virtual_key
                        - project
                        - organization
                - name: periodKey
                  in: query
                  required: false
                  description: |-
                    Period to aggregate over, as `YYYY-MM` (calendar month) or `YYYY-MM-DD`
                    (calendar day). Defaults to the current UTC month when omitted. An
                    unrecognised format is rejected with HTTP 400.
                  schema:
                    type: string
                    example: 2026-04
                - name: limit
                  in: query
                  required: false
                  description: |-
                    Maximum number of top entries to return. Parsed as an integer; defaults to 10
                    and is only applied when the value is between 1 and 100 inclusive (otherwise
                    the default is kept).
                  schema:
                    type: string
                    example: "10"
            responses:
                "400":
                    description: Bad Request — unsupported scope or invalid periodKey format.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                error: 'unsupported scope "bad"'
                                code: validation_error
                "500":
                    description: Internal Server Error — metrics rollup query failed.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                error: Internal server error
                                code: server_error
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                data:
                                    - entityId: user-1
                                      entityName: Ada Lovelace
                                      entityType: user
                                      totalCostUsd: 42.5
                                scope: user
                                periodKey: 2026-04
                                limit: 10
    /api/admin/quota-analytics/trend:
        get:
            operationId: quotaAnalyticsTrend
            summary: Per-period cost trend for one target
            description: |-
                Returns the estimated cost for a single target across the past N monthly periods,
                ordered oldest first. Each point reports the period key (`YYYY-MM`) and the total
                cost for that month. Cost is aggregated from the metrics rollup store for the
                target's dimension; if a per-period rollup query fails the point is returned with
                a zero cost rather than aborting the whole response, so no 500 is emitted.

                The targetType is mapped to a rollup dimension before querying (see the overview
                endpoint for the mapping).
            x-nexus-iam-action: iam.ResourceQuotaAnalytics.Action(iam.VerbRead)
            x-nexus-tier: auto
            parameters:
                - name: targetType
                  in: query
                  required: false
                  description: |-
                    Entity scope of the target. Required together with `targetId` (HTTP 400 if
                    either is empty). An unsupported value is rejected with HTTP 400. Enum derived
                    from the handler's scope-to-dimension validation map.
                  schema:
                    type: string
                    enum:
                        - user
                        - vk
                        - virtual_key
                        - project
                        - organization
                - name: targetId
                  in: query
                  required: false
                  description: |-
                    Entity ID of the target. Required together with `targetType` (HTTP 400 if
                    either is empty).
                  schema:
                    type: string
                - name: periods
                  in: query
                  required: false
                  description: |-
                    Number of past months to include, oldest first. Parsed as an integer;
                    defaults to 6 and is only applied when the value is between 1 and 24 inclusive
                    (otherwise the default is kept).
                  schema:
                    type: string
                    example: "6"
            responses:
                "400":
                    description: Bad Request — missing targetType/targetId or unsupported targetType.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                error: targetType and targetId are required
                                code: validation_error
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                data:
                                    - periodKey: 2026-03
                                      costUsd: 12.5
                                    - periodKey: 2026-04
                                      costUsd: 18
                                targetType: user
                                targetId: user-1
                                periods: 2
