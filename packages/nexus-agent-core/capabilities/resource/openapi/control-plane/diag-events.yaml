# Hand-maintained OpenAPI spec, verified claim-by-claim against the control-plane
# handler code (the single source of truth) via the openapi-review skill. Keep
# structural fields (paths/verbs/types) in lockstep with the handlers.
openapi: 3.1.0
info:
    title: Nexus Control Plane Admin API — diag-events
    version: dev
    description: 'Hand-maintained against control-plane source: field names, types, optionality, status codes and IAM tiers mirror the handler code; enum value sets and required-field rules enforced imperatively in handlers are verified by the openapi-review skill.'
paths:
    /api/admin/diag-events:
        get:
            operationId: diagEventsList
            summary: List diagnostic events
            description: >-
                Returns a newest-first, cursor-paginated page of diagnostic events from
                the thing_diag_event table. Supports filtering by node, severity level,
                event type, source, free-text message search, and an occurred-at time
                window. Pagination is stable across concurrent inserts because the cursor
                encodes the (occurredAt, id) of the last row on the previous page. Each
                response carries the page rows in `data` plus a `nextCursor` that is empty
                when there is no further page.
            x-nexus-iam-action: iam.ResourceObservability.Action(iam.VerbRead)
            x-nexus-tier: auto
            parameters:
                - name: nodeId
                  in: query
                  required: false
                  description: Filter to a single node (Thing) by its identifier. Empty means no node filter.
                  schema:
                    type: string
                - name: level
                  in: query
                  required: false
                  description: >-
                      Filter by severity level. Validated case-insensitively against the
                      fixed set; any other value is rejected with HTTP 400 rather than
                      silently matching nothing.
                  schema:
                    type: string
                    # Enum source: DiagEventsList handler switch on strings.ToLower(p.Level).
                    enum: [debug, info, warn, error, fatal]
                - name: eventType
                  in: query
                  required: false
                  description: >-
                      Filter to a single event type (for example error, crash, lifecycle,
                      or watchdog). Empty means no event-type filter. Not validated against
                      a fixed set by the handler.
                  schema:
                    type: string
                - name: source
                  in: query
                  required: false
                  description: Filter by the originating subsystem/source string. Empty means no source filter.
                  schema:
                    type: string
                - name: q
                  in: query
                  required: false
                  description: Free-text search applied to the event message (case-insensitive substring match).
                  schema:
                    type: string
                - name: cursor
                  in: query
                  required: false
                  description: >-
                      Opaque pagination cursor returned as `nextCursor` from a prior call.
                      A malformed cursor is rejected with HTTP 400.
                  schema:
                    type: string
                - name: limit
                  in: query
                  required: false
                  description: >-
                      Maximum number of events to return. Parsed as a positive integer;
                      non-positive or non-numeric values fall back to the default of 50.
                      Values above 500 are clamped to 500.
                  schema:
                    type: string
                - name: from
                  in: query
                  required: false
                  description: >-
                      Inclusive lower bound on occurredAt (RFC3339). An unparseable value is
                      rejected with HTTP 400.
                  schema:
                    type: string
                    format: date-time
                - name: to
                  in: query
                  required: false
                  description: >-
                      Exclusive upper bound on occurredAt (RFC3339). An unparseable value is
                      rejected with HTTP 400.
                  schema:
                    type: string
                    format: date-time
            responses:
                "503":
                    description: Database is not configured / unavailable.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                error:
                                    message: Database is not configured
                                    type: server_error
                                    code: DB_UNAVAILABLE
                "400":
                    description: Invalid query parameter (bad level, bad from/to, or malformed cursor).
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                error:
                                    message: invalid level (debug|info|warn|error|fatal)
                                    type: validation_error
                                    code: VALIDATION_ERROR
                "500":
                    description: Failed to list diag events.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                error:
                                    message: Failed to list diag events
                                    type: server_error
                                    code: INTERNAL_ERROR
                "200":
                    description: A newest-first page of diagnostic events plus the next-page cursor.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                data:
                                    - id: 01HZX3K7N9
                                      nodeId: agent-7f3a
                                      nodeType: agent
                                      occurredAt: "2026-01-10T09:15:00Z"
                                      receivedAt: "2026-01-10T09:15:02Z"
                                      level: error
                                      eventType: error
                                      source: interceptor
                                      message: failed to relay flow
                                      messageHash: 3c9a1f
                                      repeatCount: 1
                                nextCursor: MjAyNi0wMS0xMFQwOToxNTowMFp8MDFIWlgzSzdOOQ
    /api/admin/diag-events/crash-cohorts:
        get:
            operationId: diagEventsCrashCohorts
            summary: List crash cohorts
            description: >-
                Returns crash events (event_type = crash) grouped into cohorts by
                (agentVersion, os, osVersion) over the requested time window. Each cohort
                reports its crash count, the number of distinct affected nodes, and the
                last time it was seen. Used by the Crash Reports page. The `from` and `to`
                query parameters are both required (RFC3339); omitting either, supplying an
                unparseable value, or supplying from >= to is rejected with HTTP 400.
            x-nexus-iam-action: iam.ResourceObservability.Action(iam.VerbRead)
            x-nexus-tier: auto
            responses:
                "503":
                    description: Database is not configured / unavailable.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                error:
                                    message: Database is not configured
                                    type: server_error
                                    code: DB_UNAVAILABLE
                default:
                    description: Validation failure on the required from/to window (HTTP 400).
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                error:
                                    message: from and to are required (RFC3339)
                                    type: validation_error
                                    code: VALIDATION_ERROR
                "500":
                    description: Failed to list crash cohorts.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                error:
                                    message: Failed to list crash cohorts
                                    type: server_error
                                    code: INTERNAL_ERROR
                "200":
                    description: Crash cohorts grouped by agent version and operating system.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                data:
                                    - agentVersion: 1.4.2
                                      os: darwin
                                      osVersion: "15.3"
                                      crashCount: 12
                                      affectedNodes: 4
                                      lastSeen: "2026-01-10T09:15:00Z"
    /api/admin/diag-events/groups:
        get:
            operationId: diagEventsGroups
            summary: List diagnostic event groups
            description: >-
                Returns the top message-hash buckets in the requested time window, ordered
                by total occurrences descending then last-seen descending. Each group
                aggregates a sample message, source, distinct affected-node count, total
                occurrence count, first/last seen, max severity level, a per-5-minute
                sparkline of buckets, and whether the group is currently silenced. Used by
                the Recent Errors page. The `from` and `to` query parameters are both
                required (RFC3339); omitting either, supplying an unparseable value, or
                supplying from >= to is rejected with HTTP 400.
            x-nexus-iam-action: iam.ResourceObservability.Action(iam.VerbRead)
            x-nexus-tier: auto
            parameters:
                - name: nodeType
                  in: query
                  required: false
                  description: Filter to a single node (Thing) type. Empty means no node-type filter.
                  schema:
                    type: string
                - name: eventType
                  in: query
                  required: false
                  description: >-
                      Filter to a single event type (for example error, crash, lifecycle,
                      or watchdog). Empty means no event-type filter. Not validated against
                      a fixed set by the handler.
                  schema:
                    type: string
            responses:
                "503":
                    description: Database is not configured / unavailable.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                error:
                                    message: Database is not configured
                                    type: server_error
                                    code: DB_UNAVAILABLE
                default:
                    description: Validation failure on the required from/to window (HTTP 400).
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                error:
                                    message: from and to are required (RFC3339)
                                    type: validation_error
                                    code: VALIDATION_ERROR
                "500":
                    description: Failed to list diag groups.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                error:
                                    message: Failed to list diag groups
                                    type: server_error
                                    code: INTERNAL_ERROR
                "200":
                    description: Top diagnostic-event groups for the window.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                data:
                                    - messageHash: 3c9a1f
                                      sampleMessage: failed to relay flow
                                      source: interceptor
                                      affectedNodes: 4
                                      totalOccurrences: 37
                                      firstSeen: "2026-01-10T08:00:00Z"
                                      lastSeen: "2026-01-10T09:15:00Z"
                                      maxLevel: error
                                      buckets:
                                        - ts: "2026-01-10T09:10:00Z"
                                          count: 5
                                      silenced: false
