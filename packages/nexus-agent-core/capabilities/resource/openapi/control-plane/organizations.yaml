                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "201":
                    description: Created
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/orgstore_Organization'
    /api/admin/organizations/{id}:
        get:
            operationId: getOrganization
            summary: Get an organization
            description: |-
                Returns a single organization by ID, enriched for the detail view with
                its child organizations, projects, project/child counts, and a compact
                parent reference (`id`, `name`) when the org has a parent.
            x-nexus-iam-action: iam.ResourceOrganization.Action(iam.VerbRead)
            x-nexus-tier: auto
            parameters:
                - name: id
                  in: path
                  required: true
                  description: Organization ID.
                  schema:
                    type: string
            responses:
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "404":
                    description: Not Found — no organization with the given ID.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                id: org_01HXYZ
                                name: Acme Corp
                                code: acme
                                parentId: null
                                enabled: true
                                childCount: 2
                                projectCount: 5
                                projects: []
                                children: []
        put:
            operationId: updateOrganization
            summary: Update an organization
            description: |-
                Updates an organization. Every field is optional — only the supplied
                fields are changed (partial update). When `timezone` is present and
                non-empty it must be a valid IANA timezone name, otherwise the request
                is rejected with 400. A successful update invalidates the ai-gateway
                policy cache (re-parenting, rename, or enable/disable take effect
                without a gateway restart).
            x-nexus-iam-action: iam.ResourceOrganization.Action(iam.VerbUpdate)
