                  schema:
                    type: string
                - name: scope
                  in: query
                  required: false
                  description: 'Filter by policy scope. Allowed values from handler validQuotaPolicyScopes: user, vk, project, organization.'
                  schema:
                    type: string
                    enum:
                        - user
                        - vk
                        - project
                        - organization
                - name: vkType
                  in: query
                  required: false
                  description: 'Filter by virtual-key type. Allowed values from handler validQuotaVKTypes: personal, application.'
                  schema:
                    type: string
                    enum:
                        - personal
                        - application
                - name: q
                  in: query
                  required: false
                  description: Free-text search term matched against the policy name/description.
                  schema:
