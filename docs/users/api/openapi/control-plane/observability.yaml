paths:
    /api/admin/observability/dlq:
        get:
            operationId: listDLQ
            summary: List dead-letter queue entries
            description: |-
                Lists entries in the traffic_event dead-letter queue (DLQ). This Control Plane
                endpoint proxies to the Hub's DLQ route (which owns the table and MQ producer)
                and adds JWT auth, IAM scope, and the admin audit wrap. Query parameters and the
                Hub response body are forwarded unchanged. On success the Hub-reported status and
                JSON body are returned verbatim; the 502 below is the Control-Plane-side response
                when the Hub call itself fails.
            x-nexus-iam-action: iam.ResourceObservabilityDLQ.Action(iam.VerbRead)
            x-nexus-tier: auto
            parameters:
                - name: subject
                  in: query
                  required: false
                  description: Optional MQ subject filter; forwarded to the Hub unchanged.
                  schema:
                    type: string
                - name: limit
                  in: query
                  required: false
                  description: Optional maximum number of rows to return; forwarded to the Hub unchanged.
                  schema:
                    type: string
                - name: offset
                  in: query
                  required: false
                  description: Optional row offset for pagination; forwarded to the Hub unchanged.
                  schema:
                    type: string
            responses:
                "502":
                    description: Bad Gateway — the Control Plane could not reach the Hub DLQ service.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
    /api/admin/observability/dlq/{id}/retry:
        post:
            operationId: retryDLQ
            summary: Retry a dead-letter queue entry
            description: |-
                Re-injects a single DLQ entry back onto the message queue. This is a destructive
                action: it republishes the original captured payload on behalf of the producer and
                deletes the DLQ row, which is why it requires the manage verb. The Control Plane
                proxies the retry to the Hub and, only when the Hub reports success (2xx), stamps an
                admin audit log entry attributing the retry to the operator. On success the
                Hub-reported status and JSON body are forwarded verbatim.
            x-nexus-iam-action: iam.ResourceObservabilityDLQ.Action(iam.VerbManage)
            x-nexus-tier: confirm
            parameters:
                - name: id
                  in: path
                  required: true
                  description: Identifier of the DLQ entry to retry.
                  schema:
                    type: string
            responses:
                "400":
                    description: Bad Request — the path id was empty ("id is required").
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "502":
                    description: Bad Gateway — the Control Plane could not reach the Hub DLQ service.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
    /api/admin/observability/retention:
        get:
            operationId: getRetention
            summary: Get metric and diagnostic retention configuration
            description: |-
                Returns every retention layer with its current value (in days) and allowed range.
                Layers are read from the ops retention config store and returned under a top-level
                `retention` object keyed by layer name, ordered deterministically. The handler knows
                the following layer keys and their allowed [min, max] day windows: runtime_5m and
                business_5m [1, 30], runtime_1h and business_1h [30, 365], runtime_1d and
                business_1d [90, 1095], runtime_1mo and business_1mo [365, 3650], diag_info [1, 90], diag_warn [7, 90],
                diag_error [30, 730], diag_fatal [90, 1825]. A layer found in the store without a
                known range is returned with zero-valued bounds rather than dropped.
            x-nexus-iam-action: iam.ResourceObservability.Action(iam.VerbRead)
            x-nexus-tier: auto
            responses:
                "503":
                    description: Service Unavailable — the database is not configured.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "500":
                    description: Internal Server Error — reading the retention config failed.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: OK — retention layers with their current value and allowed range.
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    retention:
                                        type: object
                                        description: Map of retention layer name to its current value and bounds.
                                        additionalProperties:
                                            type: object
                                            properties:
                                                value:
                                                    type: integer
                                                    description: Current retention horizon in days.
                                                min:
                                                    type: integer
                                                    description: Minimum allowed value for this layer, in days.
                                                max:
                                                    type: integer
                                                    description: Maximum allowed value for this layer, in days.
                                                updatedAt:
                                                    type: string
                                                    format: date-time
                                                    description: When this layer's value was last updated.
                            example:
                                retention:
                                    runtime_5m:
                                        value: 7
                                        min: 1
                                        max: 30
                                    diag_error:
                                        value: 90
                                        min: 30
                                        max: 730
        put:
            operationId: putRetention
            summary: Update metric and diagnostic retention configuration
            description: |-
                Atomically updates one or more retention layers in a single transaction; the next
                retention sweep applies the new horizons. The body is a map of layer name to a
                retention value in days. At least one layer must be present. Each key must be a known
                layer and each value must fall within that layer's allowed [min, max] day window
                (runtime_5m and business_5m [1, 30], runtime_1h and business_1h [30, 365],
                runtime_1d and business_1d [90, 1095], runtime_1mo and business_1mo [365, 3650],
                diag_info [1, 90], diag_warn [7, 90], diag_error [30, 730], diag_fatal [90, 1825]); unknown keys or
                out-of-range values are rejected with 400 before any write. A successful update is
                recorded in the admin audit log with before/after state.
            x-nexus-iam-action: iam.ResourceObservability.Action(iam.VerbWrite)
            x-nexus-tier: confirm
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            description: Map of retention layer name to its new value in days. At least one entry required.
                            additionalProperties:
                                type: integer
                                description: New retention horizon in days for the layer; must be within the layer's allowed range.
                            example:
                                runtime_5m: 7
                                business_5m: 30
                                diag_error: 90
            responses:
                "503":
                    description: Service Unavailable — the database is not configured.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "400":
                    description: Bad Request — invalid body, no layers supplied, an unknown layer key, or a value out of range.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "500":
                    description: Internal Server Error — applying the retention update failed.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: OK — the retention update was applied.
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    ok:
                                        type: boolean
                                        description: True when the update was applied.
                                    updated:
                                        type: integer
                                        description: Number of layers updated.
                            example:
                                ok: true
                                updated: 3
