components:
    schemas:
        scimstore_IdpGroupMapping:
            type: object
            description: A mapping from an external IdP group to an internal IamGroup.
            properties:
                id:
                    type: string
                    description: Unique mapping ID.
                identityProviderId:
                    type: string
                    description: ID of the identity provider this mapping belongs to.
                externalGroupId:
                    type: string
                    description: Group identifier as asserted by the external IdP.
                externalGroupName:
                    type:
                        - string
                        - "null"
                    description: Optional human-readable name of the external group.
                iamGroupId:
                    type: string
                    description: ID of the internal IamGroup the external group maps to.
                createdAt:
                    type: string
                    format: date-time
                    description: Timestamp when the mapping was created.
                iamGroupName:
                    type:
                        - string
                        - "null"
                    description: Resolved name of the internal IamGroup, eagerly loaded for list views.
            required:
                - id
                - identityProviderId
                - externalGroupId
                - iamGroupId
                - createdAt
        handler_idpResponse:
            type: object
            description: Identity provider as returned by list/get/create/update, with secret config fields masked.
            properties:
                id:
                    type: string
                    description: Stable identifier of the identity provider.
                type:
                    type: string
                    description: Provider protocol. "local" is the built-in store; external providers are "oidc" or "saml".
                name:
                    type: string
                    description: Human-readable display name.
                enabled:
                    type: boolean
                    description: Whether this provider is active for sign-in.
                config:
                    type: object
                    additionalProperties: {}
                    description: Protocol-specific configuration. Secret fields (OIDC clientSecret, SAML certificatePem) are returned masked with a fixed placeholder.
                roleMapping:
                    description: External-group-to-role mapping rules; defaults to an empty array when unset.
                defaultRole:
                    type: string
                    description: Role assigned to just-in-time provisioned users when no mapping matches.
                jitEnabled:
                    type: boolean
                    description: Whether just-in-time user provisioning is enabled for this provider.
                createdAt:
                    type: string
                    format: date-time
                updatedAt:
                    type: string
                    format: date-time
            required:
                - id
                - type
                - name
                - enabled
                - config
                - roleMapping
                - defaultRole
                - jitEnabled
                - createdAt
                - updatedAt
        handler_idpWriteRequest:
            type: object
            description: Create/update body for an identity provider. Validated imperatively in validateIdPRequest.
            properties:
                type:
                    type: string
                    description: Provider protocol. Must be "oidc" or "saml"; the built-in "local" store cannot be created or updated through this surface.
                    enum:
                        - oidc
                        - saml
                name:
                    type: string
                    description: Human-readable display name. Required (non-blank).
                enabled:
                    type:
                        - boolean
                        - "null"
                    description: Whether the provider is active. Defaults to true on create and to the existing value on update when omitted.
                config:
                    type: object
                    additionalProperties: {}
                    description: |-
                        Protocol-specific configuration. Required. For OIDC: issuer,
                        clientId, redirectUri (and clientSecret, required non-masked on
                        create). For SAML: entityId, ssoUrl (and certificatePem,
                        required non-masked on create). On update, a secret field sent
                        as the mask placeholder is preserved from the stored config.
                roleMapping:
                    description: External-group-to-role mapping rules. Optional; defaults to an empty array.
                defaultRole:
                    type: string
                    description: Role for just-in-time provisioned users when no mapping matches. Optional; preserved from existing on update when blank.
                jitEnabled:
                    type:
                        - boolean
                        - "null"
                    description: Whether just-in-time provisioning is enabled. Defaults to true on create and to the existing value on update when omitted.
            required:
                - type
                - name
                - config
        idptest_Result:
            type: object
            description: Structured outcome of an identity provider connectivity probe.
            properties:
                ok:
                    type: boolean
                    description: Whether the probe succeeded.
                detail:
                    type: object
                    additionalProperties: {}
                    description: Protocol-specific discovered fields on success (e.g. resolved JWKS/token/authorize URLs and key count for OIDC, or certificate subject/issuer/expiry for SAML). Omitted on failure.
                error:
                    type: string
                    description: Human-readable failure reason. Omitted on success.
                elapsedMs:
                    type: integer
                    format: int64
                    description: Probe wall-clock duration in milliseconds.
            required:
                - ok
                - elapsedMs
