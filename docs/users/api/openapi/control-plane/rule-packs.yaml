openapi: 3.1.0
info:
    title: Nexus Control Plane Admin API — rule-packs
    version: dev
    description: 'Generated from control-plane source by openapigen. Structural draft: field names, types, optionality, status codes and IAM tiers are code-derived; enum value sets and required-field rules enforced imperatively in handlers are filled in by the openapi-review skill.'
paths:
    /api/admin/rule-packs:
        get:
            operationId: list
            summary: List rule-pack metadata
            description: |-
                Returns every rule-pack metadata row sorted by name, then version
                descending. Each entry carries the pack header (id, name, version,
                maintainer, description, signature, createdAt) plus its rule list.
                An empty catalog returns `[]` rather than `null`.
            x-nexus-tier: auto
            responses:
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: array
                                items:
                                    $ref: '#/components/schemas/rulepack_Pack'
                            example:
                                - id: rp_01HX
                                  name: nexus/pii-default
                                  version: v1.2.0
                                  maintainer: security@example.com
                                  description: Default PII detection rules
                                  createdAt: "2026-01-15T08:30:00Z"
                                  rules:
                                    - ruleId: pi-001
                                      category: pii
                                      severity: hard
                                      pattern: \b\d{3}-\d{2}-\d{4}\b
                                      description: US Social Security Number
                                      labels: ["pii", "ssn"]
        post:
            operationId: create
            summary: Create a rule pack from JSON
            description: |-
                Inserts a rule pack authored via the JSON admin form (the YAML-upload
                path is `POST /rule-packs/import`). The body mirrors the YAML shape but
                is validated by structural JSON binding: `name`, `version`, `maintainer`
                and at least one rule are required, and every rule must carry `ruleId`,
                `pattern` and `severity`. A duplicate (name, version) pair returns 409.
                On success the stored pack (with generated ids and `createdAt`) is
                returned and the `hooks` config is invalidated across the data-plane
                nodes.
            x-nexus-iam-action: iam.ResourceRulePack.Action(iam.VerbCreate)
            x-nexus-tier: confirm
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/rulepack_Pack'
                        example:
                            name: nexus/pii-default
                            version: v1.2.0
                            maintainer: security@example.com
                            description: Default PII detection rules
                            rules:
                                - ruleId: pi-001
                                  category: pii
                                  severity: hard
                                  pattern: \b\d{3}-\d{2}-\d{4}\b
                                  description: US Social Security Number
                                  labels: ["pii", "ssn"]
            responses:
                "400":
                    description: Bad Request — missing required field, no rules, or a rule missing ruleId/pattern/severity
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "409":
                    description: Conflict — a pack with the same (name, version) already exists
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                default:
                    description: Unresolved status
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "201":
                    description: Created
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/rulepack_Pack'
    /api/admin/rule-packs/{id}:
        get:
            operationId: get
            summary: Get a rule pack with its rules
            description: |-
                Returns a single rule pack and its full rule list by pack id.
                Responds 404 when no pack matches the id, and 400 when the id path
                segment is empty.
            x-nexus-tier: auto
            parameters:
                - name: id
                  in: path
                  required: true
                  description: Rule-pack id (the `id` returned by list/create).
                  schema:
                    type: string
            responses:
                "400":
                    description: Bad Request — id path segment is empty
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "404":
                    description: Not Found — no pack matches the supplied id
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/rulepack_Pack'
                            example:
                                id: rp_01HX
                                name: nexus/pii-default
                                version: v1.2.0
                                maintainer: security@example.com
                                description: Default PII detection rules
                                createdAt: "2026-01-15T08:30:00Z"
                                rules:
                                    - ruleId: pi-001
                                      category: pii
                                      severity: hard
                                      pattern: \b\d{3}-\d{2}-\d{4}\b
                                      description: US Social Security Number
                                      labels: ["pii", "ssn"]
        patch:
            operationId: update
            summary: Update rule-pack metadata or rules
            description: |-
                Applies a partial metadata update and (optionally) a full rule-list
                replacement to a pack. Fields use a present/absent contract: an absent
                field is left unchanged, while a supplied (possibly empty-string) value
                overwrites the field. At least one of `maintainer`, `description`,
                `signature` or `rules` must be present, otherwise 400 ("no fields to
                update"). Responds 404 when the pack id does not exist. On success the
                updated pack is returned and the `hooks` config is invalidated across
                the data-plane nodes.
            x-nexus-iam-action: iam.ResourceRulePack.Action(iam.VerbUpdate)
            x-nexus-tier: confirm
            parameters:
                - name: id
                  in: path
                  required: true
                  description: Rule-pack id to update.
                  schema:
                    type: string
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                maintainer:
                                    description: New maintainer contact; absent leaves it unchanged.
                                    type:
                                        - string
                                        - "null"
                                description:
                                    description: New human-readable description; absent leaves it unchanged.
                                    type:
                                        - string
                                        - "null"
                                signature:
                                    description: New detached signature value; absent leaves it unchanged.
                                    type:
                                        - string
                                        - "null"
                                rules:
                                    description: Full replacement rule list; absent leaves the existing rules unchanged.
                                    type:
                                        - array
                                        - "null"
                                    items:
                                        $ref: '#/components/schemas/rulepack_Rule'
                        example:
                            description: Updated PII detection rules for 2026
                            rules:
                                - ruleId: pi-001
                                  category: pii
                                  severity: hard
                                  pattern: \b\d{3}-\d{2}-\d{4}\b
                                  description: US Social Security Number
            responses:
                "400":
                    description: Bad Request — empty id, malformed JSON, or no fields supplied to update
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "404":
                    description: Not Found — no pack matches the supplied id
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: OK — the updated pack (or `{id}` when the post-update re-read fails)
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/rulepack_Pack'
        delete:
            operationId: delete
            summary: Delete a rule pack
            description: |-
                Removes a pack and its rules. Responds 404 when the pack id does not
                exist, and 409 when an install still references the pack (the foreign-key
                violation surfaces as a conflict). On success the `hooks` config is
                invalidated across the data-plane nodes.
            x-nexus-iam-action: iam.ResourceRulePack.Action(iam.VerbDelete)
            x-nexus-tier: confirm
            parameters:
                - name: id
                  in: path
                  required: true
                  description: Rule-pack id to delete.
                  schema:
                    type: string
            responses:
                "400":
                    description: Bad Request — id path segment is empty
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "404":
                    description: Not Found — no pack matches the supplied id
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "409":
                    description: Conflict — the pack is still referenced by one or more installs
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: 'OK — pack deleted; body is `{ "deleted": "<id>" }`'
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                                example:
                                    deleted: rp_01HX
    /api/admin/rule-packs/{id}/dry-run:
        post:
            operationId: dryRun
            summary: Dry-run a content string against a stored pack
            description: |-
                Evaluates a caller-provided `content` string against the rules of a
                stored pack and returns the matches it would produce, without writing
                anything. Responds 404 when the pack id does not exist and 400 when the
                body is malformed or `content` is empty.
            x-nexus-tier: confirm
            parameters:
                - name: id
                  in: path
                  required: true
                  description: Rule-pack id to evaluate against.
                  schema:
                    type: string
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                content:
                                    description: Text to evaluate against the pack's rule patterns.
                                    type: string
                            required:
                                - content
                        example:
                            content: My SSN is 123-45-6789
            responses:
                "400":
                    description: Bad Request — empty id, malformed JSON, or empty `content`
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "404":
                    description: Not Found — no pack matches the supplied id
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: OK — matches the content produced (`[]` when none)
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                                example:
                                    matches:
                                        - pack: nexus/pii-default
                                          packVersion: v1.2.0
                                          ruleId: pi-001
                                          category: pii
                                          severity: hard
                                          labels: ["pii", "ssn"]
                                          matchedText: 123-45-6789
    /api/admin/rule-packs/import:
        post:
            operationId: import
            summary: Import a rule pack from YAML
            description: |-
                Parses a YAML pack document from the raw request body and inserts it
                transactionally. The body is read as raw bytes (a YAML document), not a
                JSON object. Parse failures return 400 with `{ "error": "parse_failed",
                "detail": ... }`; a duplicate (name, version) pair returns 409. On
                success the new pack id, rule count and any non-fatal parse warnings are
                returned and the `hooks` config is invalidated across the data-plane
                nodes.
            x-nexus-iam-action: iam.ResourceRulePack.Action(iam.VerbImport)
            x-nexus-tier: confirm
            requestBody:
                required: true
                content:
                    application/yaml:
                        schema:
                            type: string
                        example: |
                            name: nexus/pii-default
                            version: v1.2.0
                            maintainer: security@example.com
                            rules:
                              - id: pi-001
                                category: pii
                                severity: hard
                                pattern: \b\d{3}-\d{2}-\d{4}\b
            responses:
                "400":
                    description: Bad Request — body read failed or YAML failed to parse/validate
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "409":
                    description: Conflict — a pack with the same (name, version) already exists
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                default:
                    description: Unresolved status
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: OK — pack imported
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                                example:
                                    packId: rp_01HX
                                    ruleCount: 12
                                    warnings: []
    /api/admin/rule-packs/preview:
        post:
            operationId: preview
            summary: Dry-parse a YAML pack without inserting
            description: |-
                Parses and validates a YAML pack document from the raw request body
                without inserting it, so the UI can render the parsed pack alongside any
                warnings and errors. Always returns 200 on a readable body — a parse
                failure is reported in the `errors` array, not as a transport error.
                400 is returned only when the request body cannot be read.
            x-nexus-iam-action: iam.ResourceRulePack.Action(iam.VerbUpdate)
            x-nexus-tier: confirm
            requestBody:
                required: true
                content:
                    application/yaml:
                        schema:
                            type: string
                        example: |
                            name: nexus/pii-default
                            version: v1.2.0
                            maintainer: security@example.com
                            rules:
                              - id: pi-001
                                category: pii
                                severity: hard
                                pattern: \b\d{3}-\d{2}-\d{4}\b
            responses:
                "400":
                    description: Bad Request — the request body could not be read
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: OK — parsed pack with warnings and errors
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                                example:
                                    pack:
                                        name: nexus/pii-default
                                        version: v1.2.0
                                        maintainer: security@example.com
                                        rules:
                                            - ruleId: pi-001
                                              category: pii
                                              severity: hard
                                              pattern: \b\d{3}-\d{2}-\d{4}\b
                                    warnings: []
                                    errors: []
components:
    schemas:
        rulepack_Pack:
            type: object
            description: A rule pack — header metadata plus its list of detection rules. Mirrors the rule_pack + rule tables and the authored YAML document.
            properties:
                id:
                    type: string
                    description: Server-generated pack id. Omitted on create/import request bodies; present on stored packs.
                name:
                    type: string
                    description: 'Pack name in `<namespace>/<short-name>` form (lowercase alphanumeric, e.g. `nexus/pii-default`).'
                version:
                    type: string
                    description: 'Semver version with a `v` prefix (e.g. `v1.2.0`).'
                maintainer:
                    type: string
                    description: Maintainer contact for the pack.
                description:
                    type: string
                    description: Human-readable description of what the pack detects.
                signature:
                    type: string
                    description: Optional detached signature value for the pack.
                createdAt:
                    type: string
                    format: date-time
                    description: Server-assigned creation timestamp. Present on stored packs only.
                rules:
                    type: array
                    description: The pack's detection rules. At least one rule is required on create.
                    items:
                        $ref: '#/components/schemas/rulepack_Rule'
            required:
                - name
                - version
                - maintainer
                - rules
        rulepack_Rule:
            type: object
            description: A single detection rule — a named regex pattern with a category and severity.
            properties:
                id:
                    type: string
                    description: Server-generated rule row id. Present on stored rules only.
                packId:
                    type: string
                    description: Id of the owning pack. Present on stored rules only.
                ruleId:
                    type: string
                    description: 'Pack-local rule identifier, unique within the pack (e.g. `pi-001`).'
                category:
                    type: string
                    description: 'Free-form classification of the rule (e.g. `pii`, `secrets`).'
                severity:
                    type: string
                    description: Match severity. Validated against a fixed set by the YAML loader.
                    enum:
                        - hard
                        - soft
                        - warn
                pattern:
                    type: string
                    description: Go (RE2) regular expression that must compile; matched against content.
                flags:
                    type: string
                    description: Optional regex flag string applied to the pattern.
                description:
                    type: string
                    description: Human-readable description of what the rule detects.
                labels:
                    type: array
                    description: Free-form labels merged into the caller hook's tags on match.
                    items:
                        type: string
            required:
                - ruleId
                - category
                - severity
                - pattern
