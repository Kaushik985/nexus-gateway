# Hand-maintained OpenAPI spec, verified claim-by-claim against the control-plane
# handler code (the single source of truth) via the openapi-review skill. Keep
# structural fields (paths/verbs/types) in lockstep with the handlers.
openapi: 3.1.0
info:
    title: Nexus Control Plane Admin API — hooks
    version: dev
    description: 'Hand-maintained against control-plane source: field names, types, optionality, status codes and IAM tiers mirror the handler code; enum value sets and required-field rules enforced imperatively in handlers are verified by the openapi-review skill.'
paths:
    /api/admin/hooks:
        get:
            operationId: listHookConfigs
            summary: List hook configs
            description: |-
                Returns the paginated list of hook configurations, each enriched
                with a derived classification block (category, phase, supported
                stages). Supports free-text search, pipeline-stage filtering, and
                an enabled-state filter. The response wraps the list under `data`
                with the unfiltered `total` count for pagination.
            x-nexus-iam-action: iam.ResourceHook.Action(iam.VerbRead)
            x-nexus-tier: auto
            parameters:
                - name: q
                  in: query
                  description: Free-text search applied to hook name / fields.
                  required: false
                  schema:
                    type: string
                - name: pipeline
                  in: query
                  description: Filter by pipeline stage.
                  required: false
                  schema:
                    type: string
                - name: enabled
                  in: query
                  description: |-
                    Filter by enabled state. Only the literal strings `true` and
                    `false` are honored; any other value (or omission) returns
                    hooks regardless of enabled state.
                  required: false
                  schema:
                    type: string
                    enum:
                        - "true"
                        - "false"
                - name: limit
                  in: query
                  description: Page size. Defaults to 50, clamped to a maximum of 1000.
                  required: false
                  schema:
                    type: integer
                - name: offset
                  in: query
                  description: Number of rows to skip. Defaults to 0.
                  required: false
                  schema:
                    type: integer
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    data:
                                        type: array
                                        items:
                                            $ref: '#/components/schemas/handler_hookConfigWithClassification'
                                    total:
                                        type: integer
                                        description: Total count of matching hooks (before pagination).
                            example:
                                data:
                                    - id: hk_01HZ
                                      name: PII redactor
                                      type: builtin
                                      implementationId: pii-detector
                                      stage: request
                                      category: compliance
                                      endpoint: null
                                      script: null
                                      config: {}
                                      priority: 10
                                      timeoutMs: 5000
                                      failBehavior: fail-open
                                      enabled: true
                                      applicableIngress:
                                        - AI_GATEWAY
                                      createdAt: "2026-01-01T00:00:00Z"
                                      updatedAt: "2026-01-01T00:00:00Z"
                                      classification:
                                        category: compliance
                                        categoryLabel: Compliance & content safety
                                        categorySource: registry
                                        implementationId: pii-detector
                                        implementationLabel: Compliance & content safety
                                        phase: request
                                        phaseLabel: Request
                                        supportedStages:
                                            - request
                                            - response
                                        dualPhaseCapable: true
                                total: 1
        post:
            operationId: createHookConfig
            summary: Create hook config
            description: |-
                Creates a hook configuration. Only `name` and `type` are required;
                `implementationId`, `stage`, `timeoutMs`, and `failBehavior` are
                filled with defaults when omitted (`noop`, `request`, `5000`,
                `fail-open` respectively). `enabled` defaults to true. Enum-shaped
                fields are validated against the hook registry and reject unknown
                values with HTTP 400. Omit `applicableIngress` to default to all
                ingress types; sending an explicit empty array is rejected.
            x-nexus-iam-action: iam.ResourceHook.Action(iam.VerbCreate)
            x-nexus-tier: confirm
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                name:
                                    type: string
                                    description: Human-readable hook name. Required.
                                type:
                                    type: string
                                    description: Hook implementation kind. Required.
                                    enum:
                                        - builtin
                                        - webhook
                                        - script
                                implementationId:
                                    type: string
                                    description: |-
                                        Registered implementation id. Must exist in the hook
                                        implementation registry. Defaults to `noop` when omitted.
                                    enum:
                                        - pii-detector
                                        - keyword-filter
                                        - content-safety
                                        - rulepack-engine
                                        - data-residency
                                        - rate-limiter
                                        - request-size-validator
                                        - ip-access-filter
                                        - quality-checker
                                        - webhook-forward
                                        - noop
                                stage:
                                    type: string
                                    description: Pipeline phase the hook runs in. Defaults to `request`.
                                    enum:
                                        - request
                                        - response
                                category:
                                    type:
                                        - string
                                        - "null"
                                    description: Optional category override; defaults to the registry category for the implementation.
                                endpoint:
                                    type:
                                        - string
                                        - "null"
                                    description: Webhook target URL (webhook hooks only).
                                script:
                                    type:
                                        - string
                                        - "null"
                                    description: Inline script body (script hooks only).
                                config:
                                    description: Implementation-specific JSON configuration object.
                                priority:
                                    type: integer
                                    description: Execution order within the stage; lower runs first.
                                timeoutMs:
                                    type: integer
                                    description: Per-hook timeout in milliseconds. Defaults to 5000.
                                failBehavior:
                                    type: string
                                    description: Action when the hook errors or times out. Defaults to `fail-open`.
                                    enum:
                                        - fail-open
                                        - fail-closed
                                enabled:
                                    type:
                                        - boolean
                                        - "null"
                                    description: Whether the hook is active. Defaults to true.
                                applicableIngress:
                                    type: array
                                    description: |-
                                        Ingress types this hook applies to. Omit to default to all
                                        ingress; an explicit empty array is rejected with 400.
                                    items:
                                        type: string
                            required:
                                - name
                                - type
                        example:
                            name: PII redactor
                            type: builtin
                            implementationId: pii-detector
                            stage: request
                            config:
                                patternDefinitions:
                                    - id: ssn
                                      regex: \d{3}-\d{2}-\d{4}
                            priority: 10
                            failBehavior: fail-open
                            applicableIngress:
                                - AI_GATEWAY
            responses:
                "400":
                    description: Bad Request — missing name/type, invalid enum value, unregistered implementationId, or empty applicableIngress.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "201":
                    description: Created
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/handler_hookConfigWithClassification'
    /api/admin/hooks/{hookId}/rule-packs:
        get:
            operationId: listInstallsForHook
            summary: List rule-pack installs for hook
            description: |-
                Returns every rule-pack install bound to the given hook, including
                disabled installs so the UI can render toggle state. Returns an
                empty array (never null) when the hook has no installs.
            x-nexus-iam-action: iam.ResourceHook.Action(iam.VerbRead)
            x-nexus-tier: auto
            parameters:
                - name: hookId
                  in: path
                  description: Hook id the rule packs are bound to.
                  required: true
                  schema:
                    type: string
            responses:
                "400":
                    description: Bad Request — hookId missing.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: array
                                items:
                                    $ref: '#/components/schemas/rulepack_Install'
        post:
            operationId: install
            summary: Install rule pack on hook
            description: |-
                Binds a specific rule-pack version to the given hook. `packId` and
                `pinVersion` are required; `enabled` defaults to true when omitted.
                On success the created install record is returned.
            x-nexus-iam-action: iam.ResourceHook.Action(iam.VerbUpdate)
            x-nexus-tier: confirm
            parameters:
                - name: hookId
                  in: path
                  description: Hook id to bind the rule pack to.
                  required: true
                  schema:
                    type: string
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                packId:
                                    type: string
                                    description: Rule-pack id to install. Required.
                                pinVersion:
                                    type: string
                                    description: Exact pack version to pin the install to. Required.
                                enabled:
                                    type:
                                        - boolean
                                        - "null"
                                    description: Whether the install is active. Defaults to true.
                            required:
                                - packId
                                - pinVersion
                        example:
                            packId: rp_01HZ
                            pinVersion: 1.2.0
                            enabled: true
            responses:
                "400":
                    description: Bad Request — hookId, packId, or pinVersion missing, or malformed JSON.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/rulepack_Install'
    /api/admin/hooks/{id}:
        get:
            operationId: getHookConfig
            summary: Get hook config
            description: Returns a single hook configuration enriched with its derived classification block. Responds 404 when no hook matches the id.
            x-nexus-iam-action: iam.ResourceHook.Action(iam.VerbRead)
            x-nexus-tier: auto
            parameters:
                - name: id
                  in: path
                  description: Hook config id.
                  required: true
                  schema:
                    type: string
            responses:
                "404":
                    description: Not Found — no hook config matches the id.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/handler_hookConfigWithClassification'
        put:
            operationId: updateHookConfig
            summary: Update hook config
            description: |-
                Partially updates a hook configuration. Every field is optional —
                omitted fields are left unchanged, and a body with no recognised
                fields returns the existing hook unchanged. Enum-shaped fields,
                when present, are validated against the hook registry. An explicit
                empty `applicableIngress` array is rejected; a non-serializable
                `config` value is rejected with 400. Responds 404 when no hook
                matches the id.
            x-nexus-iam-action: iam.ResourceHook.Action(iam.VerbUpdate)
            x-nexus-tier: confirm
            parameters:
                - name: id
                  in: path
                  description: Hook config id.
                  required: true
                  schema:
                    type: string
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                name:
                                    type:
                                        - string
                                        - "null"
                                    description: New hook name.
                                type:
                                    type:
                                        - string
                                        - "null"
                                    description: New hook kind.
                                    enum:
                                        - builtin
                                        - webhook
                                        - script
                                implementationId:
                                    type:
                                        - string
                                        - "null"
                                    description: New registered implementation id.
                                    enum:
                                        - pii-detector
                                        - keyword-filter
                                        - content-safety
                                        - rulepack-engine
                                        - data-residency
                                        - rate-limiter
                                        - request-size-validator
                                        - ip-access-filter
                                        - quality-checker
                                        - webhook-forward
                                        - noop
                                stage:
                                    type:
                                        - string
                                        - "null"
                                    description: New pipeline phase.
                                    enum:
                                        - request
                                        - response
                                category:
                                    type:
                                        - string
                                        - "null"
                                    description: New category override.
                                endpoint:
                                    type:
                                        - string
                                        - "null"
                                    description: New webhook target URL.
                                script:
                                    type:
                                        - string
                                        - "null"
                                    description: New inline script body.
                                config:
                                    description: New implementation-specific JSON configuration; must be JSON-serializable.
                                priority:
                                    type:
                                        - integer
                                        - "null"
                                    description: New execution order within the stage.
                                timeoutMs:
                                    type:
                                        - integer
                                        - "null"
                                    description: New per-hook timeout in milliseconds.
                                failBehavior:
                                    type:
                                        - string
                                        - "null"
                                    description: New fail behavior.
                                    enum:
                                        - fail-open
                                        - fail-closed
                                enabled:
                                    type:
                                        - boolean
                                        - "null"
                                    description: New enabled state.
                                applicableIngress:
                                    type: array
                                    description: New ingress-type list; an explicit empty array is rejected.
                                    items:
                                        type: string
                        example:
                            enabled: false
                            priority: 20
            responses:
                "404":
                    description: Not Found
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "400":
                    description: Bad Request
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/handler_hookConfigWithClassification'
        delete:
            operationId: deleteHookConfig
            summary: Delete hook config
            description: Deletes a hook configuration and fans out a config invalidation to the data-plane services. Responds 404 when no hook matches the id, 204 on success.
            x-nexus-iam-action: iam.ResourceHook.Action(iam.VerbDelete)
            x-nexus-tier: confirm
            parameters:
                - name: id
                  in: path
                  description: Hook config id.
                  required: true
                  schema:
                    type: string
            responses:
                "404":
                    description: Not Found — no hook config matches the id.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "204":
                    description: No Content — hook deleted.
    /api/admin/hooks/{id}/dry-run:
        post:
            operationId: hookTestDryRun
            summary: Dry-run hook against sample body
            description: |-
                Runs the stored hook against a request body supplied in the raw
                POST body. Webhook hooks with a configured endpoint are invoked
                directly; built-in hooks are forwarded to the AI Gateway's internal
                hook-test endpoint. The dry-run and test endpoints share the same
                handler. Always responds 200 with the hook output (or an `error`
                field on hook failure); 404 when no hook matches the id.
            x-nexus-iam-action: iam.ResourceHook.Action(iam.VerbRead)
            x-nexus-tier: auto
            parameters:
                - name: id
                  in: path
                  description: Hook config id to test.
                  required: true
                  schema:
                    type: string
            responses:
                "404":
                    description: Not Found — no hook config matches the id.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                output:
                                    decision: approve
                                executionTimeMs: 12
                                stage: request
    /api/admin/hooks/{id}/test:
        post:
            operationId: hookTest
            summary: Test hook against sample body
            description: |-
                Alias of the dry-run endpoint sharing the same handler. Runs the
                stored hook against a request body supplied in the raw POST body;
                webhook hooks are invoked directly, built-in hooks are forwarded to
                the AI Gateway. Always responds 200 with the hook output (or an
                `error` field on hook failure); 404 when no hook matches the id.
            x-nexus-iam-action: iam.ResourceHook.Action(iam.VerbRead)
            x-nexus-tier: auto
            parameters:
                - name: id
                  in: path
                  description: Hook config id to test.
                  required: true
                  schema:
                    type: string
            responses:
                "404":
                    description: Not Found — no hook config matches the id.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                output:
                                    decision: approve
                                executionTimeMs: 12
                                stage: request
    /api/admin/hooks/execution-chain:
        get:
            operationId: hookExecutionChain
            summary: Get hook execution chain
            description: |-
                Returns a structured view of the full request + response hook
                execution order for the pipeline visualiser. Includes per-stage
                step lists, total / enabled hook counts, and an ordered `flow`
                array of milestones and hook segments.
            x-nexus-iam-action: iam.ResourceHook.Action(iam.VerbRead)
            x-nexus-tier: auto
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                totalHooks: 2
                                enabledHooks: 1
                                requestHooks:
                                    - order: 0
                                      hookConfigId: hk_01HZ
                                      name: PII redactor
                                      priority: 10
                                      enabled: true
                                      type: builtin
                                      wired: true
                                      executionMode: fail-open
                                      classification:
                                        category: compliance
                                        implementationLabel: pii-detector
                                        dualPhaseCapable: false
                                responseHooks: []
                                flow:
                                    - kind: milestone
                                      id: request-start
                                      label: request-start
                                    - kind: hook_segment
                                      id: request-hooks
                                      label: request-hooks
                                      phase: request
                                      steps: []
                                    - kind: milestone
                                      id: upstream
                                      label: upstream
                                    - kind: hook_segment
                                      id: response-hooks
                                      label: response-hooks
                                      phase: response
                                      steps: []
                                    - kind: milestone
                                      id: response-end
                                      label: response-end
    /api/admin/hooks/implementations:
        get:
            operationId: hookImplementations
            summary: List hook implementations
            description: |-
                Returns the built-in hook implementation registry (each with its
                supported stages and JSON config schema) and the category
                definitions the UI recognises.
            x-nexus-iam-action: iam.ResourceHook.Action(iam.VerbRead)
            x-nexus-tier: auto
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                data:
                                    - implementationId: pii-detector
                                      hookType: builtin
                                      supportedStages:
                                        - request
                                        - response
                                      configSchema:
                                        type: object
                                hookCategories:
                                    - code: compliance
                                      name: Compliance & content safety
                                    - code: traffic_control
                                      name: Traffic & limits
                                    - code: quality
                                      name: Quality & signals
                                    - code: observability
                                      name: Observability
                                    - code: custom
                                      name: Custom / other
    /api/admin/hooks/refresh:
        post:
            operationId: hookForceRefresh
            summary: Force hook config refresh
            description: Publishes a Hub config invalidation so all data-plane services (AI Gateway, Compliance Proxy, Agent) reload hook configs immediately.
            x-nexus-iam-action: iam.ResourceHook.Action(iam.VerbUpdate)
            x-nexus-tier: confirm
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                refreshed: true
    /api/admin/hooks/reorder:
        post:
            operationId: reorderHooks
            summary: Reorder hooks within a stage
            description: |-
                Reassigns hook priorities for a given stage according to the order
                of the supplied id list. Both `stage` and a non-empty `ids` array
                are required. Fans out a config invalidation on success.
            x-nexus-iam-action: iam.ResourceHook.Action(iam.VerbUpdate)
            x-nexus-tier: confirm
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                stage:
                                    type: string
                                    description: Pipeline stage whose hooks are being reordered.
                                    enum:
                                        - request
                                        - response
                                ids:
                                    type: array
                                    description: Hook config ids in the desired execution order. Must be non-empty.
                                    items:
                                        type: string
                            required:
                                - stage
                                - ids
                        example:
                            stage: request
                            ids:
                                - hk_01HZ
                                - hk_02AB
            responses:
                "400":
                    description: Bad Request — stage or ids missing/empty, or reorder validation failed.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                ok: true
                                stage: request
                                count: 2
components:
    schemas:
        handler_hookClassification:
            type: object
            properties:
                category:
                    type: string
                categoryLabel:
                    type: string
                categorySource:
                    type: string
                implementationId:
                    type:
                        - string
                        - "null"
                implementationLabel:
                    type:
                        - string
                        - "null"
                phase:
                    type: string
                phaseLabel:
                    type: string
                supportedStages:
                    type: array
                    items:
                        type: string
                dualPhaseCapable:
                    type: boolean
            required:
                - category
                - categoryLabel
                - categorySource
                - phase
                - phaseLabel
                - supportedStages
                - dualPhaseCapable
        handler_hookConfigWithClassification:
            type: object
            properties:
                id:
                    type: string
                name:
                    type: string
                type:
                    type: string
                implementationId:
                    type: string
                stage:
                    type: string
                category:
                    type:
                        - string
                        - "null"
                endpoint:
                    type:
                        - string
                        - "null"
                script:
                    type:
                        - string
                        - "null"
                config:
                    description: arbitrary JSON value
                priority:
                    type: integer
                timeoutMs:
                    type: integer
                failBehavior:
                    type: string
                enabled:
                    type: boolean
                applicableIngress:
                    type: array
                    items:
                        type: string
                createdAt:
                    type: string
                    format: date-time
                updatedAt:
                    type: string
                    format: date-time
                classification:
                    $ref: '#/components/schemas/handler_hookClassification'
            required:
                - id
                - name
                - type
                - implementationId
                - stage
                - config
                - priority
                - timeoutMs
                - failBehavior
                - enabled
                - applicableIngress
                - createdAt
                - updatedAt
                - classification
        rulepack_Install:
            type: object
            properties:
                id:
                    type: string
                packId:
                    type: string
                packName:
                    type: string
                pinVersion:
                    type: string
                boundHookId:
                    type: string
                enabled:
                    type: boolean
                installedAt:
                    type: string
                    format: date-time
            required:
                - id
                - packId
                - packName
                - pinVersion
                - boundHookId
                - enabled
                - installedAt
