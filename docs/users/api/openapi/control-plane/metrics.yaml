# Hand-maintained OpenAPI spec, verified claim-by-claim against the control-plane
# handler code (the single source of truth) via the openapi-review skill. Keep
# structural fields (paths/verbs/types) in lockstep with the handlers.
openapi: 3.1.0
info:
    title: Nexus Control Plane Admin API — metrics
    version: dev
    description: 'Hand-maintained against control-plane source: field names, types, optionality, status codes and IAM tiers mirror the handler code; enum value sets and required-field rules enforced imperatively in handlers are verified by the openapi-review skill.'
paths:
    /api/admin/metrics/aggregates:
        get:
            operationId: metricsAggregates
            summary: Read metric rollup aggregates time series
            description: |-
                Returns time-bucketed metric aggregates for the requested window, served from
                the pre-aggregated metric rollup tables. The response carries one flat array of
                rows; each row pins a metric to a bucket start time and a value.

                Two row families are emitted:
                  - Global rows (empty `dimensionKey`): per-bucket totals for
                    `request_count`, `token_usage`, `estimated_cost`, `cache_hits`,
                    `cache_saved_cost`, `error_count` (4xx + 5xx combined), `latency_p50`
                    (derived from the merged latency histogram), and the latency-phase
                    breakdown sums/counts.
                  - Per-provider rows (`dimensionKey` = `routed_provider:<id>`): `request_count`,
                    `token_usage`, `estimated_cost`, and `latency_p50` for the provider that
                    actually handled the call (routed provider), with a `dimensions` object
                    carrying the stable provider id and its display label.

                When no rollup data exists for the window the handler returns `{"data": []}`.
            x-nexus-iam-action: iam.ResourceAnalytics.Action(iam.VerbRead)
            x-nexus-tier: auto
            parameters:
                - name: startTime
                  in: query
                  description: |-
                      Inclusive start of the query window, RFC 3339. The alias `start` is also
                      accepted. When either bound is omitted the handler defaults the window to a
                      365-day lookback ending now (UTC).
                  required: false
                  schema:
                    type: string
                    format: date-time
                - name: endTime
                  in: query
                  description: |-
                      Exclusive end of the query window, RFC 3339. The alias `end` is also accepted.
                      When either bound is omitted the handler defaults the window to a 365-day
                      lookback ending now (UTC).
                  required: false
                  schema:
                    type: string
                    format: date-time
                - name: tz
                  in: query
                  description: |-
                      IANA timezone name (e.g. `America/New_York`) used when resolving the default
                      time range. Empty or unrecognized values fall back to UTC.
                  required: false
                  schema:
                    type: string
                - name: source
                  in: query
                  description: |-
                      Restricts the aggregates to traffic from a single source. Omit for all
                      sources. Any value outside the enumerated set is treated as "all sources".
                  required: false
                  schema:
                    type: string
                    # Enum source: sourceSubDimension in
                    # packages/control-plane/internal/traffic/analytics/handler/analytics_rollup.go
                    # — only "vk", "proxy", "agent" map to a filter; other values fall through to
                    # all-sources.
                    enum:
                        - vk
                        - proxy
                        - agent
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                data:
                                    - bucketStart: "2026-05-01T00:00:00Z"
                                      metricName: request_count
                                      dimensionKey: ""
                                      value: "1280"
                                    - bucketStart: "2026-05-01T00:00:00Z"
                                      metricName: latency_p50
                                      dimensionKey: ""
                                      value: "342"
                                    - bucketStart: "2026-05-01T00:00:00Z"
                                      metricName: request_count
                                      dimensionKey: routed_provider:11111111-1111-1111-1111-111111111111
                                      dimensions:
                                        provider: 11111111-1111-1111-1111-111111111111
                                        providerLabel: OpenAI
                                      value: "640"
