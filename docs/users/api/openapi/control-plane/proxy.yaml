# Hand-maintained OpenAPI spec, verified claim-by-claim against the control-plane
# handler code (the single source of truth) via the openapi-review skill. Keep
# structural fields (paths/verbs/types) in lockstep with the handlers.
openapi: 3.1.0
info:
    title: Nexus Control Plane Admin API — proxy
    version: dev
    description: 'Hand-maintained against control-plane source: field names, types, optionality, status codes and IAM tiers mirror the handler code; enum value sets and required-field rules enforced imperatively in handlers are verified by the openapi-review skill.'
paths:
    /api/admin/proxy/compliance/coverage:
        get:
            operationId: proxyComplianceCoverage
            summary: Get compliance coverage stats
            description: |-
                Returns compliance coverage statistics derived from rollup data for the
                given time window: the coverage percentage and a per-bump-status
                breakdown. When either time bound is omitted the window defaults to the
                last year. When the rollup query yields no rows the handler returns an
                empty coverage object (coveragePercent absent, empty breakdown) rather
                than an error.
            x-nexus-iam-action: iam.ResourceAuditLog.Action(iam.VerbRead)
            x-nexus-tier: auto
            parameters:
                - name: startTime
                  in: query
                  description: 'Inclusive start of the window (RFC 3339). Falls back to the `start` query param if unset; defaults to one year ago when neither is supplied.'
                  schema:
                    type: string
                    format: date-time
                - name: endTime
                  in: query
                  description: 'Inclusive end of the window (RFC 3339). Falls back to the `end` query param if unset; defaults to now when neither is supplied.'
                  schema:
                    type: string
                    format: date-time
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/compliancestore_ComplianceCoverageStats'
    /api/admin/proxy/compliance/export:
        get:
            operationId: proxyComplianceExport
            summary: Export compliance events as CSV
            description: |-
                Streams compliance-proxy and agent traffic events as an RFC 4180 CSV
                download for offline audit review. The time window defaults to the last
                24 hours when either bound is omitted, and the export is capped at 50,000
                rows to protect the API worker and stay under spreadsheet row limits. The
                response is sent as `text/csv` with a `Content-Disposition: attachment`
                filename stamped with the active UTC window. Columns: timestamp, id,
                transactionId, sourceIp, targetHost, method, path, statusCode,
                hookDecision, hookReasonCode, latencyMs, complianceTags.
            x-nexus-iam-action: iam.ResourceAuditLog.Action(iam.VerbRead)
            x-nexus-tier: auto
            parameters:
                - name: startTime
                  in: query
                  description: 'Inclusive start of the window (RFC 3339). Falls back to the `start` query param if unset; defaults to 24 hours ago when neither is supplied.'
                  schema:
                    type: string
                    format: date-time
                - name: endTime
                  in: query
                  description: 'Inclusive end of the window (RFC 3339). Falls back to the `end` query param if unset; defaults to now when neither is supplied.'
                  schema:
                    type: string
                    format: date-time
            responses:
                "200":
                    description: CSV stream of compliance events as a file download.
                    content:
                        text/csv:
                            schema:
                                type: string
                                format: binary
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
    /api/admin/proxy/compliance/hook-health:
        get:
            operationId: proxyComplianceHookHealth
            summary: Get hook health stats
            description: |-
                Returns hook health statistics from rollup data for the given time
                window: total evaluations, per-decision breakdown, top reason codes, and
                latency percentiles (p50/p95/p99, which may be null when unavailable).
                When either time bound is omitted the window defaults to the last year.
                When the rollup query yields no rows the handler returns an empty
                hook-health object with an empty topReasonCodes list.
            x-nexus-iam-action: iam.ResourceAuditLog.Action(iam.VerbRead)
            x-nexus-tier: auto
            parameters:
                - name: startTime
                  in: query
                  description: 'Inclusive start of the window (RFC 3339). Falls back to the `start` query param if unset; defaults to one year ago when neither is supplied.'
                  schema:
                    type: string
                    format: date-time
                - name: endTime
                  in: query
                  description: 'Inclusive end of the window (RFC 3339). Falls back to the `end` query param if unset; defaults to now when neither is supplied.'
                  schema:
                    type: string
                    format: date-time
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/compliancestore_HookHealthStats'
    /api/admin/proxy/compliance/reject-stats:
        get:
            operationId: proxyComplianceRejectStats
            summary: Get reject stats
            description: |-
                Returns reject statistics from rollup data for the given time window:
                total rejects plus top-N breakdowns by target host, reason code, and
                source. When either time bound is omitted the window defaults to the last
                year. When the rollup query yields no rows the handler returns an empty
                reject-stats object with empty top-N lists.
            x-nexus-iam-action: iam.ResourceAuditLog.Action(iam.VerbRead)
            x-nexus-tier: auto
            parameters:
                - name: startTime
                  in: query
                  description: 'Inclusive start of the window (RFC 3339). Falls back to the `start` query param if unset; defaults to one year ago when neither is supplied.'
                  schema:
                    type: string
                    format: date-time
                - name: endTime
                  in: query
                  description: 'Inclusive end of the window (RFC 3339). Falls back to the `end` query param if unset; defaults to now when neither is supplied.'
                  schema:
                    type: string
                    format: date-time
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/compliancestore_RejectStats'
    /api/admin/proxy/connections:
        get:
            operationId: proxyConnections
            summary: Get live compliance-proxy connections
            description: |-
                Reverse-proxies to the live compliance-proxy runtime `/connections`
                endpoint and streams its response back verbatim. The answer comes from
                the compliance-proxy process memory, not PostgreSQL. Status code,
                headers, and body are copied from the upstream response. Returns 502 when
                the compliance-proxy runtime is unreachable.
            x-nexus-iam-action: iam.ResourceSettings.Action(iam.VerbRead)
            x-nexus-tier: auto
            responses:
                default:
                    description: Upstream compliance-proxy runtime response, copied verbatim. Returns 502 when the runtime is unreachable.
    /api/admin/proxy/health:
        get:
            operationId: proxyHealth
            summary: Get compliance-proxy health
            description: |-
                Reverse-proxies to the live compliance-proxy runtime `/healthz` endpoint
                and streams its response back verbatim. The answer comes from the
                compliance-proxy process, not PostgreSQL. Status code, headers, and body
                are copied from the upstream response. Returns 502 when the
                compliance-proxy runtime is unreachable.
            x-nexus-iam-action: iam.ResourceSettings.Action(iam.VerbRead)
            x-nexus-tier: auto
            responses:
                default:
                    description: Upstream compliance-proxy runtime response, copied verbatim. Returns 502 when the runtime is unreachable.
    /api/admin/proxy/metrics:
        get:
            operationId: proxyMetrics
            summary: Get compliance-proxy metrics
            description: |-
                Reverse-proxies to the live compliance-proxy runtime `/metrics` endpoint
                (Prometheus exposition) and streams its response back verbatim. The answer
                comes from the compliance-proxy process, not PostgreSQL. Status code,
                headers, and body are copied from the upstream response. Returns 502 when
                the compliance-proxy runtime is unreachable.
            x-nexus-iam-action: iam.ResourceSettings.Action(iam.VerbRead)
            x-nexus-tier: auto
            responses:
                default:
                    description: Upstream compliance-proxy runtime response, copied verbatim. Returns 502 when the runtime is unreachable.
components:
    schemas:
        compliancestore_ComplianceCoverageStats:
            type: object
            description: Coverage percentage plus a per-bump-status event-count breakdown for a time window.
            properties:
                coveragePercent:
                    type: number
                    description: Percentage of traffic events covered by compliance enforcement over the window.
                breakdown:
                    type: object
                    description: Event counts keyed by bump status.
                    additionalProperties:
                        type: integer
                period:
                    $ref: '#/components/schemas/compliancestore_TimePeriod'
            required:
                - coveragePercent
                - breakdown
                - period
        compliancestore_HookDecisionBreakdown:
            type: object
            description: Per-decision hook evaluation counts.
            properties:
                allow:
                    type: integer
                    description: Number of hook evaluations that allowed the request.
                deny:
                    type: integer
                    description: Number of hook evaluations that denied the request.
                error:
                    type: integer
                    description: Number of hook evaluations that errored.
                unknown:
                    type: integer
                    description: Number of hook evaluations with an unknown or unclassified decision.
            required:
                - allow
                - deny
                - error
                - unknown
        compliancestore_HookHealthStats:
            type: object
            description: Hook health for a time window — totals, per-decision breakdown, top reason codes, and latency percentiles.
            properties:
                total:
                    type: integer
                    description: Total number of hook evaluations in the window.
                byDecision:
                    $ref: '#/components/schemas/compliancestore_HookDecisionBreakdown'
                topReasonCodes:
                    type: array
                    description: Most frequent hook reason codes, ranked by occurrence.
                    items:
                        $ref: '#/components/schemas/compliancestore_LabelCount'
                latencyP50:
                    type:
                        - number
                        - "null"
                    description: Median hook latency in milliseconds; null when unavailable.
                latencyP95:
                    type:
                        - number
                        - "null"
                    description: 95th-percentile hook latency in milliseconds; null when unavailable.
                latencyP99:
                    type:
                        - number
                        - "null"
                    description: 99th-percentile hook latency in milliseconds; null when unavailable.
                period:
                    $ref: '#/components/schemas/compliancestore_TimePeriod'
            required:
                - total
                - byDecision
                - topReasonCodes
                - period
        compliancestore_LabelCount:
            type: object
            description: A label paired with its occurrence count, used for top-N lists.
            properties:
                label:
                    type: string
                    description: The label (e.g. host, reason code, or source).
                count:
                    type: integer
                    description: Number of occurrences for this label.
            required:
                - label
                - count
        compliancestore_RejectStats:
            type: object
            description: Reject statistics for a time window — total rejects plus top-N breakdowns.
            properties:
                totalRejects:
                    type: integer
                    description: Total number of rejected requests in the window.
                topTargets:
                    type: array
                    description: Most frequently rejected target hosts, ranked by occurrence.
                    items:
                        $ref: '#/components/schemas/compliancestore_LabelCount'
                topReasonCodes:
                    type: array
                    description: Most frequent reject reason codes, ranked by occurrence.
                    items:
                        $ref: '#/components/schemas/compliancestore_LabelCount'
                bySource:
                    type: array
                    description: Reject counts grouped by enforcement source (ai-gateway, compliance-proxy, agent).
                    items:
                        $ref: '#/components/schemas/compliancestore_LabelCount'
                period:
                    $ref: '#/components/schemas/compliancestore_TimePeriod'
            required:
                - totalRejects
                - topTargets
                - topReasonCodes
                - bySource
                - period
        compliancestore_TimePeriod:
            type: object
            description: A closed [start, end] time interval describing the window the stats cover.
            properties:
                start:
                    type: string
                    format: date-time
                    description: Inclusive start of the window.
                end:
                    type: string
                    format: date-time
                    description: Inclusive end of the window.
            required:
                - start
                - end
