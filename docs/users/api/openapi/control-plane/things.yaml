                    format: date-time
                - name: start
                  in: query
                  required: false
                  description: Start of the window as an RFC3339 timestamp. Defaults to 24h before `end` when omitted.
                  schema:
                    type: string
                    format: date-time
                - name: dimension
                  in: query
                  required: false
                  description: Dimension name to slice by (e.g. "model", "provider", "target_host"). Empty returns global (un-dimensioned) rows only.
