                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "204":
                    description: No Content
    /api/admin/organizations/tree:
        get:
            operationId: organizationTree
            summary: Get the organization hierarchy
            description: |-
                Returns the organization hierarchy as a tree, with each node annotated
                with its effective cost limit. Limits are resolved by merging per-org
                quota overrides with the minimum enabled organization-scoped quota
                policy.
            x-nexus-iam-action: iam.ResourceOrganization.Action(iam.VerbRead)
            x-nexus-tier: auto
