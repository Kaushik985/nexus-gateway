                                total: 0
    /api/admin/analytics/cost-summary:
        get:
            operationId: analyticsCostSummary
            summary: Rolling 30-day cost summary
            description: |-
                Returns a fixed rolling 30-day cost breakdown: total billed cost, gateway
                and provider prompt-cache savings, reasoning cost, internal-ops (embedding
                and AI-Guard) cost, plus per-organization and per-provider cost arrays. The
                `excludeInternalOpsFromBilledCost` flag mirrors the Hub configuration so the
                UI can render the correct internal-ops hint. The window is fixed at 30 days
                and is not configurable via query parameters.
            x-nexus-iam-action: iam.ResourceAnalytics.Action(iam.VerbRead)
            x-nexus-tier: auto
            responses:
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/handler_costSummaryResponse'
    /api/admin/analytics/latency-phases:
        get:
            operationId: analyticsLatencyPhases
            summary: Per-phase latency percentiles by dimension
            description: |-
                Returns per-phase P50/P95/P99 latency aggregates (total, gateway overhead,
                upstream TTFB, upstream total, request hooks, response hooks) grouped by the
                requested dimension over the requested window. Each row carries a request
                count; percentile fields are null when no rows in the window had the
                underlying measurement. Results are capped at 200 rows ordered by request
                count.

                `groupBy` and a `start`/`end` window are required — a missing or
                unsupported value returns 400.
            x-nexus-iam-action: iam.ResourceAnalytics.Action(iam.VerbRead)
            x-nexus-tier: auto
            parameters:
                - name: groupBy
                  in: query
                  required: false
                  description: |-
                    Dimension to group latency phases by. Required at runtime — the handler
                    returns 400 when it is missing or unsupported. Enum values are the cases
                    of `latencyPhasesGroupColumn` in the handler (analytics_latency.go).
                  schema:
                    type: string
                    enum:
                        - provider
                        - model
                        - virtual_key
                        - node
                        - host
                        - device
                - name: source
                  in: query
                  required: false
                  description: |-
                    Restricts aggregation to a single traffic source. Omitting it (or the
                    literal `all`) aggregates across all sources; any other value is applied
                    verbatim as a `source` column filter.
                  schema:
                    type: string
                    default: all
            responses:
                "400":
                    description: Bad Request
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                window:
                                    start: "2026-04-01T00:00:00Z"
                                    end: "2026-05-01T00:00:00Z"
                                rows: []
