    /api/admin/providers/{id}/test:
        post:
            operationId: providerTest
            summary: Test a stored provider's connectivity
            description: |-
                Tests connectivity to a stored provider, using the credential named by
                credentialId or, when omitted, the provider's first enabled
                credential. The test is forwarded to the AI Gateway, whose response is
                relayed verbatim. Returns 404 when the provider does not exist.
            x-nexus-iam-action: iam.ResourceProvider.Action(iam.VerbRead)
            x-nexus-tier: auto
            parameters:
                - name: id
                  in: path
                  description: Provider id.
                  required: true
                  schema:
                    type: string
            requestBody:
                required: false
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                credentialId:
                                    type: string
                                    description: Optional credential id. When omitted, the provider's first enabled credential is used.
                        example:
                            credentialId: 0192f3a1-2b4c-7d8e-9f01-2a3b4c5d6e7f
            responses:
                "404":
                    description: Not Found
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: Connectivity test result relayed from the AI Gateway.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
    /api/admin/providers/test-connection:
