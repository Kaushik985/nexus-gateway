gateway:
  name: "Bifrost"
  version: "latest"
  base_url: "${BIFROST_BASE_URL:-http://localhost:8080}"
  api_key: "${BIFROST_API_KEY}"

request:
  timeout_seconds: 60
  max_retries: 0
  stream: true

features:
  caching_enabled: false

benchmark:
  warmup_duration_seconds: 30
  virtual_users: 20
  test_duration_seconds: 300
