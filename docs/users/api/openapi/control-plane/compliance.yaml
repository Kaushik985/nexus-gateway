    /api/admin/compliance/exemptions/{id}/approve:
        post:
            operationId: approveRequest
            summary: Approve an exemption request
            description: |-
                Approves a pending employee exemption request, creating the backing grant and
                fanning it out via Hub. An already-approved request that still has its grant is
                reconciled idempotently (response carries reapplied=true). Returns 409 when the
                request is not pending, 404 when it does not exist, and 503 when Hub is not
                configured.
            x-nexus-iam-action: iam.ResourceComplianceExemption.Action(iam.VerbUpdate)
            x-nexus-tier: confirm
            parameters:
                - name: id
                  in: path
                  description: Identifier of the exemption request to approve.
                  required: true
                  schema:
                    type: string
            responses:
