    /api/admin/compliance/exemption-grants:
        get:
            operationId: listGrants
            summary: List unified compliance exemptions
            description: |-
                Returns a paginated page of the unified exemption surface (active grants and
                pending requests), filtered by the supplied tab. The response wraps the rows
                and the total count.
            x-nexus-iam-action: iam.ResourceComplianceExemption.Action(iam.VerbRead)
            x-nexus-tier: auto
            parameters:
                - name: tab
                  in: query
                  description: Lower-cased tab selector that scopes which exemptions are returned. Validation of the value is performed by the data layer.
                  required: false
                  schema:
                    type: string
            responses:
                "400":
                    description: Bad Request
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
        post:
            operationId: postGrant
            summary: Create a compliance exemption grant
            description: |-
                Directly creates a compliance exemption grant (bypassing the request/approval
                flow). The grant is fanned out to the compliance-proxy and agent receivers via
                Hub. Returns 503 when Hub is not configured.
            x-nexus-iam-action: iam.ResourceComplianceExemption.Action(iam.VerbUpdate)
            x-nexus-tier: confirm
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                sourceIP:
                                    type: string
                                    description: Originating client IP the grant applies to. Required (must be non-empty).
                                targetHost:
                                    type: string
                                    description: Upstream host the grant exempts. Required (must be non-empty).
                                durationMinutes:
                                    type: integer
                                    description: Grant lifetime in minutes from effectiveFrom. Must be in the range (0, 10080] (at most 7 days).
                                    minimum: 1
                                    maximum: 10080
                                reason:
                                    type: string
                                    description: Justification for the grant. Length must be 4..500 characters.
                                    minLength: 4
                                    maxLength: 500
                                effectiveFrom:
                                    type: string
                                    format: date-time
                                    description: RFC3339 timestamp at which the grant becomes effective. Optional; defaults to the current time when omitted. The computed expiry (effectiveFrom + durationMinutes) must be in the future.
                            required:
                                - sourceIP
                                - targetHost
                                - durationMinutes
                                - reason
                        example:
