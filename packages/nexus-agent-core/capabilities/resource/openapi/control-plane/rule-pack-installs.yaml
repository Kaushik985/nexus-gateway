# Hand-maintained OpenAPI spec, verified claim-by-claim against the control-plane
# handler code (the single source of truth) via the openapi-review skill. Keep
# structural fields (paths/verbs/types) in lockstep with the handlers.
openapi: 3.1.0
info:
    title: Nexus Control Plane Admin API — rule-pack-installs
    version: dev
    description: 'Hand-maintained against control-plane source: field names, types, optionality, status codes and IAM tiers mirror the handler code; enum value sets and required-field rules enforced imperatively in handlers are verified by the openapi-review skill.'
paths:
    /api/admin/rule-pack-installs/{installId}:
        patch:
            operationId: patchInstall
            summary: Toggle a rule-pack install's enabled flag
            description: |-
                Enables or disables an existing rule-pack install in place. Only the
                `enabled` flag is mutable here — changing the pinned pack version
                requires uninstall followed by reinstall, so operators are never
                surprised by a silent binding swap. On success the bound hook's
                cached config is invalidated and an admin-audit entry is written.
            x-nexus-iam-action: iam.ResourceHook.Action(iam.VerbUpdate)
            x-nexus-tier: confirm
            parameters:
                - name: installId
                  in: path
                  required: true
                  description: Identifier of the rule-pack install to update.
                  schema:
                    type: string
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                enabled:
                                    type: boolean
                                    description: New enabled state for the install. Required — the handler rejects a request whose `enabled` field is absent.
                            required:
                                - enabled
                        example:
                            enabled: false
            responses:
                "400":
                    description: Bad Request — `installId` missing, body malformed, or `enabled` absent.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "404":
                    description: Not Found — no install matches `installId`.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "500":
                    description: Internal Server Error — the update could not be persisted.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: OK — the install's enabled flag was updated.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                installId: rpi_01HRX
                                enabled: false
        delete:
            operationId: uninstallByID
            summary: Uninstall a rule-pack install
            description: |-
                Removes a rule-pack install and its per-rule overrides (deleted via
                cascade). On success the bound hook's cached config is invalidated
                and an admin-audit entry is written. Returns 404 when the install
                is already gone.
            x-nexus-iam-action: iam.ResourceHook.Action(iam.VerbUpdate)
            x-nexus-tier: confirm
            parameters:
                - name: installId
                  in: path
                  required: true
                  description: Identifier of the rule-pack install to remove.
                  schema:
                    type: string
            responses:
                "400":
                    description: Bad Request — `installId` missing.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "404":
                    description: Not Found — no install matches `installId`.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "500":
                    description: Internal Server Error — the install could not be removed.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: OK — the install (and its overrides) was removed.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                uninstalled: rpi_01HRX
    /api/admin/rule-pack-installs/{installId}/effective-rules:
        get:
            operationId: effectiveRules
            summary: Get the effective rule set for an install
            description: |-
                Returns the post-override rule set the bound hook would actually
                evaluate for this install: the install metadata plus the pack with
                its rules after per-rule overrides (disable / severity change) have
                been applied. Returns 404 when the install cannot be loaded.
            x-nexus-iam-action: iam.ResourceHook.Action(iam.VerbRead)
            x-nexus-tier: auto
            parameters:
                - name: installId
                  in: path
                  required: true
                  description: Identifier of the rule-pack install whose effective rules are requested.
                  schema:
                    type: string
            responses:
                "400":
                    description: Bad Request — `installId` missing.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "404":
                    description: Not Found — the install could not be loaded.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: OK — the effective (post-override) rule set.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/rulepack_EffectiveRuleSet'
    /api/admin/rule-pack-installs/{installId}/overrides:
        patch:
            operationId: upsertOverrides
            summary: Replace per-rule overrides for an install
            description: |-
                Upserts the per-rule override set for a rule-pack install. Each
                override disables a rule or changes its severity within this install
                only, leaving the underlying pack untouched. The supplied array
                replaces the install's stored overrides. On success the bound hook's
                cached config is invalidated and an admin-audit entry is written.
            x-nexus-iam-action: iam.ResourceHook.Action(iam.VerbUpdate)
            x-nexus-tier: confirm
            parameters:
                - name: installId
                  in: path
                  required: true
                  description: Identifier of the rule-pack install whose overrides are being set.
                  schema:
                    type: string
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                overrides:
                                    type: array
                                    description: Per-rule overrides to apply to this install. An empty array clears all overrides.
                                    items:
                                        $ref: '#/components/schemas/rulepack_Override'
                            required:
                                - overrides
                        example:
                            overrides:
                                - ruleLocalId: pi-001
                                  disabled: true
                                - ruleLocalId: pi-002
                                  disabled: false
                                  severityOverride: high
            responses:
                "400":
                    description: Bad Request — `installId` missing or body malformed.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "500":
                    description: Internal Server Error — the overrides could not be persisted.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: OK — the overrides were saved.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                installId: rpi_01HRX
                                overridesSaved: 2
components:
    schemas:
        rulepack_EffectiveRuleSet:
            type: object
            description: Post-override view of a single install — the install metadata plus the pack whose rules reflect this install's overrides.
            properties:
                install:
                    $ref: '#/components/schemas/rulepack_Install'
                pack:
                    $ref: '#/components/schemas/rulepack_Pack'
            required:
                - install
                - pack
        rulepack_Install:
            type: object
            description: A rule-pack install — a pinned pack version bound to a single hook.
            properties:
                id:
                    type: string
                    description: Install identifier.
                packId:
                    type: string
                    description: Identifier of the installed pack.
                packName:
                    type: string
                    description: Name of the installed pack.
                pinVersion:
                    type: string
                    description: Pinned pack version this install evaluates against.
                boundHookId:
                    type: string
                    description: Identifier of the hook this install is bound to.
                enabled:
                    type: boolean
                    description: Whether the install is active.
                installedAt:
                    type: string
                    format: date-time
                    description: When the install was created.
            required:
                - id
                - packId
                - packName
                - pinVersion
                - boundHookId
                - enabled
                - installedAt
        rulepack_Override:
            type: object
            description: A per-install per-rule modifier — disables a rule or changes its severity within one install only.
            properties:
                id:
                    type: string
                    description: Override identifier.
                installId:
                    type: string
                    description: Identifier of the install this override belongs to.
                ruleLocalId:
                    type: string
                    description: Pack-local rule identifier the override targets.
                disabled:
                    type: boolean
                    description: When true, the targeted rule is suppressed for this install.
                severityOverride:
                    type: string
                    description: Replacement severity for the targeted rule within this install. Stored as supplied; the handler does not constrain its value.
            required:
                - id
                - installId
                - ruleLocalId
                - disabled
        rulepack_Pack:
            type: object
            description: A rule pack — a named, versioned collection of pattern rules.
            properties:
                id:
                    type: string
                    description: Pack identifier (assigned by the store).
                name:
                    type: string
                    description: Pack name.
                version:
                    type: string
                    description: Pack version.
                maintainer:
                    type: string
                    description: Pack maintainer.
                description:
                    type: string
                    description: Human-readable pack description.
                createdAt:
                    type: string
                    format: date-time
                    description: When the pack was created.
                rules:
                    type: array
                    description: Rules contained in the pack.
                    items:
                        $ref: '#/components/schemas/rulepack_Rule'
            required:
                - name
                - version
                - maintainer
                - rules
        rulepack_Rule:
            type: object
            description: A single pattern rule within a pack.
            properties:
                id:
                    type: string
                    description: Rule row identifier (assigned by the store).
                packId:
                    type: string
                    description: Identifier of the pack this rule belongs to.
                ruleId:
                    type: string
                    description: Pack-local rule identifier (for example "pi-001").
                category:
                    type: string
                    description: Rule category.
                severity:
                    type: string
                    description: Rule severity. Stored as supplied; the handler does not constrain its value.
                pattern:
                    type: string
                    description: Match pattern the rule evaluates.
                flags:
                    type: string
                    description: Optional pattern flags.
                description:
                    type: string
                    description: Human-readable rule description.
                labels:
                    type: array
                    description: Labels merged into the caller hook's tags on match.
                    items:
                        type: string
            required:
                - ruleId
                - category
                - severity
                - pattern
