# Hand-maintained OpenAPI spec, verified claim-by-claim against the control-plane
# handler code (the single source of truth) via the openapi-review skill. Keep
# structural fields (paths/verbs/types) in lockstep with the handlers.
openapi: 3.1.0
info:
    title: Nexus Control Plane Admin API — instances
    version: dev
    description: 'Hand-maintained against control-plane source: field names, types, optionality, status codes and IAM tiers mirror the handler code; enum value sets and required-field rules enforced imperatively in handlers are verified by the openapi-review skill.'
paths:
    /api/admin/instances:
        get:
            operationId: listInstances
            summary: List registered service instances
            description: |-
                Returns every registered non-agent service instance (control-plane,
                ai-gateway, compliance-proxy, nexus-hub) together with a total count
                and per-service status summaries. Backed by the thing + thing_service
                tables; agent-type things are excluded. Takes no request parameters.
            x-nexus-iam-action: iam.ResourceSettings.Action(iam.VerbRead)
            x-nexus-tier: auto
            responses:
                "500":
                    description: Internal Server Error — the instance list or per-service summaries could not be loaded.
                    content:
                        application/json:
                            schema:
                                type: object
                                description: Error envelope returned on failure.
                                properties:
                                    error:
                                        type: object
                                        properties:
                                            message:
                                                type: string
                                                description: Human-readable error message.
                                            type:
                                                type: string
                                                description: Error category emitted by the handler.
                                            code:
                                                type: string
                                                description: Optional machine-readable error code (may be empty).
                                additionalProperties: {}
                            example:
                                error:
                                    message: Failed to list instances
                                    type: server_error
                                    code: ""
                "200":
                    description: OK — registered instances, total count, and per-service summaries.
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    instances:
                                        type: array
                                        description: All registered non-agent service instances.
                                        items:
                                            type: object
                                            properties:
                                                instanceId:
                                                    type: string
                                                    description: Unique thing/instance identifier.
                                                service:
                                                    type: string
                                                    description: Service (thing) type, e.g. ai-gateway or nexus-hub.
                                                version:
                                                    type: string
                                                    description: Reported build version (empty when unknown).
                                                address:
                                                    type: string
                                                    nullable: true
                                                    description: Network address of the instance, if reported.
                                                metricsUrl:
                                                    type: string
                                                    nullable: true
                                                    description: Prometheus metrics endpoint URL, if registered.
                                                role:
                                                    type: string
                                                    description: Instance role; defaults to "default" when unset.
                                                status:
                                                    type: string
                                                    description: Current health status (sourced from the reported state / thing.status column).
                                                uptime:
                                                    type: integer
                                                    nullable: true
                                                    description: Reported uptime in seconds, if present.
                                                checks:
                                                    description: Reported per-dependency health checks blob.
                                                registeredAt:
                                                    type: string
                                                    format: date-time
                                                    description: Enrollment timestamp.
                                                lastHeartbeatAt:
                                                    type: string
                                                    format: date-time
                                                    description: Last-seen / heartbeat timestamp.
                                    count:
                                        type: integer
                                        description: Total instance count across all services (sum of per-service totals).
                                    services:
                                        type: object
                                        description: Per-service status summary, keyed by service type.
                                        additionalProperties:
                                            type: object
                                            properties:
                                                service:
                                                    type: string
                                                    description: Service (thing) type.
                                                total:
                                                    type: integer
                                                    description: Total instances of this service.
                                                healthy:
                                                    type: integer
                                                    description: Count of online/healthy instances.
                                                degraded:
                                                    type: integer
                                                    description: Count of degraded (drift) instances.
                                                unhealthy:
                                                    type: integer
                                                    description: Count of unhealthy instances.
                                                offline:
                                                    type: integer
                                                    description: Count of offline instances.
                                additionalProperties: {}
                            example:
                                instances:
                                    - instanceId: ai-gateway-7c9f
                                      service: ai-gateway
                                      version: 1.4.0
                                      address: 10.0.1.20:3050
                                      metricsUrl: http://10.0.1.20:3050/metrics
                                      role: default
                                      status: healthy
                                      uptime: 86400
                                      checks: {}
                                      registeredAt: "2026-01-10T08:00:00Z"
                                      lastHeartbeatAt: "2026-01-11T08:00:00Z"
                                count: 4
                                services:
                                    ai-gateway:
                                        service: ai-gateway
                                        total: 1
                                        healthy: 1
                                        degraded: 0
                                        unhealthy: 0
                                        offline: 0
