        get:
            operationId: getPayloadCaptureConfig
            summary: Read payload-capture settings
            description: |-
                Returns the persisted payload-capture config, or conservative
                defaults when no config has been saved. Byte caps default to
                256 KiB inline cutoff and 10 MiB request/response read caps.
            x-nexus-iam-action: iam.ResourcePayloadCapture.Action(iam.VerbRead)
            x-nexus-tier: auto
