                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/orgstore_Organization'
        delete:
            operationId: deleteOrganization
            summary: Delete an organization
            description: |-
                Deletes an organization. The handler first counts dependents; if the
                org has any child organizations or projects the request is rejected
                with 409 and nothing is deleted. On success the ai-gateway policy
                cache is invalidated so the org no longer appears in routing.
            x-nexus-iam-action: iam.ResourceOrganization.Action(iam.VerbDelete)
            x-nexus-tier: confirm
            parameters:
