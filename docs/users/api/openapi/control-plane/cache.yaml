components:
    schemas:
        cacheconfig_AdapterConfig:
            type: object
            description: Tier-2 prompt-cache override blob for an adapter type. Every knob is an optional pointer — null or absent means inherit from the global tier. The marker knobs apply to Anthropic-family adapters; the cache and circuit-breaker knobs apply to Gemini-family adapters; the rules map is universal.
            properties:
                marker_inject_enabled:
                    description: Anthropic-family knob — whether cache-control markers are injected. Null inherits.
                    type:
                        - boolean
                        - "null"
                marker_boundary3_enabled:
                    description: Anthropic-family knob — whether the third cache boundary marker is enabled. Null inherits.
                    type:
                        - boolean
                        - "null"
                cache_enabled:
                    description: Gemini-family knob — master enable for explicit caching on this adapter. Null inherits.
                    type:
                        - boolean
                        - "null"
                min_system_chars:
                    description: Gemini-family knob — minimum system-prompt length before caching is attempted. Null inherits.
                    type:
                        - integer
                        - "null"
                ttl_seconds:
                    description: Gemini-family knob — cache entry time-to-live in seconds. Null inherits.
                    type:
                        - integer
                        - "null"
                circuit_breaker_threshold:
                    description: Gemini-family knob — consecutive failures before the cache circuit breaker opens. Null inherits.
                    type:
                        - integer
                        - "null"
                circuit_breaker_open_secs:
                    description: Gemini-family knob — seconds the circuit breaker stays open before retrying. Null inherits.
                    type:
                        - integer
                        - "null"
                rules:
                    description: Per-rule-id overrides, keyed by rule id. Universal across all adapter families.
                    type: object
                    additionalProperties:
                        $ref: '#/components/schemas/cacheconfig_RuleOverride'
            example:
                marker_inject_enabled: true
                marker_boundary3_enabled: false
        cacheconfig_GlobalConfig:
            type: object
            description: Tier-1 singleton prompt-cache configuration.
            properties:
                normaliser_enabled:
                    description: Whether the request normaliser runs before cache-key computation.
                    type: boolean
                cache_master_kill_switch:
                    description: When true, disables all prompt caching fleet-wide regardless of lower-tier config.
                    type: boolean
            example:
                normaliser_enabled: true
                cache_master_kill_switch: false
        cacheconfig_ProviderConfig:
            type: object
            description: Tier-3 prompt-cache override blob for a single provider. A strict subset of AdapterConfig with no rules map. Every knob is an optional pointer — null or absent means inherit from the adapter and global tiers.
            properties:
                marker_inject_enabled:
                    description: Anthropic-family knob — whether cache-control markers are injected. Null inherits.
                    type:
                        - boolean
                        - "null"
                marker_boundary3_enabled:
                    description: Anthropic-family knob — whether the third cache boundary marker is enabled. Null inherits.
                    type:
                        - boolean
                        - "null"
                cache_enabled:
                    description: Gemini-family knob — master enable for explicit caching on this provider. Null inherits.
                    type:
                        - boolean
                        - "null"
                min_system_chars:
                    description: Gemini-family knob — minimum system-prompt length before caching is attempted. Null inherits.
                    type:
                        - integer
                        - "null"
                ttl_seconds:
                    description: Gemini-family knob — cache entry time-to-live in seconds. Null inherits.
                    type:
                        - integer
                        - "null"
                circuit_breaker_threshold:
                    description: Gemini-family knob — consecutive failures before the cache circuit breaker opens. Null inherits.
                    type:
                        - integer
                        - "null"
                circuit_breaker_open_secs:
                    description: Gemini-family knob — seconds the circuit breaker stays open before retrying. Null inherits.
                    type:
                        - integer
                        - "null"
            example:
                cache_enabled: true
                ttl_seconds: 3600
        cacheconfig_RuleOverride:
            type: object
            description: Per-rule-id admin-settable override. A nil pointer means inherit the rule's built-in default.
            properties:
                enabled:
                    description: Whether the rule is active. Null inherits the built-in default.
                    type:
                        - boolean
                        - "null"
                dry_run_always:
                    description: When true, the rule logs what it would do without applying the effect. Null inherits.
                    type:
                        - boolean
                        - "null"
        handler_TimeSensitivePattern:
            type: object
            description: A single fleet-wide time-sensitive freshness rule. On create (POST) the handler requires a non-empty id and at least one keyword; the remaining fields default to their zero values when omitted.
            properties:
                id:
                    description: Stable rule identifier. Required on create; on update it is taken from the path and any body value is overwritten.
                    type: string
                keywords:
                    description: Trigger keywords matched case-insensitively against the prompt. At least one is required on create.
                    type: array
                    items:
                        type: string
                requireQuestionMark:
                    description: When true, the rule fires only if the prompt also contains a question mark.
                    type: boolean
                requireEntity:
                    description: When true, the rule fires only if the prompt also contains an entity (currency symbol, currency word, digit run, or uppercase run).
                    type: boolean
                languages:
                    description: Language codes the rule applies to.
                    type: array
                    items:
                        type: string
                enabled:
                    description: Whether the rule is active in the freshness gate.
                    type: boolean
            required:
                - id
                - keywords
            example:
                id: stock-price
                keywords:
                    - stock price
                    - share price
                requireQuestionMark: true
                requireEntity: true
                languages:
                    - en
                enabled: true
        handler_effectiveResponse:
            type: object
            description: The resolved effective prompt-cache config for a provider, with per-field source attribution across the global, adapter, and provider tiers.
            properties:
                provider_id:
                    description: Provider id the config was resolved for.
                    type: string
                provider_name:
                    description: Human-readable provider name.
                    type: string
                adapter_type:
                    description: The provider's adapter type, which determines the applicable knob family.
                    type: string
                effective:
                    description: The merged effective values keyed by knob name.
                    type: object
                    additionalProperties: {}
                sources:
                    description: For each knob name, the tier that supplied the effective value.
                    type: object
                    additionalProperties:
                        type: string
                rules:
                    description: Per-rule-id overrides inherited from the adapter tier. Omitted when empty.
                    type: object
                    additionalProperties:
                        $ref: '#/components/schemas/cacheconfig_RuleOverride'
            required:
                - provider_id
                - provider_name
                - adapter_type
                - effective
                - sources
        handler_semanticFeedbackRequest:
            type: object
            description: Body for submitting semantic-cache negative feedback. The handler requires a non-empty entryKey and reason.
            properties:
                entryKey:
                    description: The semantic-cache entry key to poison. Required.
                    type: string
                vkScope:
                    description: Virtual-key scope the entry belongs to. Used to namespace the poison-list key.
                    type: string
                reason:
                    description: Human-readable reason for the negative feedback. Required.
                    type: string
                ttlSeconds:
                    description: Remaining TTL of the cache entry in seconds. Zero or absent uses the built-in 24-hour default before the poison-list multiplier.
                    type: integer
                    format: int64
            required:
                - entryKey
                - reason
            example:
                entryKey: l2:abc123
                vkScope: vk_live_42
                reason: stale answer returned
                ttlSeconds: 3600
        handler_timeSensitivePatternsResponse:
            type: object
            description: The active time-sensitive freshness rule set with its source tag.
            properties:
                patterns:
                    description: The rule list as persisted in the DB blob.
                    type: array
                    items:
                        $ref: '#/components/schemas/handler_TimeSensitivePattern'
                source:
                    description: Origin tag for the rule set; the handler returns "db".
                    type: string
            required:
                - patterns
                - source
        handler_timeSensitiveTestRequest:
            type: object
            description: Body for dry-running a prompt against the freshness rule set. The handler requires a non-empty prompt.
            properties:
                prompt:
                    description: The prompt text to test against the active rules. Required.
                    type: string
                language:
                    description: Optional language hint for the prompt.
                    type: string
            required:
                - prompt
            example:
                prompt: what is the stock price of ACME today?
                language: en
        handler_timeSensitiveTestResponse:
            type: object
            description: Result of dry-running a prompt against the freshness rule set.
            properties:
                decision:
                    description: Whether a rule fired; the handler returns "match" or "no_match".
                    type: string
                matchedRuleId:
                    description: Id of the rule that fired, or null when no rule matched.
                    type:
                        - string
                        - "null"
                matchedKeywords:
                    description: Keywords from the matched rule that were found in the prompt.
                    type: array
                    items:
                        type: string
            required:
                - decision
                - matchedKeywords
            example:
                decision: match
                matchedRuleId: stock-price
                matchedKeywords:
                    - stock price
