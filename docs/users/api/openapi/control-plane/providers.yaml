                                    description: Optional adapter-specific API version.
                                region:
                                    type: string
                                    description: Optional provider region.
                                enabled:
                                    type:
                                        - boolean
                                        - "null"
                                    description: Whether the provider is active. Defaults to true when omitted.
                                headers:
                                    description: Optional arbitrary JSON of extra upstream headers.
                                models:
                                    type: array
                                    description: Optional inline models to create alongside the provider.
