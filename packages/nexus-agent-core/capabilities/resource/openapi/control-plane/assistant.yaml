# Generated by `nexus openapi-gen` from control-plane source. DO NOT hand-edit
# structural fields (paths/verbs/types) — they are overwritten on regen. The
# openapi-review skill enriches descriptions/examples/enums in place.
openapi: 3.1.0
info:
    title: Nexus Control Plane Admin API — assistant
    version: dev
    description: 'Generated from control-plane source by openapigen. Structural draft: field names, types, optionality, status codes and IAM tiers are code-derived; enum value sets and required-field rules enforced imperatively in handlers are filled in by the openapi-review skill.'
paths:
    /api/admin/assistant/sessions/{id}/chat:
        post:
            operationId: startChat
            summary: Start an assistant turn (command/data-stream split)
            description: >-
                Starts one web-assistant ("Chat with Nexus") agent turn for the session
                and returns 202 immediately; the turn runs DETACHED server-side and its
                work is observed over `GET .../sessions/{id}/stream`. The session `id` is
                a client-supplied path param — a fresh id starts a new conversation, an
                owned id continues it. Only `message` is required; `model` (validated
                against the backend allow-list) overrides the default. A second chat
                while a turn is already in flight for the same session is rejected 409
                (turn_in_progress) — the server-side half of the "no new command while
                one is running" rule. Requires an interactive bearer admin session —
                API-key / service principals are rejected (422) — AND the
                `admin:assistant.write` IAM action (403 otherwise); inference (and the
                system-VK spend it incurs) happens before any tool runs, so the surface
                itself is IAM-gated. Each tool the agent runs is additionally IAM-checked
                at the admin API it self-calls under the caller's own bearer (defense in
                depth).
            x-nexus-tier: confirm
            parameters:
                - name: id
                  in: path
                  required: true
                  schema:
                      type: string
                  description: Client-supplied session id (resolved only within the caller's own namespace).
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                message:
                                    type: string
                                    description: User turn text. Rejected with 400 if blank.
                                model:
                                    type: string
                                    description: Optional. Client-chosen model, bounded by the backend allow-list; blank or unknown falls back to the default.
                            required:
                                - message
                        example:
                            message: Which routing rules are currently disabled?
                            model: claude-sonnet-4-6
            responses:
                "202":
                    description: Turn accepted and started; observe it over the stream endpoint.
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    sessionId:
                                        type: string
                            example:
                                sessionId: sess_8fa1
                "400":
                    description: validation_error — message is empty or the session id is invalid.
                "409":
                    description: turn_in_progress — a turn is already running for this session.
                "422":
                    description: unsupported_auth — the principal is not an interactive bearer admin session.
                "503":
                    description: unavailable — no system virtual key is configured for inference.
    /api/admin/assistant/sessions/{id}/stream:
        get:
            operationId: streamSession
            summary: Observe an assistant turn (SSE, reconnectable)
            description: >-
                Long-lived Server-Sent Events stream for the session's turn. Attaches to
                the turn's event bus and streams its work; pass `lastSeq` to reconnect
                across a transient drop and replay only events newer than that seq (each
                SSE frame carries an `id:` = the per-session seq). The turn keeps running
                server-side while disconnected, so a reconnect resumes it; a disconnect
                with no reconnect within the grace window cancels the turn. Login-only,
                bearer admin session required (422 otherwise).
            x-nexus-tier: auto
            parameters:
                - name: id
                  in: path
                  required: true
                  schema:
                      type: string
                  description: The session id whose turn to observe.
                - name: lastSeq
                  in: query
                  required: false
                  schema:
                      type: integer
                  description: Reconnect cursor — replay only events with seq greater than this.
            responses:
                "200":
                    description: >-
                        SSE stream (text/event-stream). Each frame carries `id:` (seq).
                        Events: `text` {delta}, `reasoning` {delta}, `tool_start`
                        {name,input}, `tool_end` {name,isError}, `usage` (context stats),
                        `confirm` {callId,sessionId,tool,input,reason,prod,preview?},
                        `navigate` (routing directive), `file` {id,downloadPath}
                        (a write_file result — render a download link without waiting
                        for the model to echo the URL), `gap` (history truncated on a
                        long reconnect), `error` {code,message}, `turn_aborted`
                        {sessionId} (stopped — not an error), and a terminal `done`
                        {sessionId}.
                    content:
                        text/event-stream:
                            schema:
                                type: string
                            example: |
                                id: 1
                                event: text
                                data: {"delta":"Checking routing rules…"}

                                id: 2
                                event: done
                                data: {"sessionId":"sess_8fa1"}
                "400":
                    description: validation_error — the session id is invalid.
                "404":
                    description: not_found — no active session stream (turn never started or already reclaimed).
                "422":
                    description: unsupported_auth — the principal is not an interactive bearer admin session.
    /api/admin/assistant/sessions/{id}/interrupt:
        post:
            operationId: interruptSession
            summary: Stop an in-flight assistant turn
            description: >-
                Cancels the in-flight turn for the session (the Stop button, or a
                deliberate popup close). The detached turn does not stop merely because
                its stream closed, so this is how billing is cut promptly. Login-only,
                bearer admin session required (422 otherwise).
            x-nexus-tier: confirm
            parameters:
                - name: id
                  in: path
                  required: true
                  schema:
                      type: string
                  description: The session id whose turn to stop.
            responses:
                "204":
                    description: The in-flight turn was stopped.
                "400":
                    description: validation_error — the session id is invalid.
                "409":
                    description: not_running — no in-flight turn to stop for this session.
                "422":
                    description: unsupported_auth — the principal is not an interactive bearer admin session.
    /api/admin/assistant/confirm:
        post:
            operationId: confirm
            summary: Resolve a parked confirm-tier action
            description: >-
                Delivers the operator's Allow/Deny for a confirm-tier tool parked by an
                in-flight chat turn (the `confirm` SSE event carries the callId). The
                decision is consumed once. On a production instance an Allow with no
                `challengeToken` does not execute: the backend mints a one-time token
                and returns it; the client must POST a second Allow echoing that token.
                The key is bound to the caller's userId, so one principal cannot resolve
                another's parked write.
            x-nexus-tier: confirm
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                sessionId:
                                    type: string
                                    description: Session of the parked call.
                                callId:
                                    type: string
                                    description: Identifier delivered in the `confirm` SSE event.
                                decision:
                                    type: boolean
                                    description: true = Allow, false = Deny. An absent field binds to false (deny) and is not rejected.
                                challengeToken:
                                    type: string
                                    description: Optional. The prod second-confirm token returned by the first Allow.
                            required:
                                - sessionId
                                - callId
                        example:
                            sessionId: sess_8fa1
                            callId: a1b2c3d4
                            decision: true
            responses:
                "200":
                    description: Resolved, or (prod first Allow) a one-time challenge token issued.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            examples:
                                resolved:
                                    value:
                                        ok: true
                                prodChallenge:
                                    value:
                                        ok: true
                                        secondConfirmRequired: true
                                        challengeToken: f3a9c1e0
                "400":
                    description: validation_error — sessionId or callId missing.
                "409":
                    description: >-
                        invalid_challenge (bad or missing prod token); restart_reissue
                        (NFR-10 — the pod that parked this confirm restarted, so re-issue
                        the action); or expired (no pending confirm — already answered or
                        timed out).
                "421":
                    description: wrong_owner — the parked confirm lives on another CP instance (multi-replica affinity miss); retry at the session owner.
    /api/admin/assistant/files/{id}:
        get:
            operationId: downloadFile
            summary: Download an owned sandbox file
            description: >-
                CP-proxied stream of one of the caller's assistant sandbox files, with
                an owner re-check. No transferable pre-signed URL is exposed — the bytes
                are relayed through the Control Plane.
            x-nexus-tier: auto
            parameters:
                - name: id
                  description: The session or file id (must be owned by the calling user).
                  in: path
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    description: File bytes. Content-Type is the stored type; Content-Disposition is an attachment with the original filename.
                    content:
                        application/octet-stream:
                            schema:
                                type: string
                                format: binary
                "400":
                    description: validation_error — file id missing.
                "404":
                    description: not_found — file missing or not owned by the caller.
                "410":
                    description: expired — the file's content has been reaped.
                "422":
                    description: unsupported_auth — non-bearer principal.
                "503":
                    description: unavailable — the file sandbox is not configured.
    /api/admin/assistant/models:
        get:
            operationId: listModels
            summary: List selectable assistant models
            description: >-
                Returns the default inference model and the selectable models,
                filtered to those the system virtual key can actually reach (the
                gateway's VK-scoped model list). Each selectable model carries its
                bare code plus a display label and the owning provider's name,
                sourced from the chat-model catalog (the Model⋈Provider join), so the
                picker can group by provider and show friendly labels. A selectable
                code with no catalog row still appears, labelled by its own code with
                an empty provider. Fails open to the configured default (auto mode) or
                the static allow-list (explicit mode) when the gateway or catalog
                cannot be queried.
            x-nexus-tier: auto
            responses:
                "200":
                    description: The default model and the selectable model set.
                    content:
                        application/json:
                            schema:
                                type: object
                                required:
                                    - default
                                    - models
                                properties:
                                    default:
                                        type: string
                                        description: >-
                                            The pre-selected model code. The configured
                                            default when it is itself selectable,
                                            otherwise the preference-ranked best of the
                                            selectable set.
                                    models:
                                        type: array
                                        items:
                                            type: object
                                            required:
                                                - code
                                                - label
                                                - provider
                                            properties:
                                                code:
                                                    type: string
                                                    description: >-
                                                        The model code sent in the chat
                                                        request body. Stable identifier.
                                                label:
                                                    type: string
                                                    description: >-
                                                        Display label from the catalog
                                                        (Model.name); falls back to the
                                                        code when the catalog has no row.
                                                provider:
                                                    type: string
                                                    description: >-
                                                        Owning provider's display name
                                                        (Provider.name) for grouping;
                                                        empty when the catalog has no row.
                                example:
                                    default: claude-sonnet-4-6
                                    models:
                                        - code: claude-sonnet-4-6
                                          label: Claude Sonnet 4.6
                                          provider: Anthropic
                                        - code: gpt-5
                                          label: GPT-5
                                          provider: OpenAI
    /api/admin/assistant/sessions:
        get:
            operationId: listSessions
            summary: List the caller's sessions
            description: >-
                The caller's own conversation sessions (metadata only), newest first.
                userId-scoped. Returns an empty list when session persistence is not
                configured.
            x-nexus-tier: auto
            responses:
                "200":
                    description: The caller's sessions, newest first.
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    sessions:
                                        type: array
                                        items:
                                            type: object
                                            properties:
                                                id:
                                                    type: string
                                                title:
                                                    type: string
                                                updatedAt:
                                                    type: string
                            example:
                                sessions:
                                    - id: sess_8fa1
                                      title: Routing audit
                                      updatedAt: "2026-06-02T10:15:00Z"
                "500":
                    description: list_failed — the session store could not be read.
    /api/admin/assistant/sessions/{id}:
        get:
            operationId: getSession
            summary: Get a session transcript
            description: >-
                One owned conversation as a flat role + text transcript for re-rendering
                in the widget, plus the trusted-audit verdict for its revision chain.
                userId-scoped (a non-owned or missing id is 404); tool-only and empty
                turns are omitted. A `kind: summary` message is the auto-compact
                condensed briefing (system-authored context, not operator input).
            x-nexus-tier: auto
            parameters:
                - name: id
                  description: The session or file id (must be owned by the calling user).
                  in: path
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    description: The session id, its ordered role + text messages, and the chain verdict.
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    id:
                                        type: string
                                    messages:
                                        type: array
                                        items:
                                            type: object
                                            properties:
                                                role:
                                                    type: string
                                                    enum:
                                                        - user
                                                        - assistant
                                                text:
                                                    type: string
                                                kind:
                                                    type: string
                                                    enum:
                                                        - summary
                                                    description: Present only on the auto-compact condensed-briefing message.
                                    integrity:
                                        type: object
                                        description: >-
                                            The trusted-audit verdict for the session's hash-chained
                                            revision log, verified on every load. A broken chain is
                                            served WITH the break named (never silently) and durably
                                            stamped on the session row.
                                        properties:
                                            status:
                                                type: string
                                                enum:
                                                    - verified
                                                    - unchained
                                                    - chain_broken
                                                    - content_mismatch
                                            detail:
                                                type: string
                            example:
                                id: sess_8fa1
                                messages:
                                    - role: user
                                      text: Which rules are off?
                                    - role: assistant
                                      text: Two routing rules are disabled.
                                integrity:
                                    status: verified
                "400":
                    description: validation_error — session id missing.
                "404":
                    description: not_found — session missing or not owned.
                "503":
                    description: unavailable — session persistence is not configured.
        delete:
            operationId: deleteSession
            summary: Delete an owned session
            description: >-
                Removes one of the caller's sessions (the metadata row plus the spilled
                transcript). A missing or non-owned id is a 404 — the userId scope makes
                the two cases indistinguishable.
            x-nexus-tier: confirm
            parameters:
                - name: id
                  description: The session or file id (must be owned by the calling user).
                  in: path
                  required: true
                  schema:
                    type: string
            responses:
                "204":
                    description: No Content — the session was deleted.
                "400":
                    description: validation_error — session id missing.
                "404":
                    description: not_found — session missing or not owned.
                "503":
                    description: unavailable — session persistence is not configured.
