paths:
    /api/admin/api-keys:
        get:
            operationId: listAPIKeys
            summary: List admin API keys
            description: |-
                Returns admin API keys (hashes are never exposed), capped at 1000 rows.
                When `ownerUserId` is supplied, only keys owned by that user are returned.
                When `scope=owned`, the filter is forced to the currently authenticated
                principal's key ID, overriding any `ownerUserId` value.
            x-nexus-iam-action: iam.ResourceApiKey.Action(iam.VerbRead)
            x-nexus-tier: auto
            parameters:
                - name: ownerUserId
                  in: query
                  description: Filter to keys owned by this user ID. Ignored when `scope=owned`.
                  required: false
                  schema:
                    type: string
                - name: scope
                  in: query
                  description: When set to `owned`, the result is filtered to keys owned by the authenticated principal.
                  required: false
                  schema:
                    type: string
            responses:
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                data:
                                    - id: ak_01H8X9...
                                      name: ci-deploy-key
                                      keyPrefix: nxk_a1b2c3d
                                      enabled: true
                                      status: active
                                      lastUsedAt: "2026-05-20T11:02:00Z"
                                      expiresAt: "2026-12-31T23:59:59Z"
                                      rotatedAt: null
                                      rotatedFromId: null
                                      createdBy: admin@example.com
                                      createdAt: "2026-01-15T09:00:00Z"
                                      ownerUserId: usr_01H8X9...
        post:
            operationId: createAPIKey
            summary: Create an admin API key
            description: |-
                Mints a new admin API key. The plaintext key value is returned exactly
                once in the response `key` field and is never retrievable afterwards.
                When `ownerUserId` is omitted and the caller is an admin user, the key
                is owned by the authenticated user. An invalid or empty `expiresAt` is
                treated as "no expiry" rather than rejected.
            x-nexus-iam-action: iam.ResourceApiKey.Action(iam.VerbCreate)
            x-nexus-tier: confirm
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                name:
                                    type: string
                                    description: Human-readable label for the key. Must be non-empty.
                                expiresAt:
                                    type: string
                                    description: Optional RFC3339 expiry timestamp. Empty or unparseable means no expiry.
                                ownerUserId:
                                    type:
                                        - string
                                        - "null"
                                    description: Owner user ID. Defaults to the authenticated admin user when omitted.
                            # `name` is the only field the handler enforces (rejects empty
                            # with 400). `expiresAt` is parsed leniently and never required.
                            required:
                                - name
                        example:
                            name: ci-deploy-key
                            expiresAt: "2026-12-31T23:59:59Z"
                            ownerUserId: usr_01H8X9...
            responses:
                "400":
                    description: Bad Request
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "201":
                    description: Created
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                id: ak_01H8X9...
                                name: ci-deploy-key
                                key: nxk_a1b2c3d4e5f6...
                                keyPrefix: nxk_a1b2c3d
                                ownerUserId: usr_01H8X9...
                                expiresAt: "2026-12-31T23:59:59Z"
                                createdAt: "2026-05-29T10:00:00Z"
    /api/admin/api-keys/{id}:
        get:
            operationId: getAPIKey
            summary: Get a single admin API key
            description: Returns one admin API key by ID (hash never exposed). Responds 404 when the key does not exist.
            x-nexus-iam-action: iam.ResourceApiKey.Action(iam.VerbRead)
            x-nexus-tier: auto
            parameters:
                - name: id
                  in: path
                  description: API key ID.
                  required: true
                  schema:
                    type: string
            responses:
                "404":
                    description: Not Found
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                data:
                                    id: ak_01H8X9...
                                    name: ci-deploy-key
                                    keyPrefix: nxk_a1b2c3d
                                    enabled: true
                                    status: active
                                    lastUsedAt: "2026-05-20T11:02:00Z"
                                    expiresAt: "2026-12-31T23:59:59Z"
                                    rotatedAt: null
                                    rotatedFromId: null
                                    createdBy: admin@example.com
                                    createdAt: "2026-01-15T09:00:00Z"
                                    ownerUserId: usr_01H8X9...
        patch:
            operationId: updateAPIKey
            summary: Update an admin API key
            description: |-
                Updates mutable fields of an admin API key. All fields are optional,
                but at least one effective change must be supplied or the request is
                rejected with 400 ("No valid fields to update"). An empty `name` is
                ignored; an empty or unparseable `expiresAt` is treated as no change.
            x-nexus-iam-action: iam.ResourceApiKey.Action(iam.VerbUpdate)
            x-nexus-tier: confirm
            parameters:
                - name: id
                  in: path
                  description: API key ID.
                  required: true
                  schema:
                    type: string
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                name:
                                    type:
                                        - string
                                        - "null"
                                    description: New label. Empty string is ignored (no change).
                                enabled:
                                    type:
                                        - boolean
                                        - "null"
                                    description: Enable or disable the key.
                                expiresAt:
                                    type:
                                        - string
                                        - "null"
                                    description: New RFC3339 expiry. Empty or unparseable is treated as no change.
                        example:
                            name: ci-deploy-key-renamed
                            enabled: false
                            expiresAt: "2027-01-31T23:59:59Z"
            responses:
                "400":
                    description: Bad Request
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                data:
                                    id: ak_01H8X9...
                                    name: ci-deploy-key-renamed
                                    keyPrefix: nxk_a1b2c3d
                                    enabled: false
                                    status: active
                                    expiresAt: "2027-01-31T23:59:59Z"
                                    ownerUserId: usr_01H8X9...
        delete:
            operationId: deleteAPIKey
            summary: Delete an admin API key
            description: |-
                Permanently deletes an admin API key. Responds 409 when the caller
                attempts to delete the very API key authenticating the current session
                (error code `SESSION_KEY_IN_USE`).
            x-nexus-iam-action: iam.ResourceApiKey.Action(iam.VerbDelete)
            x-nexus-tier: confirm
            parameters:
                - name: id
                  in: path
                  description: API key ID.
                  required: true
                  schema:
                    type: string
            responses:
                "409":
                    description: Conflict — cannot delete the API key used for the current session.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                deleted: true
                                id: ak_01H8X9...
    /api/admin/api-keys/{id}/regenerate:
        post:
            operationId: regenerateAPIKey
            summary: Regenerate an admin API key
            description: |-
                Issues fresh key material for an existing API key in place (same ID).
                The new plaintext value is returned exactly once and is never retrievable
                afterwards. Responds 404 when the key does not exist.
            x-nexus-iam-action: iam.ResourceApiKey.Action(iam.VerbUpdate)
            x-nexus-tier: confirm
            parameters:
                - name: id
                  in: path
                  description: API key ID to regenerate.
                  required: true
                  schema:
                    type: string
            responses:
                "404":
                    description: Not Found
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                id: ak_01H8X9...
                                key: nxk_z9y8x7w6...
                                keyPrefix: nxk_z9y8x7w
                                message: Key regenerated. Save this key — it will not be shown again.
    /api/admin/api-keys/{id}/retire:
        put:
            operationId: retireAPIKey
            summary: Retire (sunset or revoke) an admin API key
            description: |-
                Closes the rotation window or actively revokes a key. `targetStatus`
                selects `expired` (natural sunset, the default when omitted) or
                `unavailable` (active revocation / compromise). After this call the key
                is no longer accepted by the auth middleware. Responds 409 when retiring
                the key authenticating the current session (`SESSION_KEY_IN_USE`) or when
                the key is already in a terminal state (`ALREADY_RETIRED`).
            x-nexus-iam-action: iam.ResourceApiKey.Action(iam.VerbUpdate)
            x-nexus-tier: confirm
            parameters:
                - name: id
                  in: path
                  description: API key ID to retire.
                  required: true
                  schema:
                    type: string
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                targetStatus:
                                    type: string
                                    description: Target retirement state. Defaults to `expired` when omitted.
                                    # Handler validates against userstore.AdminAPIKeyStatusExpired
                                    # ("expired") and AdminAPIKeyStatusUnavailable ("unavailable").
                                    enum:
                                        - expired
                                        - unavailable
                            # Handler defaults an omitted/empty targetStatus to "expired",
                            # so the field is not strictly required.
            responses:
                "409":
                    description: Conflict — session key in use, or key already in a terminal state.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "400":
                    description: Bad Request — targetStatus is neither `expired` nor `unavailable`.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "404":
                    description: Not Found
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                data:
                                    id: ak_01H8X9...
                                    name: ci-deploy-key
                                    status: expired
                                    keyPrefix: nxk_a1b2c3d
    /api/admin/api-keys/{id}/rotate:
        post:
            operationId: rotateAPIKey
            summary: Rotate an admin API key
            description: |-
                Mints a successor key that inherits the predecessor's name and owner,
                flips the predecessor to `rotating`, and returns the successor's plaintext
                value exactly once. Both keys stay valid until the predecessor is retired.
                The optional `expiresAt` overrides the successor's expiry; when omitted the
                successor inherits the predecessor's expiry. Responds 400 on an unparseable
                `expiresAt`, 404 when the predecessor does not exist, and 409
                (`ROTATE_INVALID_STATE`) when the predecessor is not in `active` state.
            x-nexus-iam-action: iam.ResourceApiKey.Action(iam.VerbRotate)
            x-nexus-tier: confirm
            parameters:
                - name: id
                  in: path
                  description: Predecessor API key ID to rotate.
                  required: true
                  schema:
                    type: string
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                expiresAt:
                                    type: string
                                    description: Optional RFC3339 expiry for the successor. Inherits the predecessor's expiry when omitted.
                            # Handler swallows an empty body (all fields optional);
                            # expiresAt is not required.
                        example:
                            expiresAt: "2027-06-30T23:59:59Z"
            responses:
                "400":
                    description: Bad Request — expiresAt is not a valid RFC3339 timestamp.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "404":
                    description: Not Found — predecessor key does not exist.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "409":
                    description: Conflict — predecessor is not in `active` state.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "201":
                    description: Created
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                id: ak_02J9Y0...
                                key: nxk_n3w5uc6...
                                keyPrefix: nxk_n3w5uc6
                                expiresAt: "2027-06-30T23:59:59Z"
                                predecessor:
                                    id: ak_01H8X9...
                                    status: rotating
                                    rotatedAt: "2026-05-29T10:05:00Z"
                                message: Key rotated. The predecessor remains valid until you retire it. Save the new key — it will not be shown again.
