components:
    schemas:
        Severity:
            type: string
            description: Alert severity, canonical lowercase form.
            enum:
                - critical
                - high
                - medium
                - low
                - info
        SourceType:
            type: string
            description: Alert source domain (AllSourceTypes).
            enum:
                - quota
                - proxy
                - thing
                - provider
                - auth
                - system
        Error:
            type: object
            description: 'Uniform error envelope: {"error": "<message>"}.'
            properties:
                error:
                    type: string
        Alert:
            type: object
            description: A single fired alert instance.
            properties:
                id:
                    type: string
                ruleId:
                    type: string
                sourceType:
                    $ref: '#/components/schemas/SourceType'
                targetKey:
                    type: string
                targetLabel:
                    type: string
                severity:
                    $ref: '#/components/schemas/Severity'
                state:
                    type: string
                    enum:
                        - firing
                        - acknowledged
                        - resolved
                message:
                    type: string
                details:
                    type: object
                    additionalProperties: true
                firedAt:
                    type: string
                    format: date-time
                lastSeenAt:
                    type: string
                    format: date-time
                duplicateCount:
                    type: integer
                acknowledgedBy:
                    type: string
                    nullable: true
                acknowledgedAt:
                    type: string
                    format: date-time
                    nullable: true
                resolvedAt:
                    type: string
                    format: date-time
                    nullable: true
                resolvedBy:
                    type: string
                    nullable: true
                resolvedReason:
                    type: string
                    nullable: true
        Dispatch:
            type: object
            description: A single delivery attempt of an alert to a channel.
            properties:
                id:
                    type: string
                alertId:
                    type: string
                channelId:
                    type: string
                channelName:
                    type: string
                success:
                    type: boolean
                statusCode:
                    type: integer
                    nullable: true
                errorMsg:
                    type: string
                    nullable: true
                attemptedAt:
                    type: string
                    format: date-time
        AlertRule:
            type: object
            description: The configuration template governing when and how an alert fires.
            properties:
                id:
                    type: string
                displayName:
                    type: string
                sourceType:
                    $ref: '#/components/schemas/SourceType'
                defaultSeverity:
                    $ref: '#/components/schemas/Severity'
                requiresAck:
                    type: boolean
                enabled:
                    type: boolean
                params:
                    type: object
                    additionalProperties: true
                paramsSchema:
                    type: object
                    additionalProperties: true
                    description: JSON Schema validating the params blob.
                cooldownSec:
                    type: integer
                groupIdFilter:
                    type: string
                    nullable: true
                    description: NULL = fleet-wide; non-NULL binds the rule to that device group.
                createdAt:
                    type: string
                    format: date-time
                updatedAt:
                    type: string
                    format: date-time
        AlertRulePatch:
            type: object
            description: |-
                Partial alert-rule update. Every field is optional; omitted fields are
                preserved. Unknown fields are rejected (DisallowUnknownFields).
            properties:
                enabled:
                    type: boolean
                params:
                    type: object
                    additionalProperties: true
                    description: Validated against the rule's stored paramsSchema.
                cooldownSec:
                    type: integer
                requiresAck:
                    type: boolean
                defaultSeverity:
                    $ref: '#/components/schemas/Severity'
                displayName:
                    type: string
                groupIdFilter:
                    type: string
                    nullable: true
                    description: Empty string clears the filter (fleet-wide); non-empty binds to that device group.
        Channel:
            type: object
            description: A notification delivery target. Sensitive config values are masked in responses.
            properties:
                id:
                    type: string
                name:
                    type: string
                type:
                    type: string
                    description: 'Channel type. Senders registered in the Hub: webhook, slack, email, pagerduty. Not enum-validated at the create/update boundary; an unknown type only surfaces an error at channel-test time.'
                enabled:
                    type: boolean
                severities:
                    type: array
                    description: Per-channel severity allow-list. Empty means match all severities.
                    items:
                        $ref: '#/components/schemas/Severity'
                sourceTypes:
                    type: array
                    items:
                        type: string
                config:
                    type: object
                    additionalProperties: true
                createdAt:
                    type: string
                    format: date-time
                updatedAt:
                    type: string
                    format: date-time
        ChannelCreate:
            type: object
            description: Body for creating a channel. name and type are required and must be non-empty.
            required:
                - name
                - type
            properties:
                name:
                    type: string
                type:
                    type: string
                    description: 'Registered senders: webhook, slack, email, pagerduty.'
                enabled:
                    type: boolean
                severities:
                    type: array
                    description: Enum-validated per element; empty means match all.
                    items:
                        $ref: '#/components/schemas/Severity'
                sourceTypes:
                    type: array
                    items:
                        type: string
                config:
                    type: object
                    additionalProperties: true
        ChannelPatch:
            type: object
            description: |-
                Partial channel update. All fields optional; omitted fields are
                preserved. name/type, if present, must be non-empty. Masked secret
                values round-tripped unchanged are restored to their stored originals.
            properties:
                name:
                    type: string
                type:
                    type: string
                enabled:
                    type: boolean
                severities:
                    type: array
                    items:
                        $ref: '#/components/schemas/Severity'
                sourceTypes:
                    type: array
                    items:
                        type: string
                config:
                    type: object
                    additionalProperties: true
