                    application/json:
                        schema:
                            type: object
                            properties:
                                code:
                                    type: string
                                    description: Customer-facing identifier. Defaults to providerModelId when omitted.
                                name:
                                    type: string
                                    description: Display name.
                                description:
                                    type: string
                                    description: Optional free-text description.
                                providerModelId:
                                    type: string
                                    description: Upstream model id. Defaults to name when omitted.
                                type:
