            summary: List agent users
            description: |-
                Returns the paginated set of agent users — NexusUser rows whose
                canAccessControlPlane flag is false (end users running the agent,
                as opposed to Control Plane admins). The optional `q` parameter
                filters by a free-text search term; the optional `enabled`
                parameter filters by activation state, mapping `true` to status
                `active` and `false` to any non-active status. The response
                carries the matched users in `data` and the unfiltered match
                count in `total`.
