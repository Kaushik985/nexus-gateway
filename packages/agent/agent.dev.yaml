# Local dev overrides for agent.
# Note: `nexus-agent run` exits at the enrollment check unless the
# device cert exists. Use `nexus-agent enroll --hub-url ...` first.
#
# Cert/audit/log paths default to platform.DefaultPaths(); override
# below when running uninstalled out of the source tree.

log:
  # YAML is the boot baseline. The agent has no log_level shadow key; the
  # level is raised live to debug only while an admin opens a diagnostic-mode
  # window (config_key: diag_mode) and auto-restores to this baseline when the
  # window ends. See docs/developers/architecture/cross-cutting/observability/diag-event-triage-architecture.md.
  level: "info"
  format: "text"
  file: "logs/agent.log"
  stackOnError: true

hubURL: "ws://localhost:3060/ws"
hubHTTPURL: "http://localhost:3060"

deviceID: ""
# Keep dev certs inside the working tree so multiple devs/branches
# don't fight over /Library/Application Support permissions.
certFile: ".nexus-agent/device.pem"
keyFile: ".nexus-agent/device-key.pem"
caCertFile: ".nexus-agent/gateway-ca.pem"
platformBridgeAddress: "127.0.0.1:19080"

auditDBPath: ".nexus-agent/audit.db"
# heartbeatIntervalSec + auditDrainIntervalSec are local-yaml-only — there
# is no shadow config key for them, and CP strips them from agent_settings
# on PUT. Changing them requires editing this file + restarting the agent.
heartbeatIntervalSec: 60
auditDrainIntervalSec: 30
auditBatchSize: 200
auditRetentionDays: 30

# defaultAction is the agent's local policy fallback when nothing matches.
# The retired policy_rules shadow key was deleted in PR-0 with no live
# publisher; admin-pushed inspection now flows through interception_domains
# alone. See docs/developers/architecture/cross-cutting/foundation/configuration-architecture-migration.md.
defaultAction: "passthrough"

# upstreamProxy (optional): route the MITM upstream forward through an egress
# proxy. The agent still intercepts + inspects every flow; only the final hop
# to the AI provider goes via the proxy. Use where direct provider egress is
# blocked and a local proxy (corporate egress / circumvention client) is the
# only working path. Schemes: socks5:// (also socks5h://) or http://.
# Empty / unset = direct egress (default).
# upstreamProxy: "socks5://127.0.0.1:10808"

updaterEnabled: false
updaterCheckSec: 3600

quitAllowed: true

# exemption* fields below are shadow-overridable via Hub admin UI (config_key:
# exemptions); YAML is the boot default only. See docs/developers/architecture/cross-cutting/foundation/thing-model.md §5.1.1.
exemptionEnabled: true
exemptionFailureThreshold: 3
exemptionWindowSec: 3600
exemptionDurationSec: 86400
exemptionAllowlist: []
exemptionDenylist: []

otelEnabled: false
otelEndpoint: "http://localhost:4318"
otelServiceName: "nexus-agent"
otelSamplingRate: 1.0
