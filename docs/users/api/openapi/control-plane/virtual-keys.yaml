                                type: object
                                additionalProperties: {}
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "201":
                    description: |-
                        Created. The `key` field carries the raw secret and is returned only
                        on this response — store it now, it cannot be retrieved later.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                                properties:
                                    id:
                                        type: string
                                    name:
                                        type: string
                                    keyPrefix:
                                        type: string
                                    key:
                                        type: string
                                        description: The raw virtual key secret, shown only once on creation.
                            example:
                                id: 6f1c2e8a-7b3d-4f9a-9c11-2a4b6c8d0e21
                                name: production-app
                                keyPrefix: nvk_a1b2c3d4
                                projectId: 1f0b9c2d-3e4f-5061-7283-94a5b6c7d8e9
                                enabled: true
                                allowedModels:
                                    - gpt-4o
                                key: nvk_a1b2c3d4e5f60718293a4b5c6d7e8f90a1b2c3d4e5f60718293a4b5c6d7e8f90
                                createdAt: 2026-01-15T08:30:00Z
                                updatedAt: 2026-01-15T08:30:00Z
    /api/admin/virtual-keys/{id}:
        get:
            operationId: getVirtualKey
            summary: Get a virtual key
            description: |-
                Returns a single virtual key by id. The stored secret is never returned;
                only the hash and prefix are present. Non-super-admin callers may only read
                keys they own and receive 403 otherwise.
            x-nexus-iam-action: iam.ResourceVirtualKey.Action(iam.VerbRead)
            x-nexus-tier: auto
            parameters:
                - name: id
                  in: path
                  description: Virtual key id.
                  required: true
                  schema:
                    type: string
            responses:
                "404":
                    description: Not Found
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "403":
                    description: Forbidden
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/vkstore_VirtualKey'
        put:
            operationId: updateVirtualKey
            summary: Update a virtual key
            description: |-
                Updates mutable fields of a virtual key. All body fields are optional;
                omitted fields are left unchanged. A null `expiresAt` clears the expiry,
                while omitting it leaves the current expiry intact. Non-super-admin callers
                may only update keys they own. The data plane cache is invalidated so the
                change takes effect immediately.
            x-nexus-iam-action: iam.ResourceVirtualKey.Action(iam.VerbUpdate)
            x-nexus-tier: confirm
            parameters:
                - name: id
                  in: path
                  description: Virtual key id.
                  required: true
                  schema:
                    type: string
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                projectId:
                                    type:
                                        - string
                                        - "null"
                                    description: Owning project.
                                sourceApp:
                                    type:
                                        - string
                                        - "null"
                                    description: Optional label identifying the calling application.
                                enabled:
                                    type:
                                        - boolean
                                        - "null"
                                    description: Whether the key is enabled.
                                rateLimitRpm:
                                    type:
                                        - integer
                                        - "null"
                                    description: Per-key request-per-minute limit.
                                compareEndpointRateLimitRpm:
                                    type:
                                        - integer
                                        - "null"
                                    description: Per-minute request limit for the compare endpoint.
                                allowedModels:
                                    description: Allowed-model allowlist as a JSON value. Left unchanged when omitted.
                                expiresAt:
                                    type:
                                        - string
                                        - "null"
                                    format: date-time
                                    description: Expiry timestamp. Omit to leave unchanged; pass null to clear.
                        example:
                            enabled: false
                            rateLimitRpm: 120
                            allowedModels:
                                - gpt-4o
            responses:
                "404":
                    description: Not Found
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "403":
                    description: Forbidden
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "400":
                    description: Bad Request
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/vkstore_VirtualKey'
        delete:
            operationId: deleteVirtualKey
            summary: Delete a virtual key
            description: |-
                Permanently deletes a virtual key and invalidates it on the data plane.
                Non-super-admin callers may only delete keys they own.
            x-nexus-iam-action: iam.ResourceVirtualKey.Action(iam.VerbDelete)
