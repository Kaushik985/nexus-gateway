# Hand-maintained OpenAPI spec, verified claim-by-claim against the control-plane
# handler code (the single source of truth) via the openapi-review skill. Keep
# structural fields (paths/verbs/types) in lockstep with the handlers.
openapi: 3.1.0
info:
    title: Nexus Control Plane Admin API — ops-metrics
    version: dev
    description: 'Hand-maintained against control-plane source: field names, types, optionality, status codes and IAM tiers mirror the handler code; enum value sets and required-field rules enforced imperatively in handlers are verified by the openapi-review skill.'
paths:
    /api/admin/ops-metrics/current:
        get:
            operationId: opsMetricsCurrent
            summary: Read latest ops-metrics sample per node and metric
            description: |-
                Returns the latest operational-metric sample for each (node, metric name, dimension)
                tuple observed within the recent freshness window, optionally filtered by node type and
                node id. Reads the shared metric_ops_* tables directly. Returns 503 when the database is
                not configured.
            x-nexus-iam-action: iam.ResourceObservability.Action(iam.VerbRead)
            x-nexus-tier: auto
            parameters:
                - name: nodeType
                  in: query
                  required: false
                  description: |-
                    Optional node-type filter. When supplied, the handler rejects any value outside the
                    allowed set with a 400 validation error.
                  schema:
                    type: string
                    enum:
                        - service
                        - agent
                        - control-plane
                        - ai-gateway
                        - compliance-proxy
                        - nexus-hub
                - name: nodeId
                  in: query
                  required: false
                  description: Optional node-id filter; restricts the result to a single node.
                  schema:
                    type: string
            responses:
                "503":
                    description: Service Unavailable — database is not configured.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "400":
                    description: Bad Request — nodeType is not one of the allowed node types.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "500":
                    description: Internal Server Error — failed to read ops metrics.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: OK — latest sample list under a data array.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                data:
                                    - sampledAt: "2026-01-01T00:00:00Z"
                                      nodeId: cp-01
                                      nodeType: control-plane
                                      metricName: cpu_pct
                                      metricKind: gauge
                                      dimensionKey: ""
                                      value: 12.5
    /api/admin/ops-metrics/fleet:
        get:
            operationId: opsMetricsFleet
            summary: Read fleet-aggregate ops-metrics time series
            description: |-
                Returns the fleet-aggregate (node-id-null) rollup bucket series for one metric over the
                requested time range, used by the fleet rollup view. nodeType and metric are required;
                the time range is bounded by from/to. Granularity defaults to an auto-pick over the
                range, then is constrained to a fleet-supported rollup granularity. Returns 503 when the
                database is not configured.
            x-nexus-iam-action: iam.ResourceObservability.Action(iam.VerbRead)
            x-nexus-tier: auto
            parameters:
                - name: nodeType
                  in: query
                  required: false
                  description: Required node-type whose fleet aggregate is read; a missing value yields a 400.
                  schema:
                    type: string
                - name: metric
                  in: query
                  required: false
                  description: Required metric name to aggregate across the fleet; a missing value yields a 400.
                  schema:
                    type: string
                - name: granularity
                  in: query
                  required: false
                  description: |-
                    Rollup bucket width. Empty or "auto" auto-picks over the from/to span (raw spans are
                    promoted to 1h, since there is no raw fleet aggregate). The resolved value must be a
                    fleet-supported rollup granularity; otherwise a 400 validation error is returned.
                  schema:
                    type: string
                    enum:
                        - auto
                        - 1h
                        - 1d
                        - 1mo
            responses:
                "503":
                    description: Service Unavailable — database is not configured.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "400":
                    description: Bad Request — missing nodeType/metric/from/to, or a granularity not in 1h|1d|1mo.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                default:
                    description: Unresolved status
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "500":
                    description: Internal Server Error — failed to read fleet metrics.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: OK — fleet bucket series plus the resolved granularity.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                granularity: 1h
                                data:
                                    - bucketStart: "2026-01-01T00:00:00Z"
                                      nodeType: agent
                                      metricName: cpu_pct
                                      metricKind: gauge
                                      dimensionKey: ""
                                      valueAvg: 18.4
                                      sampleCount: 42
    /api/admin/ops-metrics/timeseries:
        get:
            operationId: opsMetricsTimeseries
            summary: Read time-bucketed ops-metrics series for one node and metric
            description: |-
                Returns a time-bucketed metric series for a single (nodeId, metric, optional dimension)
                tuple over the requested range. nodeId and metric are required and the range is bounded
                by from/to. Granularity defaults to an auto-pick over the from/to span. Returns 503 when
                the database is not configured. Query parameters are validated by the handler but are
                not yet emitted in this generated draft; see the description for the accepted set.
            x-nexus-iam-action: iam.ResourceObservability.Action(iam.VerbRead)
            x-nexus-tier: auto
            responses:
                "503":
                    description: Service Unavailable — database is not configured.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                default:
                    description: Unresolved status
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "500":
                    description: Internal Server Error — failed to read ops timeseries.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: OK — bucket series plus the resolved granularity.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                granularity: 1h
                                data:
                                    - bucketStart: "2026-01-01T00:00:00Z"
                                      nodeId: cp-01
                                      nodeType: control-plane
                                      metricName: cpu_pct
                                      metricKind: gauge
                                      dimensionKey: ""
                                      valueAvg: 12.5
                                      sampleCount: 60
