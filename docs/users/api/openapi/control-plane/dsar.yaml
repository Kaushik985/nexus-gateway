        put:
            operationId: updateDSAR
            summary: Update a DSAR request
            description: |-
                Updates the notes and/or status of an existing DSAR request.
                Status changes are constrained by an allowed transition map:
                PENDING may move to IN_PROGRESS or REJECTED; IN_PROGRESS may move
                to COMPLETED or REJECTED. An invalid transition returns 400.
                Omitting `status` leaves the status unchanged (notes-only update).
                Moving to COMPLETED or REJECTED stamps the completion time.
            x-nexus-iam-action: iam.ResourceDSAR.Action(iam.VerbUpdate)
