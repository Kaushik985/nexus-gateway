            operationId: updatePayloadCaptureConfig
            summary: Update payload-capture settings
            description: |-
                Merges the supplied fields into the persisted payload-capture
                config; omitted fields keep their existing value. The byte
                caps are clamped server-side: `maxInlineBodyBytes` to a 10 MiB
                ceiling and `maxRequestBytes` / `maxResponseBytes` to a 100 MiB
                ceiling, each with a non-negative floor that falls back to the
                default when cleared to zero. On success the payload-capture
                config is invalidated across the Compliance Proxy, AI Gateway,
                and agents, and the merged config is returned.
