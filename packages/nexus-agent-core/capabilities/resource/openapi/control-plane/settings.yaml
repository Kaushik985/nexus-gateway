        get:
            operationId: getDeviceAuthSettings
            summary: Read the device-auth mode and selectable options
            description: |-
                Returns the currently persisted device-auth `mode` (defaults
                to `mtls-only` when unset) plus the inputs the UI needs to
                decide which modes are selectable: `ssoConfigured` (at least
                one enabled non-local IdP), `ssoProviders` (the id/type/name
                of each such IdP), and `localLoginAvailable` (a local IdP row
                is enabled).
            x-nexus-iam-action: iam.ResourceSettings.Action(iam.VerbRead)
            x-nexus-tier: auto
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                mode: mtls-only
                                ssoConfigured: true
                                ssoProviders:
                                    - id: okta-prod
                                      type: oidc
                                      name: Okta (Production)
                                localLoginAvailable: true
        put:
            operationId: updateDeviceAuthSettings
            summary: Update the device-auth mode
            description: |-
                Sets the device-auth `mode`. Must be one of the closed set
                `mtls-only`, `enterprise-login`, `local-login`; any other
                value returns 400. `enterprise-login` requires at least one
                enabled non-local IdP, and `local-login` requires an enabled
                local IdP; otherwise the request is rejected. The `oidc`
                field is accepted but ignored (kept for backward
                compatibility). On success responds 200 with the same body
                shape as the GET.
            x-nexus-iam-action: iam.ResourceSettings.Action(iam.VerbUpdate)
            x-nexus-tier: confirm
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
