                                    description: Unique provider name; also the source of the URL path prefix.
                                displayName:
                                    type: string
                                    description: Human-friendly label. Defaults to name when omitted.
                                description:
                                    type: string
                                    description: Optional free-text description.
                                baseUrl:
                                    type: string
                                    description: Upstream provider base URL.
                                adapterType:
                                    type: string
                                    description: Wire-format adapter slug (case-sensitive, lowercase).
                                    enum:
