paths:
    /api/admin/provider-health:
        get:
            operationId: listProviderHealth
            summary: List provider health status
            description: |
                Returns the latest provider health record for every upstream AI provider, ordered by provider name. Each record is produced by the Hub provider-health rollup job, which aggregates recent `traffic_event` rows per provider into a rolling error rate, average latency, and sample count. The `status` field is derived from the rolling error rate: `healthy` below the degraded threshold, `degraded` above it, and `unavailable` above the unavailable threshold. Read-only.
