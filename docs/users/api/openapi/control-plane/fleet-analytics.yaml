paths:
    /api/admin/fleet-analytics/summary:
        get:
            operationId: fleetAnalyticsSummary
            summary: Get fleet health summary
            description: |-
                Returns the current agent fleet health snapshot computed from the thing
                table for things of type agent. Counts cover the whole fleet excluding
                revoked things (total), and classify each online thing by last-seen
                freshness: active (seen within the last 5 minutes), stale (seen between
                5 and 15 minutes ago), and critical (last seen more than 15 minutes ago).
                revoked counts revoked things separately. stalePct and criticalPct are
                the stale and critical counts as whole-number percentages of total (0
                when total is 0).
            x-nexus-iam-action: iam.ResourceAgentDevice.Action(iam.VerbRead)
            x-nexus-tier: auto
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/agentstore_AgentFleetHealth'
                            example:
                                total: 128
                                active: 110
                                stale: 9
                                critical: 9
                                revoked: 4
                                stalePct: 7
                                criticalPct: 7
    /api/admin/fleet-analytics/top-destinations:
        get:
            operationId: fleetAnalyticsTopDest
            summary: Get top agent destination hosts
            description: |-
                Returns the top destination hosts seen across agent traffic over the
                last 24 hours, ranked by request count and capped at the top 50 hosts.
                Each entry reports the destination host, the total event (request)
                count, and the number of distinct devices that contacted that host.
                Results are wrapped in a data array; when no rollup data is available
                the data array is empty.
            x-nexus-iam-action: iam.ResourceAgentDevice.Action(iam.VerbRead)
            x-nexus-tier: auto
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                data:
                                    - destHost: api.openai.com
                                      eventCount: 4210
                                      deviceCount: 87
                                    - destHost: api.anthropic.com
                                      eventCount: 1980
                                      deviceCount: 52
    /api/admin/fleet-analytics/trends:
        get:
            operationId: fleetAnalyticsTrends
            summary: Get fleet metric trend buckets
            description: |-
                Returns hourly metric rollup buckets for the requested metric over the
                most recent window (up to 168 buckets, i.e. the last 7 days). The
                response echoes the resolved metric name and a buckets array, each
                bucket carrying its bucket-start timestamp, dimension key, and value.
                Buckets are returned newest-first.
            x-nexus-iam-action: iam.ResourceAgentDevice.Action(iam.VerbRead)
            x-nexus-tier: auto
            parameters:
                - name: metric
                  in: query
                  required: false
                  description: |-
                    Name of the rolled-up metric to return trend buckets for. When
                    omitted or empty, defaults to device_fleet_status.
                  schema:
                    type: string
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                metric: device_fleet_status
                                buckets:
                                    - bucketStart: "2026-05-29T10:00:00Z"
                                      dimensions: status=active
                                      value: 110
                                    - bucketStart: "2026-05-29T09:00:00Z"
                                      dimensions: status=active
                                      value: 108
