                                total: 1
        post:
            operationId: createProvider
            summary: Create an AI provider
            description: |-
                Creates a provider plus, optionally, its inline models and a single
                credential in one atomic transaction. A duplicate provider name, path
                prefix, credential name, model code, or per-provider model natural key
                rolls back the entire create. The path prefix is derived from the
                provider name ("/" + name). displayName defaults to name when omitted;
                enabled defaults to true; a credential is only created when
                credential.apiKey is non-empty (and then credential.name is required).
            x-nexus-iam-action: iam.ResourceProvider.Action(iam.VerbCreate)
