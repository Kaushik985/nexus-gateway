            parameters:
                - name: id
                  in: path
                  required: true
                  description: Organization ID.
                  schema:
                    type: string
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                name:
                                    type:
                                        - string
                                        - "null"
                                    description: New display name.
                                code:
                                    type:
                                        - string
                                        - "null"
                                    description: New short unique code.
                                parentId:
                                    type:
                                        - string
                                        - "null"
                                    description: New parent organization ID; null re-roots the org.
                                description:
                                    type:
                                        - string
                                        - "null"
                                contactName:
                                    type:
                                        - string
                                        - "null"
                                contactEmail:
                                    type:
                                        - string
                                        - "null"
                                contactPhone:
                                    type:
                                        - string
                                        - "null"
                                enabled:
                                    type:
                                        - boolean
                                        - "null"
                                    description: Enable or disable the organization.
                                timezone:
                                    type:
                                        - string
                                        - "null"
                                    description: IANA timezone name; validated via the system tz database when non-empty.
                        example:
                            name: Acme Corporation
                            enabled: false
                            timezone: Europe/London
            responses:
                "400":
                    description: Bad Request — invalid body, or `timezone` is not a valid IANA timezone name.
