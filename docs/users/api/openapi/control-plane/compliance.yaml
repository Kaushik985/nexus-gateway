                            schema:
                                $ref: '#/components/schemas/compliancestore_ComplianceDashboardData'
    /api/admin/compliance/overview/export:
        get:
            operationId: complianceOverviewExport
            summary: Export compliance events as CSV
            description: |-
                Streams compliance events from all three enforcement layers (ai-gateway,
                compliance-proxy, agent) as a CSV attachment, capped at 50000 rows. The handler
                reads an optional startTime/endTime (RFC3339) time window from the query string
                and defaults to the last 24 hours when omitted. On success it returns a
                text/csv attachment rather than a JSON body.
            x-nexus-iam-action: iam.ResourceComplianceReport.Action(iam.VerbRead)
            x-nexus-tier: auto
            responses:
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
    /api/admin/compliance/report:
        get:
            operationId: complianceReport
            summary: Get the compliance report summary
            description: |-
                Returns a compliance report for the requested window covering coverage
                percentage and breakdown, hook health totals by decision, and DSAR status
                counts (including those completed in the period). Both startTime and endTime
                are required RFC3339 timestamps and the window may not exceed 366 days.
            x-nexus-iam-action: iam.ResourceComplianceReport.Action(iam.VerbRead)
            x-nexus-tier: auto
            parameters:
                - name: startTime
                  in: query
                  description: Start of the reporting window (RFC3339). Required.
                  required: false
                  schema:
                    type: string
                    format: date-time
                - name: endTime
                  in: query
                  description: End of the reporting window (RFC3339). Required.
                  required: false
                  schema:
                    type: string
                    format: date-time
            responses:
                "400":
                    description: Bad Request
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                period:
                                    start: "2026-01-01T00:00:00Z"
                                    end: "2026-01-08T00:00:00Z"
                                coverage:
                                    coveragePercent: 98.5
                                    breakdown: {}
                                hookHealth:
                                    total: 1024
                                    byDecision:
                                        allow: 1000
                                        deny: 24
                                dsar:
                                    pending: 1
                                    inProgress: 0
                                    completed: 5
                                    rejected: 0
                                    completedInPeriod: 2
    /api/admin/compliance/trinity:
        get:
