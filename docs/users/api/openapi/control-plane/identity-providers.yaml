                that JIT-provisioned users inherit group membership at sign-in. The
                response is a `{ data, total }` envelope; `total` is the number of
                mappings returned. List rows eagerly include the resolved IamGroup name.
            x-nexus-iam-action: idp.Action(iam.VerbUpdate)
            x-nexus-tier: confirm
            parameters:
