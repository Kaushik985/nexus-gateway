                                    type: string
                                    description: Device authentication mode.
                                    enum:
                                        - mtls-only
                                        - enterprise-login
                                        - local-login
                                oidc:
                                    type: object
                                    description: Accepted but ignored (backward compatibility).
                                    additionalProperties: {}
                            required:
                                - mode
                        example:
                            mode: enterprise-login
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                mode: enterprise-login
                                ssoConfigured: true
                                ssoProviders:
                                    - id: okta-prod
                                      type: oidc
                                      name: Okta (Production)
                                localLoginAvailable: true
                "400":
                    description: Bad Request
                    content:
