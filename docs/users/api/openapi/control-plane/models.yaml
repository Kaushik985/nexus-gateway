paths:
    /api/admin/models:
        get:
            operationId: listModelsGrouped
            summary: List models grouped by provider
            description: |
                Returns the model catalog grouped by provider. Each group carries the
                provider plus its models. By default providers with no models are omitted;
                set `includeEmptyProviders=true` to include them. The optional `providerId`
                and `q` filters narrow the result. The response payload is an object with a
                `data` array of provider groups.
            x-nexus-iam-action: iam.ResourceModel.Action(iam.VerbRead)
            x-nexus-tier: auto
            parameters:
                - name: includeEmptyProviders
                  in: query
                  required: false
                  description: When the literal string `true`, include providers that have no models. Any other value is treated as false.
                  schema:
                    type: string
                - name: providerId
                  in: query
                  required: false
                  description: Restrict the result to models belonging to this provider id.
                  schema:
                    type: string
                - name: q
                  in: query
                  required: false
                  description: Free-text search term matched against model code/name.
                  schema:
                    type: string
            responses:
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                data:
                                    - provider:
                                        id: prov_openai
                                        name: OpenAI
                                      models:
                                        - id: mdl_01H8X
                                          code: gpt-4o
                                          name: GPT-4o
                                          type: chat
                                          status: active
                                          enabled: true
    /api/admin/models/{id}:
        get:
            operationId: getModel
            summary: Get a single model by id
            description: |
                Returns the full model record for the given id. Responds 404 when no model
                with that id exists.
            x-nexus-iam-action: iam.ResourceModel.Action(iam.VerbRead)
            x-nexus-tier: auto
            parameters:
                - name: id
                  in: path
                  required: true
                  description: The model id.
                  schema:
                    type: string
            responses:
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "404":
                    description: Not Found
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/modelstore_Model'
        put:
            operationId: updateModel
            summary: Update a model
            description: |
                Partial update of a model. Every field is optional; only the fields present
                in the body are applied (the handler binds pointers/slices and leaves
                omitted fields unchanged). On success the updated model is returned and the
                AI Gateway model config is invalidated so the change takes effect. Responds
                404 when the id does not exist and 400 on validation failure.

                Validation enforced by the handler:
                - `type`, when present, must be one of `chat`, `embedding`, `image`, `audio`.
                - `code`, when present, must not be an empty string.
                - `providerModelId`, when present, must not be an empty string.
                - `capabilityJson`, when present, must be a valid JSON object.
            x-nexus-iam-action: iam.ResourceModel.Action(iam.VerbUpdate)
            x-nexus-tier: confirm
            parameters:
                - name: id
                  in: path
                  required: true
                  description: The model id to update.
                  schema:
                    type: string
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                code:
                                    description: Model code (slug). When present, must not be an empty string.
                                    type:
                                        - string
                                        - "null"
                                providerModelId:
                                    description: Upstream provider model identifier. When present, must not be an empty string.
                                    type:
                                        - string
                                        - "null"
                                name:
                                    description: Human-readable model name.
                                    type:
                                        - string
                                        - "null"
                                description:
                                    description: Free-text model description.
                                    type:
                                        - string
                                        - "null"
                                type:
                                    description: 'Model category. When present, the handler validates it against the fixed set: chat, embedding, image, audio.'
                                    type:
                                        - string
                                        - "null"
                                    enum:
                                        - chat
                                        - embedding
                                        - image
                                        - audio
                                inputPricePerMillion:
                                    description: Price per million input tokens.
                                    type:
                                        - number
                                        - "null"
                                outputPricePerMillion:
                                    description: Price per million output tokens.
                                    type:
                                        - number
                                        - "null"
                                cachedInputReadPricePerMillion:
                                    description: Price per million cached-input read tokens.
                                    type:
                                        - number
                                        - "null"
                                cachedInputWritePricePerMillion:
                                    description: Price per million cached-input write tokens.
                                    type:
                                        - number
                                        - "null"
                                maxContextTokens:
                                    description: Maximum context window size in tokens.
                                    type:
                                        - integer
                                        - "null"
                                maxOutputTokens:
                                    description: Maximum number of output tokens.
                                    type:
                                        - integer
                                        - "null"
                                status:
                                    description: Lifecycle status of the model (stored as-is; not constrained by the handler).
                                    type:
                                        - string
                                        - "null"
                                deprecationDate:
                                    description: Date/time the model is scheduled for deprecation.
                                    type:
                                        - string
                                        - "null"
                                    format: date-time
                                replacedBy:
                                    description: Code of the model that replaces this one.
                                    type:
                                        - string
                                        - "null"
                                aliases:
                                    description: Alternate codes that resolve to this model.
                                    type: array
                                    items:
                                        type: string
                                enabled:
                                    description: Whether the model is enabled for routing.
                                    type:
                                        - boolean
                                        - "null"
                                features:
                                    description: Capability feature flags for the model.
                                    type: array
                                    items:
                                        type: string
                                capabilityJson:
                                    description: Arbitrary JSON object describing model capabilities. When present, must parse as a JSON object.
                        example:
                            name: GPT-4o (updated)
                            type: chat
                            inputPricePerMillion: 2.5
                            outputPricePerMillion: 10
                            enabled: true
                            aliases:
                                - gpt-4o-latest
                            features:
                                - tools
                                - vision
            responses:
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "404":
                    description: Not Found
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "400":
                    description: Bad Request
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/modelstore_Model'
        delete:
            operationId: deleteModel
            summary: Delete a model
            description: |
                Deletes the model with the given id. On success the AI Gateway model config
                is invalidated and a 204 with no body is returned. Responds 404 when the id
                does not exist.
            x-nexus-iam-action: iam.ResourceModel.Action(iam.VerbDelete)
            x-nexus-tier: confirm
            parameters:
                - name: id
                  in: path
                  required: true
                  description: The model id to delete.
                  schema:
                    type: string
            responses:
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "404":
                    description: Not Found
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "204":
                    description: No Content
    /api/admin/models/flat:
        get:
            operationId: listModelsFlat
            summary: List models as a flat paginated array
            description: |
                Returns models as a flat, paginated list (not grouped by provider). Supports
                free-text search and filtering by type, status, provider, and enabled state.
                The response is an object with a `data` array and a `total` count for
                pagination. Pagination is controlled by the standard limit/offset query
                params parsed from the request.
            x-nexus-iam-action: iam.ResourceModel.Action(iam.VerbRead)
            x-nexus-tier: auto
            parameters:
                - name: q
                  in: query
                  required: false
                  description: Free-text search term matched against model code/name.
                  schema:
                    type: string
                - name: type
                  in: query
                  required: false
                  description: Filter by model type.
                  schema:
                    type: string
                - name: status
                  in: query
                  required: false
                  description: Filter by lifecycle status.
                  schema:
                    type: string
                - name: providerId
                  in: query
                  required: false
                  description: Filter by owning provider id.
                  schema:
                    type: string
                - name: enabled
                  in: query
                  required: false
                  description: Filter by enabled state. The literal string `true` filters to enabled models, `false` to disabled; any other value applies no enabled filter.
                  schema:
                    type: string
            responses:
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                data:
                                    - id: mdl_01H8X
                                      code: gpt-4o
                                      name: GPT-4o
                                      providerId: prov_openai
                                      type: chat
                                      status: active
                                      enabled: true
                                total: 1
