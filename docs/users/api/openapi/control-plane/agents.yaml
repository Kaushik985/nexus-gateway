    /api/admin/agents/diagnostic-mode/bulk:
        post:
            operationId: bulkEnableDiagMode
            summary: Enable diagnostic mode for a fleet of nodes
            description: |-
                Resolves the supplied filter to a set of nodes (capped at 500; a wider
                match is rejected with 400), then enables diagnostic mode for each one,
                writing the `diag_mode` Hub override and recording a window row per node.
                Per-node outcomes are returned individually under `items` so partial
                failures are visible and the operator can retry the misses; `failed`
                counts the misses and `ok` is false when any node failed.

                The `until` timestamp must be RFC3339 and fall between 5 minutes and
                24 hours in the future. An empty filter (no `nodeIds`, `agentVersion`,
                or `os`) resolves to zero nodes and returns an empty result set.
            x-nexus-iam-action: iam.ResourceDiagnosticMode.Action(iam.VerbUpdate)
            x-nexus-tier: confirm
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/infra_bulkDiagModeRequest'
                        example:
                            filter:
                                os: darwin
                                agentVersion: 1.4.0
                            until: "2026-05-29T18:00:00Z"
                            reason: Fleet-wide upstream latency investigation
            responses:
                "503":
                    description: Service Unavailable
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "400":
                    description: Bad Request
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                default:
                    description: Unresolved status
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: Bulk enable completed. Per-node outcomes are under `items`; `failed` is 0 when all nodes succeeded.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/infra_bulkDiagModeResult'
                            example:
                                ok: true
                                total: 2
                                failed: 0
                                items:
                                    - nodeId: agent-7f3a
                                      ok: true
                                    - nodeId: agent-9b21
                                      ok: true
components:
    schemas:
        infra_bulkDiagModeItem:
            type: object
            description: Outcome of enabling diagnostic mode for a single node in a bulk request.
            properties:
                nodeId:
                    type: string
                    description: ID of the node this outcome refers to.
                ok:
                    type: boolean
                    description: True when diagnostic mode was successfully enabled for this node.
                error:
                    type: string
                    description: Failure reason, present only when `ok` is false (e.g. a Hub override write failure).
            required:
                - nodeId
                - ok
        infra_bulkDiagModeRequest:
            type: object
            description: Filter-driven request to enable diagnostic mode across a fleet of nodes.
            properties:
                filter:
                    type: object
                    description: Selects which nodes to enable. An empty filter resolves to zero nodes; a filter resolving to more than 500 nodes is rejected with 400.
                    properties:
                        nodeIds:
                            type: array
                            description: Explicit list of node IDs to target.
                            items:
                                type: string
                        agentVersion:
                            type: string
                            description: Restrict to nodes reporting this agent version.
                        os:
                            type: string
                            description: Restrict to nodes running this operating system.
                until:
                    type: string
                    format: date-time
                    description: RFC3339 window end. Must be between 5 minutes and 24 hours in the future.
                reason:
                    type: string
                    description: Optional operator-supplied reason recorded with each window.
            required:
                - until
        infra_bulkDiagModeResult:
            type: object
            description: Aggregate result of a bulk diagnostic-mode enable, with one entry per resolved node.
            properties:
                ok:
                    type: boolean
                    description: True only when every resolved node succeeded (i.e. `failed` is 0).
                total:
                    type: integer
                    description: Number of nodes the filter resolved to.
                items:
                    type: array
                    description: Per-node outcomes.
                    items:
                        $ref: '#/components/schemas/infra_bulkDiagModeItem'
                failed:
                    type: integer
                    description: Number of nodes that failed to enable.
            required:
                - ok
                - total
                - items
                - failed
        infra_enableDiagModeRequest:
            type: object
            description: Request to open a diagnostic-mode window on a single node.
            properties:
                until:
                    type: string
                    format: date-time
                    description: RFC3339 window end. Must be between 5 minutes and 24 hours in the future.
                reason:
                    type: string
                    description: Optional operator-supplied reason recorded with the window.
            required:
                - until
