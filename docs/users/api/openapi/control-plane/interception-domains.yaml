# Hand-maintained OpenAPI spec, verified claim-by-claim against the control-plane
# handler code (the single source of truth) via the openapi-review skill. Keep
# structural fields (paths/verbs/types) in lockstep with the handlers.
openapi: 3.1.0
info:
    title: Nexus Control Plane Admin API — interception-domains
    version: dev
    description: 'Hand-maintained against control-plane source: field names, types, optionality, status codes and IAM tiers mirror the handler code; enum value sets and required-field rules enforced imperatively in handlers are verified by the openapi-review skill.'
paths:
    /api/admin/interception-domains:
        get:
            operationId: listInterceptionDomains
            summary: List interception domains
            description: |
                Returns the full interception-domain catalog (including disabled
                rows) with each domain's attached path rules. Supports a free-text
                search filter and an enabled/disabled filter, plus pagination.
                The response is a paginated envelope of domain rows.
            x-nexus-iam-action: iam.ResourceInterceptionDomain.Action(iam.VerbRead)
            x-nexus-tier: auto
            parameters:
                - name: search
                  in: query
                  required: false
                  description: Free-text filter applied to domain name and host pattern.
                  schema:
                    type: string
                - name: enabled
                  in: query
                  required: false
                  description: |
                    Filter by enabled state. Only the literal strings "true" and
                    "false" are honored; any other value (or omission) returns
                    both enabled and disabled domains.
                  schema:
                    type: string
                    enum:
                        - "true"
                        - "false"
            responses:
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
        post:
            operationId: createInterceptionDomain
            summary: Create an interception domain
            description: |
                Creates a new interception domain, optionally with inline path
                rules. The handler requires name, hostPattern, and adapterId;
                every other field is optional and falls back to the store/DB
                default when omitted. Enum-shaped fields (hostMatchType,
                defaultPathAction, onAdapterError, networkZone, and each path's
                matchType/action) are validated against fixed whitelists — an
                out-of-range value returns 400. Each inline path requires a
                non-empty action. On success the new domain (with attached
                paths) is returned and an interception_domains config
                invalidation is fanned to the compliance-proxy and agent nodes.
            x-nexus-iam-action: iam.ResourceInterceptionDomain.Action(iam.VerbCreate)
            x-nexus-tier: confirm
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/handler_interceptionDomainBody'
                        example:
                            name: OpenAI API
                            description: Inspect traffic to the OpenAI API host.
                            hostPattern: api.openai.com
                            hostMatchType: EXACT
                            adapterId: openai
                            adapterConfig: {}
                            enabled: true
                            priority: 100
                            defaultPathAction: PASSTHROUGH
                            onAdapterError: FAIL_OPEN
                            networkZone: PUBLIC
                            source: admin
                            paths:
                                - pathPattern:
                                    - /v1/chat/completions
                                  matchType: PREFIX
                                  action: PROCESS
                                  priority: 10
                                  enabled: true
            responses:
                "400":
                    description: Bad Request
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "201":
                    description: Created
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/interceptionstore_InterceptionDomainRow'
                            example:
                                id: d-01HZ
                                name: OpenAI API
                                description: Inspect traffic to the OpenAI API host.
                                hostPattern: api.openai.com
                                hostMatchType: EXACT
                                adapterId: openai
                                adapterConfig: {}
                                enabled: true
                                priority: 100
                                defaultPathAction: PASSTHROUGH
                                onAdapterError: FAIL_OPEN
                                networkZone: PUBLIC
                                source: admin
                                createdAt: 2024-01-15T10:00:00Z
                                updatedAt: 2024-01-15T10:00:00Z
                                createdBy: usr-123
                                paths:
                                    - id: p-01HZ
                                      domainId: d-01HZ
                                      pathPattern:
                                        - /v1/chat/completions
                                      matchType: PREFIX
                                      action: PROCESS
                                      priority: 10
                                      enabled: true
                                      createdAt: 2024-01-15T10:00:00Z
                                      updatedAt: 2024-01-15T10:00:00Z
    /api/admin/interception-domains/{id}:
        get:
            operationId: getInterceptionDomain
            summary: Get an interception domain
            description: |
                Returns a single interception domain by id, including its
                attached path rules. Responds 404 when no domain matches the id.
            x-nexus-iam-action: iam.ResourceInterceptionDomain.Action(iam.VerbRead)
            x-nexus-tier: auto
            parameters:
                - name: id
                  in: path
                  required: true
                  description: Interception domain id.
                  schema:
                    type: string
            responses:
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "404":
                    description: Not Found
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/interceptionstore_InterceptionDomainRow'
        put:
            operationId: updateInterceptionDomain
            summary: Update an interception domain
            description: |
                Partially updates an interception domain. Every field is optional
                — only fields present in the body are applied, the rest are left
                unchanged. Enum-shaped fields (hostMatchType, defaultPathAction,
                onAdapterError, networkZone) are validated against fixed
                whitelists when present; an out-of-range value returns 400.
                Responds 404 when no domain matches the id. On success the
                updated domain is returned and an interception_domains config
                invalidation is fanned to the compliance-proxy and agent nodes.
                Path rules are not edited here — use the path sub-resource
                endpoints.
            x-nexus-iam-action: iam.ResourceInterceptionDomain.Action(iam.VerbUpdate)
            x-nexus-tier: confirm
            parameters:
                - name: id
                  in: path
                  required: true
                  description: Interception domain id.
                  schema:
                    type: string
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            description: |
                                Partial update body. All fields optional; only
                                present fields are applied.
                            properties:
                                name:
                                    type:
                                        - string
                                        - "null"
                                    description: Human-readable domain name.
                                description:
                                    type:
                                        - string
                                        - "null"
                                    description: Optional free-text description.
                                hostPattern:
                                    type:
                                        - string
                                        - "null"
                                    description: Host match pattern (interpreted per hostMatchType).
                                hostMatchType:
                                    type:
                                        - string
                                        - "null"
                                    description: How hostPattern is matched against the request host.
                                    enum:
                                        - EXACT
                                        - PREFIX
                                        - GLOB
                                        - REGEX
                                adapterId:
                                    type:
                                        - string
                                        - "null"
                                    description: Identifier of the traffic adapter applied to this domain.
                                adapterConfig:
                                    description: Adapter-specific configuration as arbitrary JSON.
                                enabled:
                                    type:
                                        - boolean
                                        - "null"
                                    description: Whether the domain rule is active.
                                priority:
                                    type:
                                        - integer
                                        - "null"
                                    description: Evaluation priority; lower-priority domains are considered first by convention.
                                defaultPathAction:
                                    type:
                                        - string
                                        - "null"
                                    description: Action applied when no path rule matches.
                                    enum:
                                        - PROCESS
                                        - PASSTHROUGH
                                        - BLOCK
                                onAdapterError:
                                    type:
                                        - string
                                        - "null"
                                    description: Fail-open vs fail-closed behavior when the adapter errors.
                                    enum:
                                        - FAIL_OPEN
                                        - FAIL_CLOSED
                                networkZone:
                                    type:
                                        - string
                                        - "null"
                                    description: Network zone classification for this domain.
                                    enum:
                                        - PUBLIC
                                        - INTERNAL
                                source:
                                    type:
                                        - string
                                        - "null"
                                    description: Origin of the row (e.g. seed vs admin).
                        example:
                            enabled: false
                            priority: 50
            responses:
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "404":
                    description: Not Found
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "400":
                    description: Bad Request
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/interceptionstore_InterceptionDomainRow'
        delete:
            operationId: deleteInterceptionDomain
            summary: Delete an interception domain
            description: |
                Deletes an interception domain by id. Responds 404 when no
                domain matches the id. On success returns 204 No Content and
                fans an interception_domains config invalidation to the
                compliance-proxy and agent nodes.
            x-nexus-iam-action: iam.ResourceInterceptionDomain.Action(iam.VerbDelete)
            x-nexus-tier: confirm
            parameters:
                - name: id
                  in: path
                  required: true
                  description: Interception domain id.
                  schema:
                    type: string
            responses:
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "404":
                    description: Not Found
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "204":
                    description: No Content
    /api/admin/interception-domains/{id}/paths:
        post:
            operationId: createInterceptionPath
            summary: Add a path rule to an interception domain
            description: |
                Adds a single path rule to the interception domain identified by
                the path id. Responds 404 when the parent domain does not exist.
                The handler requires a non-empty action; matchType and action are
                validated against fixed whitelists, and an out-of-range value
                returns 400. On success the new path is returned and an
                interception_domains config invalidation is fanned to the
                compliance-proxy and agent nodes.
            x-nexus-iam-action: iam.ResourceInterceptionDomain.Action(iam.VerbUpdate)
            x-nexus-tier: confirm
            parameters:
                - name: id
                  in: path
                  required: true
                  description: Parent interception domain id.
                  schema:
                    type: string
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/handler_interceptionPath'
                        example:
                            pathPattern:
                                - /v1/embeddings
                            matchType: PREFIX
                            action: BLOCK
                            priority: 20
                            enabled: true
            responses:
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "404":
                    description: Not Found
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "400":
                    description: Bad Request
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "201":
                    description: Created
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/interceptionstore_InterceptionPathRow'
    /api/admin/interception-domains/{id}/paths/{pathId}:
        put:
            operationId: updateInterceptionPath
            summary: Update a path rule
            description: |
                Partially updates a path rule within an interception domain. Both
                the parent domain id and the path id must match — a pathId that
                resolves to a different domain returns 404 (defense in depth).
                Every field is optional; only present fields are applied. When
                present, matchType and action are validated against fixed
                whitelists and an out-of-range value returns 400. On success the
                updated path is returned and an interception_domains config
                invalidation is fanned to the compliance-proxy and agent nodes.
            x-nexus-iam-action: iam.ResourceInterceptionDomain.Action(iam.VerbUpdate)
            x-nexus-tier: confirm
            parameters:
                - name: id
                  in: path
                  required: true
                  description: Parent interception domain id.
                  schema:
                    type: string
                - name: pathId
                  in: path
                  required: true
                  description: Path rule id within the domain.
                  schema:
                    type: string
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            description: |
                                Partial update body. All fields optional; only
                                present fields are applied.
                            properties:
                                pathPattern:
                                    type: array
                                    description: One or more path patterns matched per matchType.
                                    items:
                                        type: string
                                matchType:
                                    type:
                                        - string
                                        - "null"
                                    description: How pathPattern is matched against the request path.
                                    enum:
                                        - EXACT
                                        - PREFIX
                                        - GLOB
                                        - REGEX
                                action:
                                    type:
                                        - string
                                        - "null"
                                    description: Action applied when this path rule matches.
                                    enum:
                                        - PROCESS
                                        - PASSTHROUGH
                                        - BLOCK
                                priority:
                                    type:
                                        - integer
                                        - "null"
                                    description: Evaluation priority among path rules.
                                description:
                                    type:
                                        - string
                                        - "null"
                                    description: Optional free-text description.
                                enabled:
                                    type:
                                        - boolean
                                        - "null"
                                    description: Whether the path rule is active.
                        example:
                            action: PASSTHROUGH
                            enabled: false
            responses:
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "404":
                    description: Not Found
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "400":
                    description: Bad Request
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/interceptionstore_InterceptionPathRow'
        delete:
            operationId: deleteInterceptionPath
            summary: Delete a path rule
            description: |
                Deletes a path rule from an interception domain. Both the parent
                domain id and the path id must match — a pathId that resolves to
                a different domain returns 404 (defense in depth). On success
                returns 204 No Content and fans an interception_domains config
                invalidation to the compliance-proxy and agent nodes.
            x-nexus-iam-action: iam.ResourceInterceptionDomain.Action(iam.VerbUpdate)
            x-nexus-tier: confirm
            parameters:
                - name: id
                  in: path
                  required: true
                  description: Parent interception domain id.
                  schema:
                    type: string
                - name: pathId
                  in: path
                  required: true
                  description: Path rule id within the domain.
                  schema:
                    type: string
            responses:
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "404":
                    description: Not Found
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "204":
                    description: No Content
components:
    schemas:
        handler_interceptionDomainBody:
            type: object
            description: Create payload for an interception domain, with optional inline path rules.
            properties:
                name:
                    type: string
                    description: Human-readable domain name.
                description:
                    type:
                        - string
                        - "null"
                    description: Optional free-text description.
                hostPattern:
                    type: string
                    description: Host match pattern (interpreted per hostMatchType).
                hostMatchType:
                    type: string
                    description: How hostPattern is matched against the request host. Omit to use the store default.
                    enum:
                        - EXACT
                        - PREFIX
                        - GLOB
                        - REGEX
                adapterId:
                    type: string
                    description: Identifier of the traffic adapter applied to this domain.
                adapterConfig:
                    description: Adapter-specific configuration as arbitrary JSON.
                enabled:
                    type:
                        - boolean
                        - "null"
                    description: Whether the domain rule is active.
                priority:
                    type: integer
                    description: Evaluation priority; lower-priority domains are considered first by convention.
                defaultPathAction:
                    type: string
                    description: Action applied when no path rule matches. Omit to use the store default.
                    enum:
                        - PROCESS
                        - PASSTHROUGH
                        - BLOCK
                onAdapterError:
                    type: string
                    description: Fail-open vs fail-closed behavior when the adapter errors. Omit to use the store default.
                    enum:
                        - FAIL_OPEN
                        - FAIL_CLOSED
                networkZone:
                    type: string
                    description: Network zone classification for this domain. Omit to use the store default.
                    enum:
                        - PUBLIC
                        - INTERNAL
                source:
                    type: string
                    description: Origin of the row (e.g. seed vs admin).
                paths:
                    type: array
                    description: Optional inline path rules to create with the domain.
                    items:
                        $ref: '#/components/schemas/handler_interceptionPath'
            required:
                - name
                - hostPattern
                - adapterId
        handler_interceptionPath:
            type: object
            properties:
                pathPattern:
                    type: array
                    items:
                        type: string
                matchType:
                    type: string
                action:
                    type: string
                priority:
                    type: integer
                description:
                    type:
                        - string
                        - "null"
                enabled:
                    type:
                        - boolean
                        - "null"
            required:
                - pathPattern
                - matchType
                - action
                - priority
        interceptionstore_InterceptionDomainRow:
            type: object
            properties:
                id:
                    type: string
                name:
                    type: string
                description:
                    type:
                        - string
                        - "null"
                hostPattern:
                    type: string
                hostMatchType:
                    type: string
                adapterId:
                    type: string
                adapterConfig:
                    description: arbitrary JSON value
                enabled:
                    type: boolean
                priority:
                    type: integer
                defaultPathAction:
                    type: string
                onAdapterError:
                    type: string
                networkZone:
                    type: string
                source:
                    type: string
                createdAt:
                    type: string
                    format: date-time
                updatedAt:
                    type: string
                    format: date-time
                createdBy:
                    type:
                        - string
                        - "null"
                paths:
                    type: array
                    items:
                        $ref: '#/components/schemas/interceptionstore_InterceptionPathRow'
            required:
                - id
                - name
                - hostPattern
                - hostMatchType
                - adapterId
                - enabled
                - priority
                - defaultPathAction
                - onAdapterError
                - networkZone
                - paths
        interceptionstore_InterceptionPathRow:
            type: object
            properties:
                id:
                    type: string
                domainId:
                    type: string
                pathPattern:
                    type: array
                    items:
                        type: string
                matchType:
                    type: string
                action:
                    type: string
                priority:
                    type: integer
                description:
                    type:
                        - string
                        - "null"
                enabled:
                    type: boolean
                createdAt:
                    type: string
                    format: date-time
                updatedAt:
                    type: string
                    format: date-time
            required:
                - id
                - pathPattern
                - matchType
                - action
                - priority
                - enabled
