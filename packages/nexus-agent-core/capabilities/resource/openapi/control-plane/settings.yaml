                                additionalProperties: {}
    /api/admin/settings/device-defaults:
        get:
            operationId: getAgentSettings
            summary: Read fleet-wide agent runtime defaults
            description: |-
                Returns the fleet-wide agent runtime defaults pushed to every
                agent via the `agent_settings` shadow config key: quit policy
                (`quitAllowed`, `shutdownWarningEnabled`, optional per-locale
                `shutdownWarning` map), updater settings (`autoUpdateEnabled`,
                `autoUpdateChannel`), `trafficUploadLevel`, `themeId`, the
                macOS QUIC-fallback bundle allowlist (`forceQUICFallbackBundles`),
                and `attestationEnabled`. Absent stored fields surface as their
                zero values.
            x-nexus-iam-action: iam.ResourceDeviceDefaults.Action(iam.VerbRead)
            x-nexus-tier: auto
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                quitAllowed: false
                                shutdownWarningEnabled: true
                                shutdownWarning:
                                    en: Quitting the agent disables compliance interception.
                                autoUpdateEnabled: true
                                autoUpdateChannel: stable
                                trafficUploadLevel: processed
                                themeId: default
                                forceQUICFallbackBundles:
                                    - com.google.Chrome
                                attestationEnabled: false
        put:
            operationId: updateAgentSettings
            summary: Update fleet-wide agent runtime defaults
            description: |-
                Merges the supplied fields into the persisted agent runtime
                defaults; omitted fields are left unchanged (every field is
                optional). Validation: `autoUpdateChannel` must be `stable`,
                `beta`, or empty; `trafficUploadLevel` must be `all`,
                `processed`, `blocked`, or empty (empty meaning the agent
                default); `themeId` must be printable ASCII no longer than 64
                characters; each `forceQUICFallbackBundles` entry must be
                printable ASCII without whitespace, at most 200 characters,
                with at most 64 entries. On success responds 200 with the
                merged settings and bumps the agent config version.
            x-nexus-iam-action: iam.ResourceDeviceDefaults.Action(iam.VerbUpdate)
            x-nexus-tier: confirm
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                quitAllowed:
                                    type:
                                        - boolean
                                        - "null"
                                    description: Whether users may quit the agent process.
                                shutdownWarning:
                                    type: object
                                    description: Per-locale warning text shown when quitting.
                                    additionalProperties:
                                        type: string
                                shutdownWarningEnabled:
                                    type:
                                        - boolean
                                        - "null"
                                    description: Whether the shutdown warning is shown.
                                autoUpdateEnabled:
                                    type:
                                        - boolean
                                        - "null"
                                    description: Whether agent auto-update is enabled.
                                autoUpdateChannel:
                                    type:
                                        - string
                                        - "null"
                                    description: Agent update channel. Empty string is accepted.
                                    enum:
                                        - stable
                                        - beta
                                        - ""
                                trafficUploadLevel:
                                    type:
                                        - string
                                        - "null"
                                    description: Which agent flows reach Hub. Empty means use the agent default (processed).
                                    enum:
                                        - all
                                        - processed
                                        - blocked
                                        - ""
                                themeId:
                                    type:
                                        - string
                                        - "null"
                                    description: Theme pack ID. Open enum; printable ASCII up to 64 chars.
                                forceQUICFallbackBundles:
                                    type:
                                        - array
                                        - "null"
                                    description: Bundle-ID allowlist for the macOS NE QUIC-fallback behavior.
                                    items:
                                        type: string
                                attestationEnabled:
                                    type:
                                        - boolean
                                        - "null"
                                    description: Fleet-wide opt-in for agent attestation.
                        example:
                            quitAllowed: false
                            shutdownWarningEnabled: true
                            shutdownWarning:
                                en: Quitting the agent disables compliance interception.
                            autoUpdateChannel: stable
                            trafficUploadLevel: processed
                            forceQUICFallbackBundles:
                                - com.google.Chrome
            responses:
                "400":
                    description: Bad Request
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
