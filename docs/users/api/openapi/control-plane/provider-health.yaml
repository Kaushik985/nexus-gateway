                                                    description: Number of traffic events aggregated into this record.
                                                lastRequestAt:
                                                    description: Timestamp of the most recent request to this provider; null if none.
                                                lastErrorAt:
                                                    description: Timestamp of the most recent error from this provider; null if none.
                            example:
                                data:
                                    - providerId: prov_openai
                                      provider: OpenAI
                                      status: healthy
                                      errorRate: 0.01
