        credstore_Credential:
            type: object
            properties:
                id:
                    type: string
                name:
                    type: string
                providerId:
                    type: string
                enabled:
                    type: boolean
                rotationState:
                    type:
                        - string
                        - "null"
                lastRotatedAt:
                    type:
                        - string
                        - "null"
                    format: date-time
                lastUsedAt:
                    type:
                        - string
                        - "null"
                    format: date-time
                lastSuccessAt:
                    type:
                        - string
                        - "null"
                    format: date-time
                lastFailureAt:
                    type:
                        - string
                        - "null"
                    format: date-time
                lastFailureReason:
                    type:
                        - string
                        - "null"
                totalUsageCount:
                    type: integer
                expiresAt:
                    type:
                        - string
                        - "null"
                    format: date-time
                selectionWeight:
                    type: integer
                status:
                    type: string
                retireAt:
                    type:
                        - string
                        - "null"
                    format: date-time
                circuitState:
                    type: string
                circuitReason:
                    type:
                        - string
                        - "null"
                circuitOpenedAt:
                    type:
                        - string
                        - "null"
                    format: date-time
                circuitNextProbeAt:
                    type:
                        - string
                        - "null"
                    format: date-time
                healthStatus:
                    type: string
                healthSuccessRate5m:
                    type:
                        - number
                        - "null"
                healthSuccessRate1h:
                    type:
                        - number
                        - "null"
                healthSamplesObserved:
                    type: integer
                healthDominantError:
                    type:
                        - string
                        - "null"
                healthTrend:
                    type:
                        - string
                        - "null"
                healthStatusChangedAt:
                    type:
                        - string
                        - "null"
                    format: date-time
                healthCheckedAt:
                    type:
                        - string
                        - "null"
                    format: date-time
                reliabilityOverrides:
                    description: arbitrary JSON value
                createdAt:
                    type: string
                    format: date-time
                updatedAt:
                    type: string
                    format: date-time
            required:
                - id
                - name
                - providerId
                - enabled
                - totalUsageCount
                - selectionWeight
                - status
                - circuitState
                - healthStatus
                - healthSamplesObserved
                - createdAt
                - updatedAt
        handler_credentialWithCircuit:
            type: object
            properties:
                id:
                    type: string
                name:
                    type: string
                providerId:
                    type: string
                enabled:
                    type: boolean
                rotationState:
                    type:
                        - string
                        - "null"
                lastRotatedAt:
                    type:
                        - string
                        - "null"
                    format: date-time
                lastUsedAt:
                    type:
                        - string
                        - "null"
                    format: date-time
                lastSuccessAt:
                    type:
                        - string
                        - "null"
                    format: date-time
                lastFailureAt:
                    type:
                        - string
                        - "null"
                    format: date-time
                lastFailureReason:
                    type:
                        - string
                        - "null"
                totalUsageCount:
                    type: integer
                expiresAt:
                    type:
                        - string
                        - "null"
                    format: date-time
                selectionWeight:
                    type: integer
                status:
                    type: string
                retireAt:
                    type:
                        - string
                        - "null"
                    format: date-time
                circuitState:
                    type: string
                circuitReason:
                    type:
                        - string
                        - "null"
                circuitOpenedAt:
                    type:
                        - string
                        - "null"
                    format: date-time
                circuitNextProbeAt:
                    type:
                        - string
                        - "null"
                    format: date-time
                healthStatus:
                    type: string
                healthSuccessRate5m:
                    type:
                        - number
                        - "null"
                healthSuccessRate1h:
                    type:
                        - number
                        - "null"
                healthSamplesObserved:
                    type: integer
                healthDominantError:
                    type:
                        - string
                        - "null"
                healthTrend:
                    type:
                        - string
                        - "null"
                healthStatusChangedAt:
                    type:
                        - string
                        - "null"
                    format: date-time
                healthCheckedAt:
                    type:
                        - string
                        - "null"
                    format: date-time
                reliabilityOverrides:
                    description: arbitrary JSON value
                createdAt:
                    type: string
                    format: date-time
                updatedAt:
                    type: string
                    format: date-time
                liveCircuit:
                    $ref: '#/components/schemas/handler_liveCircuitView'
            required:
                - id
                - name
                - providerId
                - enabled
                - totalUsageCount
                - selectionWeight
                - status
                - circuitState
                - healthStatus
                - healthSamplesObserved
                - createdAt
                - updatedAt
        handler_liveCircuitView:
            type: object
            properties:
                state:
                    type: string
                openReason:
                    type: string
                openedAt:
                    type: string
                nextProbeAt:
                    type: string
