                                additionalProperties: {}
                                properties:
                                    data:
                                        type: array
                                        items:
                                            $ref: '#/components/schemas/vkstore_VirtualKey'
                                    total:
                                        type: integer
                            example:
                                data:
                                    - id: 6f1c2e8a-7b3d-4f9a-9c11-2a4b6c8d0e21
                                      name: production-app
                                      keyPrefix: nvk_a1b2c3d4
                                      projectId: 1f0b9c2d-3e4f-5061-7283-94a5b6c7d8e9
                                      enabled: true
                                      vkType: application
                                      vkStatus: active
                                      createdAt: 2026-01-15T08:30:00Z
                                      updatedAt: 2026-01-15T08:30:00Z
                                total: 1
        post:
            operationId: createVirtualKey
            summary: Create a virtual key
            description: |-
                Creates a virtual key and returns the generated secret exactly once in the
                `key` field of the response. The secret is hashed at rest and cannot be
                retrieved again — callers must capture it from this response.

                Only `name` is unconditionally required. `vkType` defaults to "application"
                when omitted, and `allowedModels` defaults to an empty list. When the
                resolved type is "application", `projectId` and `expiresAt` become required,
                `expiresAt` must not exceed three months from now, and the key is created in
                "pending" status awaiting approval; other types are created "active".
            x-nexus-iam-action: iam.ResourceVirtualKey.Action(iam.VerbCreate)
            x-nexus-tier: confirm
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                name:
                                    type: string
                                    description: Human-readable name for the virtual key.
                                projectId:
                                    type:
                                        - string
                                        - "null"
                                    description: Owning project. Required when vkType resolves to "application".
                                sourceApp:
                                    type:
                                        - string
                                        - "null"
                                    description: Optional label identifying the calling application.
                                enabled:
                                    type:
                                        - boolean
                                        - "null"
                                    description: Whether the key is enabled. Defaults to true when omitted.
                                rateLimitRpm:
                                    type:
                                        - integer
                                        - "null"
                                    description: Per-key request-per-minute limit. Unlimited when null.
                                compareEndpointRateLimitRpm:
                                    type:
                                        - integer
                                        - "null"
                                    description: Per-minute request limit for the compare endpoint.
                                allowedModels:
                                    description: Allowed-model allowlist as a JSON value. Defaults to an empty list when omitted.
                                vkType:
                                    type: string
                                    description: Virtual key type. Defaults to "application" when omitted.
                                    enum:
                                        - personal
                                        - application
                                expiresAt:
                                    type:
                                        - string
                                        - "null"
                                    format: date-time
                                    description: Expiry timestamp. Required for application keys and must not exceed three months from now.
                            required:
                                - name
                        example:
                            name: production-app
                            projectId: 1f0b9c2d-3e4f-5061-7283-94a5b6c7d8e9
                            vkType: application
                            allowedModels:
                                - gpt-4o
                                - claude-sonnet-4-6
                            enabled: true
                            expiresAt: 2026-04-15T00:00:00Z
