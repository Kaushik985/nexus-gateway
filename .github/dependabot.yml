version: 2
# Grouping policy: bundle minor/patch upgrades into a single PR per
# ecosystem; let majors get their own PR so they can be reviewed in
# isolation (a single 8-major atomic merge is essentially impossible
# to review safely — see the 2026-05-21 chore-PR-review session).
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    # Build/test toolchain majors (vite / vitest / coverage-v8 / eslint /
    # typescript) are breaking migrations we run deliberately on our own
    # schedule, and none ship to end users at runtime — so a major bump
    # carries no deployed-security weight. Ignore their MAJORS so
    # Dependabot stops re-opening them every week; minor/patch still flow
    # via the dev-deps group, and CVE-driven fixes still arrive through
    # the separate Dependabot security-updates layer (repo setting).
    # Runtime/production + Go-module majors are deliberately NOT ignored
    # here: they reach users, are rare, and we want them visible to
    # review and merge on our own cadence.
    ignore:
      - dependency-name: "vite"
        update-types: ["version-update:semver-major"]
      - dependency-name: "vitest"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@vitest/coverage-v8"
        update-types: ["version-update:semver-major"]
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
    groups:
      production-deps:
        patterns: ["*"]
        exclude-patterns: ["@types/*", "eslint*", "vitest*", "typescript"]
        update-types: ["minor", "patch"]
      dev-deps:
        dependency-type: development
        patterns: ["*"]
        update-types: ["minor", "patch"]

  # Single gomod ecosystem covering all 6 service modules via
  # `directories:` (plural). Combined with the `go-deps` group, a
  # shared dep upgrade (pgx / echo / aws-sdk family / …) fans out as
  # ONE grouped PR instead of N (one per service). Mirrors the
  # go.work workspace topology where packages/shared is the dep
  # frontier and the other services inherit via the sibling replace
  # directives.
  - package-ecosystem: gomod
    directories:
      - /packages/shared
      - /packages/nexus-hub
      - /packages/control-plane
      - /packages/ai-gateway
      - /packages/compliance-proxy
      - /packages/agent
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      go-deps:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  - package-ecosystem: github-actions
    directory: /
    # Low-urgency: workflow action bumps don't carry runtime/security
    # weight; monthly cadence keeps the noise down.
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    groups:
      gha-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
