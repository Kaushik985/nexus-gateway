    /api/admin/things/{id}/stats:
        get:
            operationId: getThingStats
            summary: Get per-node metric rollup rows
            description: |-
                Returns pre-aggregated metric rollup rows for a single node (Thing) over a time
                window. Reads the per-node rollup tables produced by the Hub rollup jobs; this is
                the source of truth for the Control Plane admin per-node stats dashboards. The
                granularity (granule) is selected automatically from the requested window span. For
                an agent node with no rollup data in the window, the handler infers that per-agent
                rollup is disabled on the Hub and returns `enabled=false` with an explanatory
