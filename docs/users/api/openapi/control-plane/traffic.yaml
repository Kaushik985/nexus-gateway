                  in: query
                  description: Inclusive lower time bound (RFC 3339); ignored if unparseable.
                  required: false
                  schema:
                    type: string
                    format: date-time
                - name: endTime
                  in: query
                  description: Inclusive upper time bound (RFC 3339); ignored if unparseable.
                  required: false
                  schema:
                    type: string
                    format: date-time
            responses:
                "400":
                    description: Invalid cacheStatus value (only HIT or MISS accepted)
