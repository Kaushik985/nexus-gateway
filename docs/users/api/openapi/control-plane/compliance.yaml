                  in: query
                  description: Enforcement layer that produced the event.
                  required: false
                  schema:
                    type: string
                - name: hookDecision
                  in: query
                  description: Hook decision to filter by (for example allow or deny).
                  required: false
                  schema:
                    type: string
                - name: sourceIp
                  in: query
                  description: Originating client IP to filter by.
                  required: false
                  schema:
                    type: string
                - name: targetHost
                  in: query
                  description: Upstream target host to filter by.
                  required: false
                  schema:
                    type: string
            responses:
