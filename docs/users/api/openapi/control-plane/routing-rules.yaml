    /api/admin/routing-rules/simulate:
        post:
            operationId: routingSimulate
            summary: Simulate routing for a request
            description: |-
                Forwards the request body verbatim to the AI Gateway internal
                routing-simulate endpoint and streams the gateway response back. The body
                is an opaque JSON object passed through unchanged; the success status code
                and shape are whatever the AI Gateway returns. The Control Plane returns
                400 when the body is not valid JSON, 500 when it cannot re-encode the
                payload, and 502 when the AI Gateway is unreachable.
            x-nexus-iam-action: iam.ResourceRoutingRule.Action(iam.VerbSimulate)
            x-nexus-tier: confirm
            requestBody:
                required: true
                content:
