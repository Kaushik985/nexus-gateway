components:
    schemas:
        credstate_Thresholds:
            type: object
            description: |-
                Credential-reliability circuit-breaker thresholds. Every field
                must be positive; healthyThresholdPct must be in (0, 100] and
                degradedThresholdPct in (0, healthyThresholdPct).
            properties:
                authFailThreshold:
                    type: integer
                    description: Consecutive 401/403 responses that open the circuit with reason auth_fail.
                rateLimitCooldownSeconds:
                    type: integer
                    description: How long a rate-limited OPEN circuit stays open before transitioning to half-open.
                healthyThresholdPct:
                    type: integer
                    description: Minimum success rate (percent) to classify a credential as healthy.
                degradedThresholdPct:
                    type: integer
                    description: Success rate (percent) floor below which a credential is unavailable; between this and healthy is degraded.
                healthMinSamples:
                    type: integer
                    description: Smallest sample count over the health window before a status other than collecting is assigned.
                healthWindowSeconds:
                    type: integer
                    description: Rolling window length (seconds) for the current health classification.
                healthSustainedDegradedSeconds:
                    type: integer
                    description: How long a credential must stay degraded/unavailable before the sustained-degraded alert fires.
            required:
                - authFailThreshold
                - rateLimitCooldownSeconds
                - healthyThresholdPct
                - degradedThresholdPct
                - healthMinSamples
                - healthWindowSeconds
                - healthSustainedDegradedSeconds
        handler_SIEMConfig:
            type: object
            description: SIEM integration config. No field is required on write; format/url are validated only when non-empty.
            properties:
                enabled:
                    type: boolean
                    description: Whether SIEM forwarding is enabled.
                url:
                    type: string
