# Hand-maintained OpenAPI spec, verified claim-by-claim against the control-plane
# handler code (the single source of truth) via the openapi-review skill. Keep
# structural fields (paths/verbs/types) in lockstep with the handlers.
openapi: 3.1.0
info:
    title: Nexus Control Plane Admin API — device-groups
    version: dev
    description: 'Hand-maintained against control-plane source: field names, types, optionality, status codes and IAM tiers mirror the handler code; enum value sets and required-field rules enforced imperatively in handlers are verified by the openapi-review skill.'
paths:
    /api/admin/device-groups:
        get:
            operationId: listDeviceGroups
            summary: List device groups
            description: |
                Returns a paginated list of device groups. The optional `q` query
                parameter filters groups by a free-text search term. The response
                wraps the rows in a `data` array alongside a `total` count of all
                matching groups (before pagination).
            x-nexus-iam-action: iam.ResourceDeviceGroup.Action(iam.VerbRead)
            x-nexus-tier: auto
            parameters:
                - name: q
                  in: query
                  required: false
                  description: Free-text search term to filter device groups by name.
                  schema:
                    type: string
            responses:
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                error: Internal server error
                                code: server_error
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                data:
                                    - id: dg_01HZX
                                      name: macOS Fleet
                                      description: All macOS agents
                                      createdBy: usr_admin
                                      createdAt: "2026-01-15T09:30:00Z"
                                      updatedAt: "2026-01-15T09:30:00Z"
                                      memberCount: 42
                                total: 1
        post:
            operationId: createDeviceGroup
            summary: Create a device group
            description: |
                Creates a static device group. Only `name` is required; an empty or
                missing `name` is rejected with 400. An empty `description` is stored
                as null. The creating admin's key ID is recorded as `createdBy`. The
                created group is returned and the action is audit-logged.
            x-nexus-iam-action: iam.ResourceDeviceGroup.Action(iam.VerbCreate)
            x-nexus-tier: confirm
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                name:
                                    type: string
                                    description: Human-readable group name. Must be non-empty.
                                description:
                                    type: string
                                    description: Optional free-text description; empty stored as null.
                            required:
                                - name
                        example:
                            name: macOS Fleet
                            description: All macOS agents
            responses:
                "400":
                    description: Bad Request — `name` is missing or empty.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                error: name is required
                                code: validation_error
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                error: Internal server error
                                code: server_error
                "201":
                    description: Created
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/agentstore_DeviceGroup'
                            example:
                                id: dg_01HZX
                                name: macOS Fleet
                                description: All macOS agents
                                createdBy: usr_admin
                                createdAt: "2026-01-15T09:30:00Z"
                                updatedAt: "2026-01-15T09:30:00Z"
    /api/admin/device-groups/{id}:
        get:
            operationId: getDeviceGroup
            summary: Get a device group with memberships
            description: |
                Returns the group detail payload rendered by the admin UI: the group
                row fields plus a `memberships` array of joined device memberships
                (device hostname/os/status). `memberships` is always present as an
                array (possibly empty), never null. Returns 404 if the group does
                not exist.
            x-nexus-iam-action: iam.ResourceDeviceGroup.Action(iam.VerbRead)
            x-nexus-tier: auto
            parameters:
                - name: id
                  in: path
                  required: true
                  description: Device group ID.
                  schema:
                    type: string
            responses:
                "404":
                    description: Not Found — no group with the given ID.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                error: Device group not found
                                code: not_found
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                error: Failed to load memberships
                                code: server_error
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                id: dg_01HZX
                                name: macOS Fleet
                                description: All macOS agents
                                createdBy: usr_admin
                                createdAt: "2026-01-15T09:30:00Z"
                                updatedAt: "2026-01-15T09:30:00Z"
                                memberships: []
        put:
            operationId: updateDeviceGroup
            summary: Update a device group
            description: |
                Updates a device group's `name` and/or `description`. Both fields are
                optional patch fields — omit a field to leave it unchanged. The
                updated group is returned and the action is audit-logged. Returns 400
                only if the request body cannot be parsed.
            x-nexus-iam-action: iam.ResourceDeviceGroup.Action(iam.VerbUpdate)
            x-nexus-tier: confirm
            parameters:
                - name: id
                  in: path
                  required: true
                  description: Device group ID.
                  schema:
                    type: string
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                name:
                                    type:
                                        - string
                                        - "null"
                                    description: New group name. Omit to leave unchanged.
                                description:
                                    type:
                                        - string
                                        - "null"
                                    description: New description. Omit to leave unchanged.
                        example:
                            name: macOS Fleet (renamed)
                            description: All managed macOS agents
            responses:
                "400":
                    description: Bad Request — request body could not be parsed.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                error: Invalid request body
                                code: validation_error
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                error: Internal server error
                                code: server_error
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/agentstore_DeviceGroup'
                            example:
                                id: dg_01HZX
                                name: macOS Fleet (renamed)
                                description: All managed macOS agents
                                createdBy: usr_admin
                                createdAt: "2026-01-15T09:30:00Z"
                                updatedAt: "2026-01-20T11:00:00Z"
        delete:
            operationId: deleteDeviceGroup
            summary: Delete a device group
            description: |
                Deletes the device group. Returns 204 on success and audit-logs the
                deletion. Any store error (including a non-existent group) surfaces as
                404.
            x-nexus-iam-action: iam.ResourceDeviceGroup.Action(iam.VerbDelete)
            x-nexus-tier: confirm
            parameters:
                - name: id
                  in: path
                  required: true
                  description: Device group ID.
                  schema:
                    type: string
            responses:
                "404":
                    description: Not Found — group could not be deleted (e.g. does not exist).
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                error: Device group not found
                                code: not_found
                "204":
                    description: No Content — group deleted.
    /api/admin/device-groups/{id}/force-refresh:
        post:
            operationId: bulkForceRefreshGroup
            summary: Force config refresh for all group members
            description: |
                Resolves the group's members (static plus smart-cache union) and fans
                out a force-resync to each device's Hub config push with bounded
                parallelism. Per-device outcomes are returned as `{ok, error}` rows so
                partial success is observable rather than short-circuited. Returns
                200 when all devices succeed (or the group is empty), and 207
                Multi-Status when some succeed and some fail. The action is
                audit-logged with the success/failure counts.
            x-nexus-iam-action: iam.ResourceDeviceGroup.Action(iam.VerbUpdate)
            x-nexus-tier: confirm
            parameters:
                - name: id
                  in: path
                  required: true
                  description: Device group ID.
                  schema:
                    type: string
            responses:
                "400":
                    description: Bad Request — group ID is missing.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                error: group id is required
                                code: validation_error
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                error: Internal server error
                                code: server_error
                "404":
                    description: Not Found — no group with the given ID.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                error: Group not found
                                code: not_found
                default:
                    description: |
                        Fan-out result. 200 when all members succeeded (or the group
                        is empty); 207 Multi-Status when the outcome is partial.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/agent_bulkActionResponse'
                            example:
                                groupId: dg_01HZX
                                action: force-refresh
                                total: 2
                                succeeded: 1
                                failed: 1
                                results:
                                    - deviceId: dev_a
                                      ok: true
                                    - deviceId: dev_b
                                      ok: false
                                      error: hub not configured
    /api/admin/device-groups/{id}/members:
        post:
            operationId: addGroupMember
            summary: Add a device to a group
            description: |
                Adds a device as a static member of the group. `deviceId` is required.
                `expiresAt` is optional; when supplied it must be an RFC3339 timestamp
                in the future (a permanent membership otherwise). The response echoes
                the membership ID, `groupId`, `deviceId`, and `expiresAt` (when set).
                The action is audit-logged.
            x-nexus-iam-action: iam.ResourceDeviceGroup.Action(iam.VerbUpdate)
            x-nexus-tier: confirm
            parameters:
                - name: id
                  in: path
                  required: true
                  description: Device group ID.
                  schema:
                    type: string
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                deviceId:
                                    type: string
                                    description: ID of the device to add. Required.
                                expiresAt:
                                    type:
                                        - string
                                        - "null"
                                    format: date-time
                                    description: |
                                        Optional RFC3339 expiry. Must be in the future. Null or
                                        omitted means a permanent membership.
                            required:
                                - deviceId
                        example:
                            deviceId: dev_a
                            expiresAt: "2026-12-31T23:59:59Z"
            responses:
                "400":
                    description: |
                        Bad Request — `deviceId` is missing, or `expiresAt` is not
                        RFC3339 (`INVALID_EXPIRES_AT`) or not in the future
                        (`EXPIRES_AT_IN_PAST`).
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                error: deviceId is required
                                code: validation_error
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                error: Internal server error
                                code: server_error
                "201":
                    description: Created — membership added.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                id: mem_01HZX
                                groupId: dg_01HZX
                                deviceId: dev_a
                                expiresAt: "2026-12-31T23:59:59Z"
    /api/admin/device-groups/{id}/members/{deviceId}:
        delete:
            operationId: removeGroupMember
            summary: Remove a device from a group
            description: |
                Removes the device's static membership from the group. Returns 204 on
                success and audit-logs the removal. A removal error (including no such
                membership) surfaces as 404.
            x-nexus-iam-action: iam.ResourceDeviceGroup.Action(iam.VerbUpdate)
            x-nexus-tier: confirm
            parameters:
                - name: id
                  in: path
                  required: true
                  description: Device group ID.
                  schema:
                    type: string
                - name: deviceId
                  in: path
                  required: true
                  description: ID of the device whose membership is removed.
                  schema:
                    type: string
            responses:
                "404":
                    description: Not Found — no matching membership.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                error: Membership not found
                                code: not_found
                "204":
                    description: No Content — membership removed.
    /api/admin/device-groups/{id}/membership-query:
        put:
            operationId: setGroupMembershipQuery
            summary: Set or clear a group's smart membership query
            description: |
                Flips the group between static and smart mode. A non-null
                `membershipQuery` (even an empty predicate) marks the group smart; the
                predicate is validated against a sentinel device before persisting and
                an invalid predicate is rejected with 400 (`INVALID_PREDICATE`). A
                null `membershipQuery` switches the group back to static and drops the
                cached memberships. Recompute is deferred to the next Hub tick (≤60s
                convergence); use the preview endpoint to gauge the membership before
                saving. The action is audit-logged with the resulting mode.
            x-nexus-iam-action: iam.ResourceDeviceGroup.Action(iam.VerbUpdate)
            x-nexus-tier: confirm
            parameters:
                - name: id
                  in: path
                  required: true
                  description: Device group ID.
                  schema:
                    type: string
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/agent_setSmartQueryRequest'
                        example:
                            membershipQuery:
                                all:
                                    - field: os
                                      op: in
                                      value:
                                        - darwin
                                        - linux
            responses:
                "400":
                    description: |
                        Bad Request — missing group ID, unparseable body, or an invalid
                        predicate (`INVALID_PREDICATE`).
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                error: 'predicate: unknown field "foo"'
                                code: validation_error
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                error: Internal server error
                                code: server_error
                "404":
                    description: Not Found — no group with the given ID.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                error: Group not found
                                code: not_found
                "200":
                    description: OK — group updated.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/agentstore_DeviceGroup'
                            example:
                                id: dg_01HZX
                                name: macOS Fleet
                                description: All macOS agents
                                createdBy: usr_admin
                                createdAt: "2026-01-15T09:30:00Z"
                                updatedAt: "2026-01-20T11:00:00Z"
    /api/admin/device-groups/preview-membership:
        post:
            operationId: previewMembership
            summary: Preview smart-group membership for a predicate
            description: |
                Dry-run evaluation of a draft membership predicate against the live
                agent fleet, using the same evaluator the Hub recompute job uses. No
                state is mutated. Returns the matched count and a sample of matching
                device IDs capped at 50. An invalid predicate (unknown field or op) is
                rejected with 400 (`INVALID_PREDICATE`).
            x-nexus-iam-action: iam.ResourceDeviceGroup.Action(iam.VerbRead)
            x-nexus-tier: auto
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/agent_previewMembershipRequest'
                        example:
                            membershipQuery:
                                all:
                                    - field: os
                                      op: eq
                                      value: darwin
            responses:
                "400":
                    description: |
                        Bad Request — unparseable body or an invalid predicate
                        (`INVALID_PREDICATE`).
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                error: 'predicate: unknown field "foo"'
                                code: validation_error
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                error: Internal server error
                                code: server_error
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/agent_previewMembershipResponse'
                            example:
                                matched: 42
                                sample:
                                    - dev_a
                                    - dev_b
components:
    schemas:
        agent_bulkActionResponse:
            type: object
            properties:
                groupId:
                    type: string
                action:
                    type: string
                total:
                    type: integer
                succeeded:
                    type: integer
                failed:
                    type: integer
                results:
                    type: array
                    items:
                        $ref: '#/components/schemas/agent_bulkActionResult'
            required:
                - groupId
                - action
                - total
                - succeeded
                - failed
                - results
        agent_bulkActionResult:
            type: object
            properties:
                deviceId:
                    type: string
                ok:
                    type: boolean
                error:
                    type: string
            required:
                - deviceId
                - ok
        agent_previewMembershipRequest:
            type: object
            properties:
                membershipQuery:
                    $ref: '#/components/schemas/device_Predicate'
            required:
                - membershipQuery
        agent_previewMembershipResponse:
            type: object
            properties:
                matched:
                    type: integer
                sample:
                    type: array
                    items:
                        type: string
            required:
                - matched
                - sample
        agent_setSmartQueryRequest:
            type: object
            properties:
                membershipQuery:
                    $ref: '#/components/schemas/device_Predicate'
        agentstore_DeviceGroup:
            type: object
            properties:
                id:
                    type: string
                name:
                    type: string
                description:
                    type:
                        - string
                        - "null"
                createdBy:
                    type:
                        - string
                        - "null"
                createdAt:
                    type: string
                    format: date-time
                updatedAt:
                    type: string
                    format: date-time
                memberCount:
                    type:
                        - integer
                        - "null"
            required:
                - id
                - name
                - createdAt
                - updatedAt
        device_Leaf:
            type: object
            description: |
                A single predicate condition: a device field, a comparison operator,
                and a value. The field and op enums below are the closed sets the
                predicate evaluator accepts; an unknown field or op is rejected at
                evaluation time.
            properties:
                field:
                    type: string
                    description: Device field the condition is evaluated against.
                    enum:
                        - os
                        - osVersion
                        - agentVersion
                        - hostname
                        - primaryIp
                        - physicalId
                        - status
                        - boundUserId
                        - boundUserOrgPath
                        - enrolledAt
                        - lastHeartbeat
                        - idpGroup
                        - tags
                op:
                    type: string
                    description: Comparison operator applied to the field and value.
                    enum:
                        - eq
                        - ne
                        - in
                        - nin
                        - prefix
                        - regex
                        - cidr
                        - lt
                        - le
                        - gt
                        - ge
                        - tags_contains
                        - tags_contains_all
                        - idp_group_member
                        - relative_seconds_within
                value:
                    description: |
                        Comparison value. Type depends on the operator: a scalar for
                        eq/ne/prefix/regex/cidr/comparisons, a list for in/nin, a string
                        or string list for tags operators.
            required:
                - field
                - op
                - value
        device_Predicate:
            type: object
            description: |
                A membership predicate. When `all` is non-empty, a device matches only
                if every condition is satisfied (AND); otherwise `any` is evaluated and
                a device matches if any condition is satisfied (OR). An empty predicate
                (neither list populated) matches no devices.
            properties:
                all:
                    type: array
                    description: Conditions that must all match (AND). Takes precedence over `any`.
                    items:
                        $ref: '#/components/schemas/device_Leaf'
                any:
                    type: array
                    description: Conditions where any match suffices (OR). Used only when `all` is empty.
                    items:
                        $ref: '#/components/schemas/device_Leaf'
