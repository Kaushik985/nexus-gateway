            x-nexus-tier: auto
            parameters:
                - name: q
                  in: query
                  required: false
                  description: Free-text search term applied to the agent-user list.
                  schema:
                    type: string
                - name: enabled
                  in: query
                  required: false
                  description: |-
                    Activation filter. `true` restricts to users with status
                    `active`; `false` restricts to users whose status is not
                    `active`. Any other value is ignored (no filter applied).
                  schema:
                    type: string
                    enum:
                        - "true"
                        - "false"
            responses:
