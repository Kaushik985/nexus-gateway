# Hand-maintained OpenAPI spec, verified claim-by-claim against the control-plane
# handler code (the single source of truth) via the openapi-review skill. Keep
# structural fields (paths/verbs/types) in lockstep with the handlers.
openapi: 3.1.0
info:
    title: Nexus Control Plane Admin API — nodes
    version: dev
    description: 'Hand-maintained against control-plane source: field names, types, optionality, status codes and IAM tiers mirror the handler code; enum value sets and required-field rules enforced imperatively in handlers are verified by the openapi-review skill.'
paths:
    /api/admin/nodes:
        get:
            operationId: nodesList
            summary: List nodes
            description: >-
                Returns the fleet of registered nodes. Reverse-proxies the Hub
                runtime API (GET /api/hub/things) and rewrites internal
                terminology (thing / shadow / drift) into product-facing terms
                (node / config sync / out of sync) before returning to the admin
                client. Query parameters are forwarded to Hub verbatim.
            x-nexus-iam-action: iam.ResourceNode.Action(iam.VerbRead)
            x-nexus-tier: auto
            responses:
                default:
                    description: Response body not statically resolved; see openapi-review.
    /api/admin/nodes/{id}:
        get:
            operationId: nodesGet
            summary: Get one node
            description: >-
                Returns a single node by ID. Reverse-proxies the Hub runtime API
                (GET /api/hub/things/{id}) and renames internal terminology to the
                product-facing node vocabulary before returning to the admin client.
            x-nexus-iam-action: iam.ResourceNode.Action(iam.VerbRead)
            x-nexus-tier: auto
            parameters:
                - name: id
                  in: path
                  required: true
                  description: Node ID (the underlying Hub thing ID).
                  schema:
                    type: string
            responses:
                default:
                    description: Response body not statically resolved; see openapi-review.
    /api/admin/nodes/{id}/applied-config:
        get:
            operationId: getNodeAppliedConfig
            summary: Get node applied config
            description: >-
                Returns a merged 4-column view (target / applied / template /
                override) per config key for the node's type. Target config and
                version come from the node's shadow; template state is the
                read-only default; override metadata is included when an active
                per-node override exists. The inSync flag is a byte-equal compare
                of target vs applied. Override lookup is best-effort — a Hub blip
                degrades the response to template-only entries rather than failing.
            x-nexus-iam-action: iam.ResourceSettings.Action(iam.VerbRead)
            x-nexus-tier: auto
            parameters:
                - name: id
                  in: path
                  required: true
                  description: Node ID (the underlying Hub thing ID).
                  schema:
                    type: string
            responses:
                "400":
                    description: id path parameter is empty.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "500":
                    description: Failed to read node, list templates, or decode shadow config.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "404":
                    description: Node not found.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: Merged applied-config view keyed by config key.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                nodeId: thing_8f3c2a
                                nodeType: ai-gateway
                                targetVersion: 42
                                appliedVersion: 42
                                configs:
                                    routing.rules:
                                        targetConfig:
                                            enabled: true
                                        targetVersion: 42
                                        appliedConfig:
                                            enabled: true
                                        appliedVersion: 42
                                        templateState:
                                            enabled: false
                                        templateVer: 7
                                        inSync: true
                                        lastChange:
                                            timestamp: "2026-01-15T10:30:00Z"
                                            actor: admin@example.com
                                            action: config_update
                                            emergencyOverride: false
    /api/admin/nodes/{id}/device-assignments:
        get:
            operationId: getNodeDeviceAssignments
            summary: List node device assignments
            description: >-
                Returns the login / device-assignment history for a node. The node
                ID is also the device ID. Returns active and historical assignments
                ordered most-recent-first as {"data": [...], "total": N}.
            x-nexus-iam-action: iam.ResourceNode.Action(iam.VerbRead)
            x-nexus-tier: auto
            parameters:
                - name: id
                  in: path
                  required: true
                  description: Node ID (the underlying Hub thing / device ID).
                  schema:
                    type: string
            responses:
                "500":
                    description: Failed to fetch device assignments.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: Device-assignment list with total count.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                data:
                                    - deviceId: thing_8f3c2a
                                      userId: usr_91a
                                      assignedAt: "2026-01-10T08:00:00Z"
                                total: 1
    /api/admin/nodes/{id}/overrides:
        get:
            operationId: listNodeOverrides
            summary: List node config overrides
            description: >-
                Returns the active per-node config overrides for a node. Pure
                reverse-proxy to Hub (GET /api/hub/things/{id}/overrides); the Hub
                response already carries currentTemplateVer and stale via its JOIN.
                Read access only — no type-scope check applies.
            x-nexus-iam-action: iam.ResourceSettings.Action(iam.VerbRead)
            x-nexus-tier: auto
            parameters:
                - name: id
                  in: path
                  required: true
                  description: Node ID (the underlying Hub thing ID).
                  schema:
                    type: string
            responses:
                "400":
                    description: id path parameter is empty.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
    /api/admin/nodes/{id}/overrides/{configKey}:
        put:
            operationId: setNodeOverride
            summary: Set node config override
            description: >-
                Creates or replaces a per-node config override for one config key.
                The handler validates the body locally (mirroring Hub's own rules),
                runs an IAM type-scope check against the node's thing type, then
                forwards to Hub which writes the override and its audit row in-tx
                (CP does not write a second audit row). Type-scope: super-admins may
                override any type; provider-managers only service types
                (ai-gateway, compliance-proxy, control-plane, nexus-hub);
                compliance-team only the agent type.
            x-nexus-iam-action: iam.ResourceNode.Action(iam.VerbWriteOverride)
            x-nexus-tier: confirm
            parameters:
                - name: id
                  in: path
                  required: true
                  description: Node ID (the underlying Hub thing ID).
                  schema:
                    type: string
                - name: configKey
                  in: path
                  required: true
                  description: >-
                    Config key to override. Must be an overridable key — keys on
                    the non-overridable blacklist are rejected with 400.
                  schema:
                    type: string
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required:
                                - state
                            properties:
                                state:
                                    type: object
                                    description: >-
                                        Override value. Must be a JSON object at the
                                        top level (not array / scalar / null).
                                    additionalProperties: {}
                                reason:
                                    type: string
                                    maxLength: 500
                                    description: Optional human-readable reason for the override.
                                expiresAt:
                                    type: string
                                    format: date-time
                                    description: >-
                                        Optional expiry. When set, (expiresAt - now)
                                        must fall within [5 minutes, 30 days].
                        example:
                            state:
                                enabled: false
                            reason: Temporarily disabling routing on this node during maintenance.
                            expiresAt: "2026-02-01T00:00:00Z"
            responses:
                "400":
                    description: >-
                        Invalid body — id/configKey empty, key not overridable,
                        state missing or not a JSON object, reason over 500 chars,
                        or expiresAt outside [5m, 30d].
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "403":
                    description: Caller's IAM role cannot operate on this node's thing type.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
        delete:
            operationId: clearNodeOverride
            summary: Clear node config override
            description: >-
                Removes a per-node config override for one config key. Same IAM
                type-scope rules as setNodeOverride. Forwards to Hub which writes
                the audit row in-tx (CP does not write a second audit row).
            x-nexus-iam-action: iam.ResourceNode.Action(iam.VerbWriteOverride)
            x-nexus-tier: confirm
            parameters:
                - name: id
                  in: path
                  required: true
                  description: Node ID (the underlying Hub thing ID).
                  schema:
                    type: string
                - name: configKey
                  in: path
                  required: true
                  description: Config key whose override should be cleared.
                  schema:
                    type: string
            responses:
                "400":
                    description: id or configKey path parameter is empty.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "403":
                    description: Caller's IAM role cannot operate on this node's thing type.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
    /api/admin/nodes/{id}/resync:
        post:
            operationId: adminResyncNode
            summary: Force node resync
            description: >-
                Forces the node to re-pull config from Hub. An empty body triggers a
                whole-node replay; {"configKey": "..."} resyncs a single key. The
                handler runs the same IAM type-scope check as override mutations,
                then forwards to Hub. Hub does not audit redelivery, so CP writes
                the audit row (scope=single-key or scope=all-keys).
            x-nexus-iam-action: iam.ResourceNode.Action(iam.VerbForceResync)
            x-nexus-tier: confirm
            parameters:
                - name: id
                  in: path
                  required: true
                  description: Node ID (the underlying Hub thing ID).
                  schema:
                    type: string
            requestBody:
                required: false
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                configKey:
                                    type: string
                                    description: >-
                                        Optional. When set, resync only this key;
                                        when omitted, replay the whole node.
                        example:
                            configKey: routing.rules
            responses:
                "400":
                    description: id path parameter is empty or request body is malformed JSON.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "403":
                    description: Caller's IAM role cannot operate on this node's thing type.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "500":
                    description: Failed to encode the Hub request body.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
    /api/admin/nodes/{id}/runtime:
        get:
            operationId: getNodeRuntime
            summary: Get node runtime snapshot
            description: >-
                Returns the runtime introspection snapshot for a node, shaped as
                {"snapshot": {...service envelope}, "meta": {...Hub view}}. CP is a
                pass-through to Hub (GET /api/hub/things/{id}/runtime) and does not
                interpret the response. Upstream 5xx from Hub is surfaced as 502.
            x-nexus-iam-action: iam.ResourceSettings.Action(iam.VerbRead)
            x-nexus-tier: auto
            parameters:
                - name: id
                  in: path
                  required: true
                  description: Node ID (the underlying Hub thing ID).
                  schema:
                    type: string
            responses:
                "400":
                    description: id path parameter is empty.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "503":
                    description: Hub is not configured.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "502":
                    description: Hub call failed or returned an upstream 5xx.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
    /api/admin/nodes/overrides:
        get:
            operationId: listGlobalOverrides
            summary: List all node overrides
            description: >-
                Returns the global registry of active per-node config overrides
                across the whole fleet. Pure reverse-proxy to Hub
                (GET /api/hub/things/overrides); query params (type, actor, hasTtl,
                stale, limit, offset) are forwarded verbatim.
            x-nexus-iam-action: iam.ResourceSettings.Action(iam.VerbRead)
            x-nexus-tier: auto
            responses:
                default:
                    description: Response body not statically resolved; see openapi-review.
