paths:
    /api/admin/enrollment/token:
        post:
            operationId: enrollmentCreateToken
            summary: Generate an enrollment token
            description: |-
                Generates a new node enrollment token. The Control Plane handler (EnrollmentCreateToken) is a thin proxy that forwards the request body verbatim to the Nexus Hub endpoint POST /api/hub/enrollment/token, which mints the token, persists it to the enrollment_token table with status `pending`, and returns the raw token string exactly once. On a 2xx response the Control Plane writes an audit entry recording that a token was issued (token material is never logged).

                A node (agent / service Thing) presents this token once during enrollment to register with the Hub; the token then transitions to `used`. Tokens default to a 24-hour expiry when `expiresIn` is omitted, and default to thing type `agent` when `thingType` is omitted.
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required:
                                - label
                            properties:
                                label:
                                    type: string
                                    description: Human-readable label for the token (required). Typically identifies the node or batch the token is intended for.
                                thingType:
                                    type: string
                                    description: 'Thing type the token enrolls. Optional; defaults to `agent` when omitted.'
                                expiresIn:
                                    type: string
                                    description: 'Token lifetime as a Go duration string (for example `24h`, `30m`, `168h`). Optional; defaults to 24h when omitted. An unparseable value is rejected.'
                                metadata:
                                    type: object
                                    additionalProperties: true
                                    description: Arbitrary key/value metadata stored alongside the token. Optional.
                                createdBy:
                                    type: string
                                    description: Identifier of the actor that requested the token. Optional.
                        example:
                            label: macbook-fleet-2026
                            thingType: agent
                            expiresIn: 24h
                            metadata:
                                team: platform
            x-nexus-iam-action: iam.ResourceSettings.Action(iam.VerbUpdate)
            x-nexus-tier: confirm
            responses:
                default:
                    description: |-
                        On success the Hub responds 201 Created with the newly minted token, including the raw token string (returned exactly once). The Control Plane forwards the Hub response body verbatim. Error responses (for example a missing `label`) are forwarded from the Hub as a JSON error envelope.
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    id:
                                        type: string
                                        description: Unique token identifier.
                                    token:
                                        type: string
                                        description: The raw enrollment token string. Returned only on creation; never returned by the list endpoint.
                                    thingType:
                                        type: string
                                        description: Thing type the token enrolls.
                                    label:
                                        type: string
                                        description: Human-readable label supplied at creation.
                                    expiresAt:
                                        type: string
                                        format: date-time
                                        description: Timestamp after which the token can no longer be redeemed.
                                    status:
                                        type: string
                                        description: Lifecycle state of the token.
                                        enum:
                                            - pending
                                            - used
                                            - revoked
                                            - expired
                                    metadata:
                                        type: object
                                        additionalProperties: true
                                        description: Metadata stored alongside the token.
                                    createdBy:
                                        type: string
                                        description: Identifier of the actor that requested the token, if recorded.
                                    createdAt:
                                        type: string
                                        format: date-time
                                        description: Creation timestamp.
                            example:
                                id: 0f3c2e10-6b9a-4d1e-9c2f-2a1b3c4d5e6f
                                token: enr_9f8e7d6c5b4a3210fedcba9876543210
                                thingType: agent
                                label: macbook-fleet-2026
                                expiresAt: '2026-05-30T12:00:00Z'
                                status: pending
                                metadata:
                                    team: platform
                                createdAt: '2026-05-29T12:00:00Z'
    /api/admin/enrollment/tokens:
        get:
            operationId: enrollmentListTokens
            summary: List enrollment tokens
            description: |-
                Lists all node enrollment tokens. The Control Plane handler (EnrollmentListTokens) is a thin proxy that forwards to the Nexus Hub endpoint GET /api/hub/enrollment/tokens. The Hub returns every token's metadata but never the raw token string (it is only ever surfaced once, at creation). Tokens still in `pending` state whose expiry has elapsed are reported as `expired`.
            x-nexus-iam-action: iam.ResourceSettings.Action(iam.VerbRead)
            x-nexus-tier: auto
            responses:
                default:
                    description: 200 OK with the list of tokens and a total count. Raw token strings are omitted from every entry.
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    tokens:
                                        type: array
                                        description: All enrollment tokens, most recent state reflected.
                                        items:
                                            type: object
                                            properties:
                                                id:
                                                    type: string
                                                    description: Unique token identifier.
                                                thingType:
                                                    type: string
                                                    description: Thing type the token enrolls.
                                                label:
                                                    type: string
                                                    description: Human-readable label supplied at creation.
                                                expiresAt:
                                                    type: string
                                                    format: date-time
                                                    description: Timestamp after which the token can no longer be redeemed.
                                                status:
                                                    type: string
                                                    description: 'Lifecycle state of the token. A `pending` token past its expiry is reported as `expired`.'
                                                    enum:
                                                        - pending
                                                        - used
                                                        - revoked
                                                        - expired
                                                metadata:
                                                    type: object
                                                    additionalProperties: true
                                                    description: Metadata stored alongside the token.
                                                createdBy:
                                                    type: string
                                                    description: Identifier of the actor that requested the token, if recorded.
                                                createdAt:
                                                    type: string
                                                    format: date-time
                                                    description: Creation timestamp.
                                    total:
                                        type: integer
                                        description: Number of tokens returned.
                            example:
                                tokens:
                                    - id: 0f3c2e10-6b9a-4d1e-9c2f-2a1b3c4d5e6f
                                      thingType: agent
                                      label: macbook-fleet-2026
                                      expiresAt: '2026-05-30T12:00:00Z'
                                      status: pending
                                      createdAt: '2026-05-29T12:00:00Z'
                                total: 1
