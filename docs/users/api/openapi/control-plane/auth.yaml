paths:
    /api/admin/auth/sessions:
        get:
            operationId: listAuthSessions
            summary: List active auth sessions
            description: |-
                Returns one row per session (sessionId) from the refresh-token
                store, optionally filtered by user, device, or session. The newest
                token rotation per session is surfaced, with createdAt set to the
                session's first-mint time and lastRefreshedAt to the most recent
                rotation. Results are capped at 500 rows. Each filter is optional
                and independent; supplying none lists every session across the
                tenant. This reveals all admin sessions and is treated as
                operationally privileged data.
            x-nexus-iam-action: iam.ResourceUser.Action(iam.VerbUpdate)
            x-nexus-tier: confirm
            parameters:
                - name: user_id
                  in: query
                  required: false
                  description: Restrict to sessions owned by this user. Omit to match all users.
                  schema:
                    type: string
                - name: device_id
                  in: query
                  required: false
                  description: Restrict to sessions bound to this device. Omit to match all devices.
                  schema:
                    type: string
                - name: session_id
                  in: query
                  required: false
                  description: Restrict to a single session by its UUID. Omit to match all sessions.
                  schema:
                    type: string
            responses:
                "503":
                    description: Database not available.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                error: database not available
                                type: server_error
                                code: DB_UNAVAILABLE
                "500":
                    description: Failed to query or scan the session rows.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                error: failed to list sessions
                                type: server_error
                "200":
                    description: List of active sessions.
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    sessions:
                                        type: array
                                        items:
                                            type: object
                                            properties:
                                                sessionId:
                                                    type: string
                                                    description: Session identifier (UUID).
                                                userId:
                                                    type: string
                                                    description: Owning user identifier.
                                                clientId:
                                                    type: string
                                                    description: OAuth client that minted the session.
                                                deviceId:
                                                    type: string
                                                    description: Bound device identifier, when present.
                                                createdAt:
                                                    type: string
                                                    format: date-time
                                                    description: First-mint time of the session.
                                                lastRefreshedAt:
                                                    type: string
                                                    format: date-time
                                                    description: Most recent token-rotation time, when present.
                                                expiresAt:
                                                    type: string
                                                    format: date-time
                                                    description: Expiry of the newest token rotation.
                            example:
                                sessions:
                                    - sessionId: 3f9a1c2e-7b4d-4e1a-9c8f-2d6b5a0e1f33
                                      userId: usr_01HZX
                                      clientId: control-plane-ui
                                      deviceId: dev_macbook_01
                                      createdAt: "2026-05-01T09:15:00Z"
                                      lastRefreshedAt: "2026-05-29T08:02:11Z"
                                      expiresAt: "2026-06-28T08:02:11Z"
        delete:
            operationId: deleteAuthSessions
            summary: Force-logout sessions by user, device, or session
            description: |-
                Force-logs-out a user, device, or single session by minting a
                revocation and hard-deleting the matching refresh-token rows so the
                session cannot rotate. Exactly one of user_id, device_id, or
                session_id must be supplied; supplying zero or more than one returns
                400 so a caller cannot accidentally revoke a broader blast radius
                than intended. The revocation event is durable and fans out
                independently; a deletion that matches zero rows is not an error.
            x-nexus-iam-action: iam.ResourceNexusSession.Action(iam.VerbRevoke)
            x-nexus-tier: confirm
            parameters:
                - name: user_id
                  in: query
                  required: false
                  description: Force-logout all sessions for this user. Provide exactly one of user_id, device_id, or session_id.
                  schema:
                    type: string
                - name: device_id
                  in: query
                  required: false
                  description: Force-logout all sessions on this device. Provide exactly one of user_id, device_id, or session_id.
                  schema:
                    type: string
                - name: session_id
                  in: query
                  required: false
                  description: Force-logout this single session. Provide exactly one of user_id, device_id, or session_id.
                  schema:
                    type: string
            responses:
                "400":
                    description: Not exactly one filter was supplied (zero or more than one of user_id, device_id, session_id).
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                error: exactly one of user_id, device_id, session_id required
                                type: validation_error
                                code: FILTER_REQUIRED
                "503":
                    description: Revocation service or database not available.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                error: revocation service not configured
                                type: server_error
                                code: REVOCATION_UNAVAILABLE
                "500":
                    description: Failed to revoke or to purge the refresh-token rows.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                error: failed to revoke
                                type: server_error
                "200":
                    description: Sessions revoked.
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    ok:
                                        type: boolean
                                        description: True when the revocation and refresh-row purge succeeded.
                            example:
                                ok: true
