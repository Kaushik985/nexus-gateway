                                      tokenLimit: null
                                      enforcementMode: reject
                                      alertThresholds: [80, 90]
                                      priority: 100
                                      enabled: true
                                total: 1
        post:
            operationId: createQuotaPolicy
            summary: Create a quota policy
            description: |
                Creates a quota policy. The handler requires name, scope, and periodType;
                it rejects unknown scope/periodType/enforcementMode values, validates the
                legal scope × organizationId × vkType combination, defaults enforcementMode
                to "reject" when omitted, defaults alertThresholds to [80, 90] when omitted
                or sent as JSON null, and defaults enabled to true when omitted.
            x-nexus-iam-action: iam.ResourceQuotaPolicy.Action(iam.VerbCreate)
            x-nexus-tier: confirm
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                name:
                                    type: string
                                    description: Human-readable policy name. Required; the handler rejects an empty string.
                                description:
                                    type:
                                        - string
                                        - "null"
                                    description: Optional free-text description.
                                scope:
                                    type: string
                                    description: 'Policy scope. Required. Allowed values from handler validQuotaPolicyScopes: user, vk, project, organization.'
                                    enum:
                                        - user
                                        - vk
                                        - project
                                        - organization
                                organizationId:
                                    type:
                                        - string
                                        - "null"
                                    description: Target organization. Required when scope=organization; must not be set for scope=project or scope=vk.
                                vkType:
                                    type:
                                        - string
                                        - "null"
                                    description: 'Virtual-key type. Required when scope=vk and then must be one of validQuotaVKTypes: personal, application. Must not be set when scope is user, project, or organization.'
                                    enum:
                                        - personal
                                        - application
                                periodType:
                                    type: string
                                    description: 'Quota reset period. Required. Allowed values from handler validPeriodTypes: daily, weekly, monthly.'
                                    enum:
                                        - daily
                                        - weekly
                                        - monthly
                                costLimitUsd:
                                    type:
                                        - number
                                        - "null"
                                    description: Optional cost ceiling in USD for the period.
                                tokenLimit:
                                    type:
                                        - integer
                                        - "null"
                                    format: int64
                                    description: Optional token ceiling for the period.
                                enforcementMode:
                                    type: string
                                    description: 'Action taken when the quota is exceeded. Optional; defaults to "reject" when omitted. Allowed values from handler validQuotaEnforcementModes: reject, downgrade, notify-and-proceed, track-only.'
                                    enum:
                                        - reject
                                        - downgrade
                                        - notify-and-proceed
                                        - track-only
                                alertThresholds:
                                    description: 'Percentage thresholds (of the limit) at which alerts fire. Optional; defaults to [80, 90] when omitted or sent as JSON null.'
                                priority:
                                    type: integer
                                    description: Evaluation priority; higher wins when multiple policies match. Optional.
                                enabled:
                                    type:
                                        - boolean
                                        - "null"
                                    description: Whether the policy is active. Optional; defaults to true when omitted.
                            required:
