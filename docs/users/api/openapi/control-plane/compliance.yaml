    /api/admin/compliance/killswitch:
        post:
            operationId: post
            summary: Toggle the data-plane kill switch
            description: |-
                Engages or disengages the global data-plane kill switch and fans the change out
                to both the compliance-proxy and agent receivers via Hub. A failure on the
                primary compliance-proxy leg returns 502; a secondary agent-leg failure is logged
                and reconciled later. Returns 503 when Hub is not configured.
            x-nexus-iam-action: iam.ResourceKillSwitch.Action(iam.VerbToggle)
            x-nexus-tier: confirm
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                engaged:
                                    type:
                                        - boolean
                                        - "null"
                                    description: Target kill-switch state. Required (must be present and non-null) — true engages, false disengages.
                            required:
                                - engaged
                        example:
                            engaged: true
            responses:
                "400":
                    description: Bad Request
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "503":
                    description: Service Unavailable
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "502":
                    description: Bad Gateway
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "500":
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                            example:
                                engaged: true
                                version: 12
                                thingsNotified: 3
                                thingsOnline: 2
    /api/admin/compliance/overview:
        get:
            operationId: complianceOverview
            summary: Get the global compliance dashboard
            description: |-
                Returns the full global compliance dashboard payload in a single call: KPIs,
                Trinity per-layer stats, hook health, and top-10 blocked lists. When the time
                window is omitted it defaults to the last 7 days. The window may not exceed 366
                days.
            x-nexus-iam-action: iam.ResourceComplianceReport.Action(iam.VerbRead)
            x-nexus-tier: auto
            parameters:
                - name: startTime
                  in: query
                  description: Start of the reporting window (RFC3339). Defaults to 7 days before now when omitted.
                  required: false
                  schema:
                    type: string
                    format: date-time
                - name: endTime
                  in: query
                  description: End of the reporting window (RFC3339). Defaults to now when omitted.
                  required: false
                  schema:
                    type: string
                    format: date-time
            responses:
                "400":
                    description: Bad Request
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "500":
                    description: Internal Server Error
                    content:
