                                        - "null"
                                    description: New provider name. Empty string means leave unchanged.
                                displayName:
                                    type:
                                        - string
                                        - "null"
                                    description: New display label.
                                description:
                                    type:
                                        - string
                                        - "null"
                                    description: New description.
                                baseUrl:
