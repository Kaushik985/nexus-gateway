paths:
    /api/admin/diag-silences:
        get:
            operationId: diagSilencesList
            summary: List active diag silences
            description: |-
                Returns currently-active diagnostic silences (those with no expiry
                or an expiry still in the future), newest first. A silence collapses
                a repeating (messageHash, level) group on the Infrastructure → Errors
                page so triage stays focused on what is new. The Errors page uses
                this to surface "what is currently silenced" in its filter panel.
            x-nexus-iam-action: iam.ResourceObservability.Action(iam.VerbRead)
            x-nexus-tier: auto
            responses:
                "503":
                    description: Database is not configured.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "500":
                    description: Failed to list silences.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: The active silences, newest first.
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    data:
                                        type: array
                                        items:
                                            $ref: '#/components/schemas/infra_diagSilence'
                                additionalProperties: {}
                            example:
                                data:
                                    - id: 3f9b2c0e-7a41-4e2d-9c18-2b6d5f0a1e34
                                      messageHash: 8c5f2a1b9d3e
                                      level: error
                                      silencedBy: usr_01HZX9QK3M
                                      silencedAt: "2026-05-29T12:00:00Z"
                                      expiresAt: "2026-05-30T12:00:00Z"
                                      reason: Known upstream flake, tracked in INFRA-42
        post:
            operationId: diagSilencesCreate
            summary: Create a diag silence
            description: |-
                Creates a silence for a (messageHash, level) group. A TTL of 0 means
                a permanent silence; a positive TTL sets an expiry that many seconds
                from now, capped at 30 days. Duplicate active silences for the same
                group are allowed — operators extending coverage simply create a new
                row. Returns the persisted silence on success.
            x-nexus-iam-action: iam.ResourceObservability.Action(iam.VerbWrite)
            x-nexus-tier: confirm
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/infra_createDiagSilenceRequest'
                        example:
                            messageHash: 8c5f2a1b9d3e
                            level: error
                            ttlSeconds: 86400
                            reason: Known upstream flake, tracked in INFRA-42
            responses:
                "503":
                    description: Database is not configured.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "400":
                    description: |-
                        Validation failed: malformed body, empty messageHash, level
                        not one of debug|info|warn|error|fatal, negative ttlSeconds,
                        ttlSeconds above the 30-day cap, or reason over 500 chars.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "500":
                    description: Failed to create silence.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: {}
                "200":
                    description: The persisted silence.
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    silence:
                                        $ref: '#/components/schemas/infra_diagSilence'
                                additionalProperties: {}
                            example:
                                silence:
                                    id: 3f9b2c0e-7a41-4e2d-9c18-2b6d5f0a1e34
                                    messageHash: 8c5f2a1b9d3e
                                    level: error
                                    silencedBy: usr_01HZX9QK3M
                                    silencedAt: "2026-05-29T12:00:00Z"
                                    expiresAt: "2026-05-30T12:00:00Z"
                                    reason: Known upstream flake, tracked in INFRA-42
    /api/admin/diag-silences/{id}:
        delete:
            operationId: diagSilencesDelete
            summary: Delete a diag silence
            description: |-
                Removes a silence by id (unsilence), allowing its (messageHash, level)
                group to surface again on the Errors page. The pre-delete row is
                captured in the audit before-state.
            x-nexus-iam-action: iam.ResourceObservability.Action(iam.VerbWrite)
