paths:
    /api/admin/agents/{nodeId}/diagnostic-mode:
        post:
            operationId: enableDiagMode
            summary: Enable diagnostic mode for one node
            description: |-
                Opens a diagnostic-mode window for a single node. The handler writes a
                per-node `diag_mode` config override on the Hub (state `{until}`,
                expiry = `until`), which raises the agent's log level to debug for the
                window; the agent self-restores on expiry. An audit-history window row
                (who/when/reason/until) is then recorded for the list endpoint.

                The `until` timestamp must be RFC3339 and fall between 5 minutes and
                24 hours in the future; a value outside that range is rejected with 400.
                A non-2xx response from the Hub override write (e.g. node not found or
                a TTL-window rejection) is echoed back verbatim.
            x-nexus-iam-action: iam.ResourceDiagnosticMode.Action(iam.VerbUpdate)
            x-nexus-tier: confirm
            parameters:
                - name: nodeId
                  in: path
                  required: true
                  description: ID of the node whose diagnostic-mode window is opened.
                  schema:
                    type: string
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/infra_enableDiagModeRequest'
                        example:
                            until: "2026-05-29T18:00:00Z"
                            reason: Investigating intermittent upstream timeouts
            responses:
